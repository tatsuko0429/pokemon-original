<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>初代風モンスター試作</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/app-icon-32.png"
    />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/app-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="theme-color" content="#111316" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">非公開試作</p>
        <h1>初代風モンスター試作</h1>
        <p class="subtitle">
          体験の芯を確認するための最小プレイアブルです。
        </p>
      </header>

      <section class="screen-card" aria-label="ゲーム画面">
        <div class="screen-wrap">
          <canvas
            id="game-screen"
            width="160"
            height="144"
            aria-label="ゲーム表示"
          ></canvas>
          <div id="battle-overlay" class="battle-overlay is-hidden" aria-hidden="true"></div>
          <div id="screen-timer" class="screen-timer is-hidden" aria-hidden="true"></div>
          <div id="screen-message" class="screen-message is-hidden" aria-live="polite"></div>
          <div id="screen-caption" class="screen-caption"></div>
        </div>
      </section>

      <section class="status-card" aria-label="状態表示">
        <div id="status-strip" class="status-strip"></div>
      </section>

      <section class="action-card" aria-label="操作パネル">
        <div id="action-panel" class="action-panel"></div>
      </section>
    </main>

    <div id="modal-root" class="modal-root is-hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title"></h2>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-actions" class="modal-actions">
          <button id="modal-confirm" class="modal-button" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <script defer src="./scripts/core/namespace.js"></script>
    <script defer src="./scripts/config/app-config.js"></script>
    <script defer src="./scripts/data/moves.js"></script>
    <script defer src="./scripts/data/species.js"></script>
    <script defer src="./scripts/data/encounters.js"></script>
    <script defer src="./scripts/data/quests.js"></script>
    <script defer src="./scripts/data/maps.js"></script>
    <script defer src="./scripts/data/pixel-art.js"></script>
    <script defer src="./scripts/core/store.js"></script>
    <script defer src="./scripts/core/save.js"></script>
    <script defer src="./scripts/core/random.js"></script>
    <script defer src="./scripts/core/data-registry.js"></script>
    <script defer src="./scripts/core/input.js"></script>
    <script defer src="./scripts/core/audio.js"></script>
    <script defer src="./scripts/core/modal.js"></script>
    <script defer src="./scripts/core/screen-renderer.js"></script>
    <script defer src="./scripts/core/ui.js"></script>
    <script defer src="./scripts/scenes/battle-scene.js"></script>
    <script defer src="./scripts/scenes/field-scene.js"></script>
    <script defer src="./scripts/app.js"></script>
  </body>
</html>

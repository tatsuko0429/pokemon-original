    <script>
/* --- scripts/scenes/battle-scene.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// 戦闘の状態機械、技処理、捕獲、戦闘終了処理を担当するscene。
// UIはui.js、canvas描画はscreen-renderer.jsだが、phase/currentMessage/display/animationの形はこのファイルが決める。
(() => {
  const App = window.MonsterPrototype;

  function createBattleScene({
    store,
    dataRegistry,
    input,
    modal,
    audio,
    random,
    openMenu,
    createEmptyTransition,
  }) {
    const animationConfig = App.config.game.animation;
    const ballConfig = animationConfig.ball;
    const attackConfig = animationConfig.attack || {};
    const missConfig = animationConfig.miss || {};
    const expConfig = animationConfig.exp || {};
    const resultConfig = animationConfig.result || {};
    const battleConfig = App.config.game.battle || {};

    function getPlayerMonster(state) {
      return state.party[0];
    }

    function getFieldBgmId(state) {
      const mapDef = state.field ? dataRegistry.getMap(state.field.mapId) : null;
      return (mapDef && mapDef.bgmId) || "field";
    }

    function createStep(text, effect, soundId) {
      return {
        text,
        effect: effect || null,
        soundId: soundId || "",
      };
    }

    function requiredExp(level) {
      return level * level * 10;
    }

    function createExpGainEffect(monster, expGained) {
      const fromExp = monster.exp || 0;
      const needed = requiredExp(monster.level);
      return {
        kind: "exp",
        fromExp,
        toExp: Math.min(needed, fromExp + expGained),
        requiredExp: needed,
      };
    }

    function createResultEffect(variant, target) {
      return {
        kind: "result",
        variant,
        target: target || "player",
      };
    }

    function getLevelAfterExp(monster, expGained) {
      let nextLevel = monster.level;
      let nextExp = (monster.exp || 0) + expGained;

      while (nextExp >= requiredExp(nextLevel)) {
        nextExp -= requiredExp(nextLevel);
        nextLevel += 1;
      }

      return nextLevel;
    }

    function applyExpGain(monster, expGained) {
      let leveledUp = false;
      monster.exp = (monster.exp || 0) + expGained;

      while (monster.exp >= requiredExp(monster.level)) {
        monster.exp -= requiredExp(monster.level);
        monster.level += 1;
        leveledUp = true;

        const sp = dataRegistry.getSpecies(monster.speciesId);
        monster.maxHp = Math.floor(((sp.stats.hp * 2) * monster.level) / 100) + monster.level + 10;
        monster.attack = Math.floor(((sp.stats.attack * 2) * monster.level) / 100) + 5;
        monster.defense = Math.floor(((sp.stats.defense * 2) * monster.level) / 100) + 5;
        monster.speed = Math.floor(((sp.stats.speed * 2) * monster.level) / 100) + 5;
        monster.special = Math.floor(((sp.stats.special * 2) * monster.level) / 100) + 5;
      }

      return leveledUp;
    }

    function canUseFullHeal(state) {
      const playerMonster = getPlayerMonster(state);
      return Boolean(
        playerMonster &&
          state.inventory.fullHealCount > 0 &&
          playerMonster.currentHp < playerMonster.maxHp
      );
    }

    function canUseMasterBall(state) {
      return Boolean(state.inventory && state.inventory.masterBallCount > 0);
    }

    function clearBattleVolatile(monster) {
      if (!monster) {
        return;
      }
      delete monster.iceWallTurns;
      delete monster.swimmingTurns;
      delete monster.swimmingJustStarted;
      delete monster.swimmingHealRatio;
    }

    function getMessageAutoAdvanceMs(text) {
      const baseMs = battleConfig.messageAutoAdvanceMs || 1000;
      const perCharMs = battleConfig.messageAutoAdvancePerCharMs || 0;
      const maxExtraMs = battleConfig.messageAutoAdvanceMaxExtraMs || 0;
      const readableLength = String(text || "").replace(/\s/g, "").length;
      return baseMs + Math.min(maxExtraMs, readableLength * perCharMs);
    }

    function rememberCapturedSpecies(state, speciesId) {
      if (!speciesId) {
        return false;
      }

      if (state.collection.capturedSpeciesIds.includes(speciesId)) {
        return false;
      }

      state.collection.capturedSpeciesIds.push(speciesId);
      return true;
    }

    function healParty(state) {
      state.party.forEach((monster) => {
        monster.currentHp = monster.maxHp;
        monster.currentPp = monster.moveIds.map((moveId) => dataRegistry.getMove(moveId).pp);
      });
    }

    function createAnimation(effect) {
      if (!effect) {
        return null;
      }

      if (effect.kind === "damage") {
        return {
          kind: "damage",
          target: effect.target,
          fromHp: effect.fromHp,
          toHp: effect.toHp,
          moveType: effect.moveType || "ノーマル",
          typeMultiplier:
            typeof effect.typeMultiplier === "number" ? effect.typeMultiplier : 1,
          elapsedMs: 0,
          durationMs: animationConfig.damage.durationMs,
        };
      }

      if (effect.kind === "attack") {
        return {
          kind: "attack",
          target: effect.target,
          moveType: effect.moveType || "ノーマル",
          elapsedMs: 0,
          durationMs: attackConfig.durationMs || 180,
        };
      }

      if (effect.kind === "heal") {
        return {
          kind: "heal",
          target: effect.target,
          fromHp: effect.fromHp,
          toHp: effect.toHp,
          elapsedMs: 0,
          durationMs: animationConfig.damage.durationMs,
        };
      }

      if (effect.kind === "ice_wall") {
        return {
          kind: "ice_wall",
          target: effect.target,
          elapsedMs: 0,
          durationMs: 420,
        };
      }

      if (effect.kind === "miss") {
        return {
          kind: "miss",
          target: effect.target,
          moveType: effect.moveType || "ノーマル",
          elapsedMs: 0,
          durationMs: missConfig.durationMs || 300,
        };
      }

      if (effect.kind === "exp") {
        return {
          kind: "exp",
          fromExp: effect.fromExp || 0,
          toExp: effect.toExp || 0,
          requiredExp: effect.requiredExp || 1,
          elapsedMs: 0,
          durationMs: expConfig.durationMs || 620,
        };
      }

      if (effect.kind === "result") {
        return {
          kind: "result",
          variant: effect.variant || "victory",
          target: effect.target || "player",
          elapsedMs: 0,
          durationMs: effect.durationMs || resultConfig.durationMs || 560,
        };
      }

      if (effect.kind === "ball") {
        const phase = effect.phase || "throw";
        const phaseDurations = {
          throw: ballConfig.throwDurationMs || ballConfig.durationMs,
          shake: ballConfig.shakeDurationMs || ballConfig.durationMs,
          lock: ballConfig.lockDurationMs || ballConfig.durationMs,
          complete: ballConfig.completeDurationMs || ballConfig.durationMs,
          release: ballConfig.releaseDurationMs || ballConfig.durationMs,
        };

        return {
          kind: "ball",
          phase,
          elapsedMs: 0,
          durationMs: effect.durationMs || phaseDurations[phase] || ballConfig.durationMs,
          success: Boolean(effect.success),
          shakeIndex: effect.shakeIndex || 0,
          totalShakes: effect.totalShakes || 0,
          ballType: effect.ballType || "normal",
        };
      }

      if (effect.kind === "faint") {
        return {
          kind: "faint",
          target: effect.target,
          elapsedMs: 0,
          durationMs: 360,
        };
      }

      return null;
    }

    function showStep(state, step) {
      // 1メッセージ単位で入力キューを消し、アニメーション中は入力ロックする。連打が次フェーズへ漏れるのを防ぐ。
      input.clearActions();
      state.battle.currentMessage = step ? step.text : "";
      state.battle.messageElapsedMs = 0;
      state.battle.animation = step ? createAnimation(step.effect) : null;
      input.setActionLock(Boolean(state.battle.animation), { clearQueue: true });
      if (step && step.soundId) {
        audio.playSe(step.soundId);
      }
    }

    function startSequence(state, steps, nextPhase) {
      // 戦闘はsteps配列を順に表示し、最後にnextPhaseへ進む。新しい分岐もこの流れに乗せるとUIと自動送りが保たれる。
      state.battle.phase = "message";
      state.battle.steps = steps.slice();
      state.battle.nextPhase = nextPhase;
      const first = state.battle.steps.shift();
      showStep(state, first || null);
    }

    function applyBattleClose(state, result) {
      // 戦闘終了時だけfieldへ戻し、手持ち回復・最終メッセージ・battle-end遷移をまとめて行う。
      // セーブは戦闘中禁止なので、ここで復元可能なフィールド状態へ戻すことが重要。
      if (result && result.gameOver) {
        state.progress.gameOver = true;
        return;
      }

      if (result && result.capturedSpeciesId) {
        result.addedToCollection = rememberCapturedSpecies(state, result.capturedSpeciesId);
      }

      if (result && result.capturedMonster) {
        state.party = [result.capturedMonster];
      }

      let finalMessage = result && result.message ? result.message : "";
      if (result && result.rewardItem === "full_heal") {
        state.inventory.fullHealCount += 1;
        finalMessage += "\n回復薬を 1つ 手に入れた！";
      }

      healParty(state);
      state.party.forEach(clearBattleVolatile);
      state.scene = "field";
      state.battle = null;
      state.field.message = finalMessage;
      state.field.messageKind = finalMessage ? "success" : "";
      state.field.lastEncounterStep = state.field.steps;
      state.transition = {
        active: true,
        kind: "battle-end",
        elapsedMs: 0,
        durationMs: 400,
      };
      audio.playBgm(getFieldBgmId(state));

      if (result && result.gameCleared) {
        state.progress.gameCleared = true;
      }
    }

    function openCaptureRecordModal(result) {
      if (!result || !result.capturedSpeciesId) {
        return;
      }

      const species = dataRegistry.getSpecies(result.capturedSpeciesId);
      if (!species) {
        return;
      }

      modal.openModal({
        title: "捕獲の記録",
        sections: App.core.buildMonsterPreviewSection(
          species,
          result.addedToCollection ? "新規記録" : "記録済み",
          {
            variant: "capture",
            imageMaxHeight: 158,
            note: "捕獲成功",
          }
        ),
        lines: [
          `${species.name} Lv${result.capturedLevel}`,
          `タイプ: ${species.types.join(" / ")}`,
          result.addedToCollection
            ? "新しく図鑑へ記録しました。"
            : "このモンスターは、すでに図鑑へ記録されています。",
        ],
        buttonLabel: "戻る",
      });
    }

    function beginEncounter(enemyMonster, context) {
      // state.battleの形はui.js/screen-renderer.js/save.jsの前提。新しい表示値を足す時は差分キーも見る。
      store.update((state) => {
        const playerMonster = getPlayerMonster(state);
        const isTrainer = context && context.kind === "trainer-encounter";
        clearBattleVolatile(playerMonster);
        clearBattleVolatile(enemyMonster);

        state.scene = "battle";
        state.field.message = "";
        state.field.messageKind = "";
        state.battle = {
          phase: "message",
          currentMessage: "",
          steps: [],
          nextPhase: "command",
          animation: null,
          fainted: {
            player: false,
            enemy: false,
          },
          messageElapsedMs: 0,
          captureBall: null,
          pendingCloseResult: null,
          enemy: enemyMonster,
          isTrainerBattle: isTrainer,
          trainerInfo: isTrainer ? context : null,
          display: {
            playerHp: playerMonster.currentHp,
            enemyHp: enemyMonster.currentHp,
            playerExp: playerMonster.exp || 0,
          },
        };

        const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
        const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);

        const introSteps = [];
        if (isTrainer) {
          introSteps.push(createStep(`${context.trainerName} が しょうぶを しかけてきた！`));
          if (context.introMessage) {
            introSteps.push(createStep(context.introMessage));
          }
          introSteps.push(createStep(`${context.trainerName} は ${enemySpecies.name} を くりだした！`));
        } else {
          introSteps.push(createStep(`やせいの ${enemySpecies.name} が あらわれた！`));
        }
        introSteps.push(createStep(`${playerSpecies.name} を くりだした！`));

        startSequence(state, introSteps, "command");
      });
      audio.playBgm("battle");
      input.setActionLock(false, { clearQueue: true });
      input.clearDirections();
    }

    function beginTrainerBattle(event) {
      input.setActionLock(true, { clearQueue: true });
      store.update((state) => {
        let enemyMonster;
        if (event.monsterSpecies === "first_caught") {
          // 図鑑の最初の1匹、なければ手持ちの先頭
          const firstSpeciesId =
            (state.collection.capturedSpeciesIds && state.collection.capturedSpeciesIds[0]) ||
            state.party[0].speciesId;
          enemyMonster = dataRegistry.createMonsterInstance(firstSpeciesId, event.level || 5);
        } else {
          enemyMonster = dataRegistry.createMonsterInstance(
            event.monsterSpecies || "aribou",
            event.level || 5
          );
        }

        state.transition = {
          active: true,
          kind: "trainer-encounter",
          elapsedMs: 0,
          durationMs: animationConfig.wildEncounterTransitionMs,
          enemy: enemyMonster,
          trainerName: event.trainerName,
          introMessage: event.introMessage,
          winMessage: event.winMessage,
          loseMessage: event.loseMessage,
          rewardItem: event.rewardItem,
          resolvedEventId: event.resolvedEventId,
          unlockCondition: event.unlockCondition,
          hoveredMoveId: null,
        };
      });
      audio.playSe("encounter");
      input.clearDirections();
    }

    function beginEncounterTransition(enemyMonster) {
      input.setActionLock(true, { clearQueue: true });
      store.update((state) => {
        state.transition = {
          active: true,
          kind: "wild-encounter",
          elapsedMs: 0,
          durationMs: animationConfig.wildEncounterTransitionMs,
          enemy: enemyMonster,
        };
      });
      audio.playSe("encounter");
      input.clearDirections();
    }

    function finishTransitionIfNeeded(deltaMs) {
      // transition完了時に実際の戦闘開始やチャンピオン演出後の自動歩行へ橋渡しする。
      // transition.kindを追加したら、screen-renderer.jsの描画とここでの完了処理をセットで実装する。
      let pendingEncounter = null;
      let transitionContext = null;
      let isChampionIntro = false;

      store.update((state) => {
        if (!state.transition.active) {
          return;
        }

        state.transition.elapsedMs += deltaMs;
        if (state.transition.elapsedMs >= state.transition.durationMs) {
          isChampionIntro = state.transition.kind === "champion-intro";
          pendingEncounter = state.transition.enemy;
          transitionContext = {
            kind: state.transition.kind,
            trainerName: state.transition.trainerName,
            introMessage: state.transition.introMessage,
            winMessage: state.transition.winMessage,
            loseMessage: state.transition.loseMessage,
            rewardItem: state.transition.rewardItem,
            resolvedEventId: state.transition.resolvedEventId,
          };
          if (state.transition.event && state.transition.event.resolvedEventId) {
            state.progress[state.transition.event.resolvedEventId] = true;
          }
          state.transition = createEmptyTransition();
          if (isChampionIntro) {
            state.progress.championCutsceneActive = true;
          }
        }
      });

      if (pendingEncounter) {
        beginEncounter(pendingEncounter, transitionContext);
      }
    }

    function handleMessageCompletion(state) {
      // message列の終端で次phaseまたはフィールド復帰結果を決める。勝敗・捕獲・逃走の保存境界でもある。
      if (state.battle.nextPhase === "command") {
        state.battle.phase = "command";
        state.battle.currentMessage = "";
        return null;
      }

      if (state.battle.nextPhase === "moveSelect") {
        state.battle.phase = "moveSelect";
        state.battle.currentMessage = "";
        return null;
      }

      if (state.battle.nextPhase === "field_close") {
        const closeResult = state.battle.pendingCloseResult || { message: "" };
        state.battle.pendingCloseResult = null;
        return closeResult;
      }

      if (state.battle.nextPhase === "field_victory") {
        const playerMonster = getPlayerMonster(state);
        const enemyMonster = state.battle.enemy;
        const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
        const expGained =
          typeof state.battle.pendingExpGain === "number"
            ? state.battle.pendingExpGain
            : enemyMonster.level * 15;
        const nextLevel = getLevelAfterExp(playerMonster, expGained);
        const leveledUp = applyExpGain(playerMonster, expGained);
        state.battle.display.playerExp = playerMonster.exp || 0;

        let message;
        let gameCleared = false;
        if (state.battle.isTrainerBattle && state.battle.trainerInfo) {
          message = state.battle.trainerInfo.winMessage || `${state.battle.trainerInfo.trainerName} に 勝利した！`;
          if (state.battle.trainerInfo.resolvedEventId) {
            state.progress[state.battle.trainerInfo.resolvedEventId] = true;
            if (state.battle.trainerInfo.resolvedEventId === "game_cleared") {
               gameCleared = true;
            }
          }
        } else {
          message = leveledUp
            ? `戦闘に勝利した！\n${playerSpecies.name} は Lv${playerMonster.level} に上がった！`
            : "戦闘に勝利した！";
        }

        const rewardItem =
          (state.battle.isTrainerBattle && state.battle.trainerInfo && state.battle.trainerInfo.rewardItem) ||
          (state.timeAttack.active ? "full_heal" : null);

        if (leveledUp && state.battle.isTrainerBattle) {
          message += `\n${playerSpecies.name} は Lv${playerMonster.level} に上がった！`;
        }

        const closeResult = {
          message,
          rewardItem,
          gameCleared,
          rewardFeedbackPlayed: Boolean(rewardItem),
        };
        const resultSteps = [
          createStep("戦闘に勝利した！", createResultEffect("victory", "player"), "victory"),
        ];

        if (leveledUp) {
          resultSteps.push(
            createStep(
              `${playerSpecies.name} は Lv${nextLevel} に上がった！`,
              createResultEffect("level", "player"),
              "level_up"
            )
          );
        }

        if (rewardItem) {
          resultSteps.push(
            createStep(
              "報酬を 受け取った！",
              createResultEffect("reward", "player"),
              "item"
            )
          );
        }

        state.battle.pendingCloseResult = closeResult;
        startSequence(state, resultSteps, "field_close");
        return null;
      }

      if (state.battle.nextPhase === "field_capture") {
        const closeResult = {
          message: "つかまえた相手と 手持ちを入れ替えた！",
          capturedSpeciesId: state.battle.enemy.speciesId,
          capturedLevel: state.battle.enemy.level,
          capturedMonster: state.battle.enemy,
        };
        state.battle.pendingCloseResult = closeResult;
        startSequence(
          state,
          [createStep("手持ちに迎えた！", createResultEffect("capture", "player"), "capture")],
          "field_close"
        );
        return null;
      }

      if (state.battle.nextPhase === "field_run") {
        return { message: "うまく戦闘を離れました。" };
      }

      if (state.battle.nextPhase === "field_defeat") {
        return { message: "力尽きてしまった…", gameOver: true };
      }

      return null;
    }

    function advanceMessage() {
      let closeResult = null;
      let chargingMoveId = null;

      store.update((state) => {
        if (!state.battle || state.battle.phase !== "message" || state.battle.animation) {
          return;
        }

        if (state.battle.steps.length > 0) {
          showStep(state, state.battle.steps.shift());
          return;
        }

        closeResult = handleMessageCompletion(state);

        if (!closeResult && state.battle.phase === "command") {
          const playerMonster = getPlayerMonster(state);
          if (playerMonster && playerMonster.charging) {
            chargingMoveId = playerMonster.charging;
          }
        }
      });

      if (chargingMoveId) {
        selectMove(chargingMoveId);
        return;
      }

      if (closeResult) {
        store.update((state) => {
          applyBattleClose(state, closeResult);
        });
        input.setActionLock(false, { clearQueue: true });
        if (closeResult.rewardItem && !closeResult.rewardFeedbackPlayed) {
          audio.playSe("item");
        }
        openCaptureRecordModal(closeResult);
      }
    }

    function findMoveIndex(monster, moveId) {
      return monster.moveIds.findIndex((currentMoveId) => currentMoveId === moveId);
    }

    function trySpendPp(monster, moveId) {
      // PP消費は選択時に行う。溜め技の2ターン目だけはselectMove/queueEnemyTurn側で消費をスキップする。
      const moveIndex = findMoveIndex(monster, moveId);
      if (moveIndex < 0 || monster.currentPp[moveIndex] <= 0) {
        return false;
      }

      monster.currentPp[moveIndex] -= 1;
      return true;
    }

    function attemptMoveHit(move, defender) {
      if (defender && defender.evasionUp) {
        return random.percent(Math.floor(move.accuracy * 0.5), "move_accuracy");
      }
      return random.percent(move.accuracy, "move_accuracy");
    }

    function getUsableMoveIds(monster) {
      return monster.moveIds.filter((moveId) => {
        const moveIndex = findMoveIndex(monster, moveId);
        return moveIndex >= 0 && monster.currentPp[moveIndex] > 0;
      });
    }

    function chooseEnemyMoveId(enemyMonster) {
      if (enemyMonster.charging) {
        return enemyMonster.charging;
      }

      const usableMoveIds = getUsableMoveIds(enemyMonster);
      if (usableMoveIds.length === 0) {
        return "";
      }

      const healMoveId = usableMoveIds.find((moveId) => {
        const move = dataRegistry.getMove(moveId);
        return move && (move.effect === "random_heal" || move.effect === "swimming_regen");
      });
      const attackMoveIds = usableMoveIds.filter((moveId) => {
        const move = dataRegistry.getMove(moveId);
        return move && move.effect !== "random_heal" && move.effect !== "swimming_regen";
      });
      const hpRatio = enemyMonster.currentHp / Math.max(1, enemyMonster.maxHp);

      if (healMoveId && enemyMonster.currentHp < enemyMonster.maxHp) {
        if (hpRatio <= 0.35 || attackMoveIds.length === 0) {
          return healMoveId;
        }

        if (hpRatio <= 0.65 && random.chance(0.4, "enemy_heal_choice")) {
          return healMoveId;
        }
      }

      return attackMoveIds[0] || healMoveId || usableMoveIds[0];
    }

    function chooseWeightedWaterForm(move) {
      const forms = Array.isArray(move.forms) ? move.forms : [];
      const totalWeight = forms.reduce((total, form) => total + Math.max(0, form.weight || 0), 0);
      if (!forms.length || totalWeight <= 0) {
        return {
          label: "参ノ型(さんのかた)",
          power: move.power || 42,
        };
      }

      let cursor = random.range(0, totalWeight, `${move.id}_form`);
      for (const form of forms) {
        cursor -= Math.max(0, form.weight || 0);
        if (cursor <= 0) {
          return form;
        }
      }
      return forms[forms.length - 1];
    }

    function appendSwimmingRegenStep(steps, monster, label, target) {
      if (!monster || !monster.swimmingTurns) {
        return;
      }

      if (monster.swimmingJustStarted) {
        delete monster.swimmingJustStarted;
        return;
      }

      const fromHp = monster.currentHp;
      const healRatio = monster.swimmingHealRatio || 0.12;
      const healAmount = Math.max(1, Math.round(monster.maxHp * healRatio));
      monster.currentHp = Math.min(monster.maxHp, monster.currentHp + healAmount);
      monster.swimmingTurns -= 1;

      if (monster.currentHp > fromHp) {
        steps.push(
          createStep(
            `${label} は 水の流れで ${monster.currentHp - fromHp} HP かいふくした！`,
            {
              kind: "heal",
              target,
              fromHp,
              toHp: monster.currentHp,
            },
            "heal"
          )
        );
      }

      if (monster.swimmingTurns <= 0) {
        delete monster.swimmingTurns;
        delete monster.swimmingHealRatio;
        steps.push(createStep(`${label}の スイミングが おさまった。`));
      }
    }

    function createIceWallResult(attacker, defender, damage) {
      if (!defender || !defender.iceWallTurns || damage <= 0) {
        return {
          damage,
          reflectedDamage: 0,
          expired: false,
        };
      }

      const reducedDamage = Math.max(1, Math.floor(damage * 0.65));
      const reflectedDamage = Math.max(
        1,
        Math.min(attacker.currentHp, Math.ceil(damage * 0.25))
      );
      defender.iceWallTurns -= 1;
      const expired = defender.iceWallTurns <= 0;
      if (expired) {
        delete defender.iceWallTurns;
      }

      return {
        damage: reducedDamage,
        reflectedDamage,
        expired,
      };
    }

    function appendIceWallReflectSteps(steps, attacker, wallResult, hpTargets) {
      if (!wallResult.reflectedDamage || attacker.currentHp <= 0) {
        if (wallResult.expired) {
          steps.push(createStep("こおりのかべが くだけた！"));
        }
        return;
      }

      const fromHp = attacker.currentHp;
      attacker.currentHp = Math.max(0, attacker.currentHp - wallResult.reflectedDamage);
      steps.push(
        createStep(
          "こおりのかべが こうげきを はねかえした！",
          {
            kind: "damage",
            target: hpTargets.attacker,
            fromHp,
            toHp: attacker.currentHp,
          },
          "hit"
        )
      );

      if (wallResult.expired) {
        steps.push(createStep("こおりのかべが くだけた！"));
      }
    }

    function getMoveSoundId(move) {
      const typeSoundIds = {
        "くさ": "grass_move",
        "みず": "water_move",
        "こおり": "ice",
        "はがね": "steel_move",
        "ほのお": "fire_move",
      };
      return (move && typeSoundIds[move.type]) || "move";
    }

    function buildAttackSequence(
      attacker,
      defender,
      moveId,
      attackerLabel,
      defenderLabel,
      hpTargets
    ) {
      // 技効果はここに集約。moves.jsのeffect追加時は、UI説明文と敵AI選択もあわせて確認する。
      const move = dataRegistry.getMove(moveId);

      if (move.effect === "charge_attack") {
        if (attacker.charging !== move.id) {
          attacker.charging = move.id;
          return {
            steps: [createStep(`${attackerLabel}は ネジをまいている！`)],
            defeated: false,
          };
        } else {
          attacker.charging = null;
        }
      } else {
        attacker.charging = null;
      }

      const attackEffect =
        move.power > 0
          ? {
              kind: "attack",
              target: hpTargets.attacker,
              moveType: move.type,
            }
          : null;
      const steps = [
        createStep(
          `${attackerLabel}の ${move.name}！`,
          attackEffect,
          getMoveSoundId(move)
        ),
      ];

      if (move.effect === "evasion_up") {
        attacker.evasionUp = true;
        steps.push(createStep(`${attackerLabel}は 身軽になった！`));
        return { steps, defeated: false };
      }

      if (move.effect === "ice_wall") {
        attacker.iceWallTurns = 2;
        steps.push(
          createStep(
            `${attackerLabel}は こおりのかべを はった！`,
            {
              kind: "ice_wall",
              target: hpTargets.attacker,
            },
            "ice_wall"
          )
        );
        return { steps, defeated: false, attackerDefeated: false };
      }

      if (move.effect === "swimming_regen") {
        attacker.swimmingTurns = move.healTurns || 4;
        attacker.swimmingHealRatio = move.healRatio || 0.12;
        attacker.swimmingJustStarted = true;
        steps.push(
          createStep(
            `${attackerLabel}は 水の流れに のった！`,
            {
              kind: "heal",
              target: hpTargets.attacker,
              fromHp: attacker.currentHp,
              toHp: attacker.currentHp,
            },
            "water_move"
          )
        );
        return { steps, defeated: false };
      }

      if (move.effect === "damage_boost") {
        attacker.nextDamageBoost = 2;
        steps.push(createStep(`${attackerLabel}は 筋肉を いじめぬいている！`));
        return { steps, defeated: false };
      }

      if (!attemptMoveHit(move, defender)) {
        attacker.nextDamageBoost = 1;
        steps.push(
          createStep(
            "しかし こうげきは はずれた！",
            {
              kind: "miss",
              target: hpTargets.defender,
              moveType: move.type,
            },
            "miss"
          )
        );
        return {
          steps,
          defeated: false,
        };
      }

      if (move.effect === "random_heal") {
        attacker.nextDamageBoost = 1;
        const fromHp = attacker.currentHp;
        const missingHp = Math.max(0, attacker.maxHp - attacker.currentHp);
        if (missingHp <= 0) {
          steps.push(createStep("しかし HPは これいじょう かいふくしない。"));
          return {
            steps,
            defeated: false,
          };
        }

        const healRatio = random.range(
          move.healRatioMin || 0.2,
          move.healRatioMax || 0.35,
          `${move.id}_heal_ratio`
        );
        const requestedHeal = Math.max(1, Math.round(attacker.maxHp * healRatio));
        attacker.currentHp = Math.min(attacker.maxHp, attacker.currentHp + requestedHeal);
        const healedAmount = attacker.currentHp - fromHp;

        steps.push(
          createStep(
            `${attackerLabel} は ${healedAmount} HP かいふくした！`,
            {
              kind: "heal",
              target: hpTargets.attacker,
              fromHp,
              toHp: attacker.currentHp,
            },
            "heal"
          )
        );

        return {
          steps,
          defeated: false,
        };
      }

      if (move.effect === "chance_big_damage") {
        const damageMultiplier = attacker.nextDamageBoost || 1;
        attacker.nextDamageBoost = 1;
        if (damageMultiplier > 1) {
          steps.push(createStep("きんとれの せいかが はっきされた！"));
        }

        const activated = random.chance(move.triggerChance || 0.5, `${move.id}_trigger`);
        if (!activated) {
          steps.push(createStep(move.failText || "しかし うまく きまらなかった。"));
          return {
            steps,
            defeated: false,
          };
        }

        steps.push(createStep(move.successText || "うまく きまった！"));

        const fromHp = defender.currentHp;
        const outcome = dataRegistry.computeDamage(attacker, defender, move.id, { damageMultiplier });
        const scaledDamage = Math.max(
          Math.round(outcome.damage * (move.damageMultiplier || 2)),
          Math.round(defender.maxHp * (move.minimumDamageRatio || 0))
        );
        const wallResult = createIceWallResult(attacker, defender, scaledDamage);
        const appliedDamage = Math.max(1, Math.min(defender.currentHp, wallResult.damage));
        defender.currentHp = Math.max(0, defender.currentHp - appliedDamage);

        steps.push(
          createStep(
            `${defenderLabel} に ${appliedDamage} ダメージ！`,
            {
              kind: "damage",
              target: hpTargets.defender,
              fromHp,
              toHp: defender.currentHp,
              moveType: move.type,
              typeMultiplier: outcome.typeMultiplier,
            },
            "hit"
          )
        );
        appendIceWallReflectSteps(steps, attacker, wallResult, hpTargets);

        if (outcome.typeMultiplier > 1) {
          steps.push(createStep("効果は 非常に大きい！"));
        } else if (outcome.typeMultiplier < 1) {
          steps.push(createStep("効果は あまりないようだ。"));
        }

        return {
          steps,
          defeated: defender.currentHp <= 0,
          attackerDefeated: attacker.currentHp <= 0,
        };
      }

      if (move.effect === "water_forms") {
        const damageMultiplier = attacker.nextDamageBoost || 1;
        attacker.nextDamageBoost = 1;
        if (damageMultiplier > 1) {
          steps.push(createStep("きんとれの せいかが はっきされた！"));
        }

        const form = chooseWeightedWaterForm(move);
        steps.push(createStep(`${form.label}！`));

        const fromHp = defender.currentHp;
        const outcome = dataRegistry.computeDamage(attacker, defender, move.id, {
          damageMultiplier,
          powerOverride: form.power || move.power,
        });
        const wallResult = createIceWallResult(attacker, defender, outcome.damage);
        defender.currentHp = Math.max(0, defender.currentHp - wallResult.damage);

        steps.push(
          createStep(
            `${defenderLabel} に ${wallResult.damage} ダメージ！`,
            {
              kind: "damage",
              target: hpTargets.defender,
              fromHp,
              toHp: defender.currentHp,
              moveType: move.type,
              typeMultiplier: outcome.typeMultiplier,
            },
            "hit"
          )
        );
        appendIceWallReflectSteps(steps, attacker, wallResult, hpTargets);

        if (outcome.typeMultiplier > 1) {
          steps.push(createStep("効果は 非常に大きい！"));
        } else if (outcome.typeMultiplier < 1) {
          steps.push(createStep("効果は あまりないようだ。"));
        }

        return {
          steps,
          defeated: defender.currentHp <= 0,
          attackerDefeated: attacker.currentHp <= 0,
        };
      }

      if (move.effect === "chance_full_heal") {
        attacker.nextDamageBoost = 1;
        const activated = random.chance(0.6, `${move.id}_trigger`);
        if (!activated) {
          steps.push(createStep("自分がダメージを受けていたことを忘れて全回復、、、だめだ、やっぱり忘れられない！"));
          return { steps, defeated: false };
        }
        
        const fromHp = attacker.currentHp;
        attacker.currentHp = attacker.maxHp;
        const healedAmount = attacker.currentHp - fromHp;
        
        if (healedAmount <= 0) {
           steps.push(createStep("しかし HPは これいじょう かいふくしない。"));
           return { steps, defeated: false };
        }
        
        steps.push(createStep(
          `${attackerLabel} は HPが ぜんかいふくした！`,
          {
            kind: "heal",
            target: hpTargets.attacker,
            fromHp,
            toHp: attacker.currentHp,
          },
          "heal"
        ));
        
        return { steps, defeated: false };
      }

      if (move.effect === "ai_weakness_attack") {
        steps.push(createStep("AIのぶんせきにより、じゃくてんをついた！"));
      }

      const damageMultiplier = attacker.nextDamageBoost || 1;
      attacker.nextDamageBoost = 1;
      if (damageMultiplier > 1) {
        steps.push(createStep("きんとれの せいかが はっきされた！"));
      }

      const fromHp = defender.currentHp;
      const outcome = dataRegistry.computeDamage(attacker, defender, move.id, { damageMultiplier });
      const wallResult = createIceWallResult(attacker, defender, outcome.damage);
      defender.currentHp = Math.max(0, defender.currentHp - wallResult.damage);

      steps.push(
        createStep(
          `${defenderLabel} に ${wallResult.damage} ダメージ！`,
          {
            kind: "damage",
            target: hpTargets.defender,
            fromHp,
            toHp: defender.currentHp,
            moveType: move.type,
            typeMultiplier: outcome.typeMultiplier,
          },
          "hit"
        )
      );
      appendIceWallReflectSteps(steps, attacker, wallResult, hpTargets);

      if (outcome.typeMultiplier > 1) {
        steps.push(createStep("効果は 非常に大きい！"));
      } else if (outcome.typeMultiplier < 1) {
        steps.push(createStep("効果は あまりないようだ。"));
      }

      return {
        steps,
        defeated: defender.currentHp <= 0,
        attackerDefeated: attacker.currentHp <= 0,
      };
    }

    function queueEnemyTurn(state, steps) {
      // プレイヤー行動後に敵行動を同じstepsへ連結する。捕獲失敗やアイテム使用後もここを通る。
      const playerMonster = getPlayerMonster(state);
      const enemyMonster = state.battle.enemy;
      const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
      const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);
      const enemyMoveId = chooseEnemyMoveId(enemyMonster);
      appendSwimmingRegenStep(steps, playerMonster, playerSpecies.name, "player");

      // 敵の溜め技継続時はPP消費をスキップ
      const isChagingContinuation = enemyMonster.charging === enemyMoveId;
      if (!enemyMoveId || (!isChagingContinuation && !trySpendPp(enemyMonster, enemyMoveId))) {
        steps.push(createStep(`やせいの ${enemySpecies.name} は うごけない！`));
        startSequence(state, steps, "command");
        return;
      }
      const enemyTurn = buildAttackSequence(
        enemyMonster,
        playerMonster,
        enemyMoveId,
        `やせいの ${enemySpecies.name}`,
        playerSpecies.name,
        {
          attacker: "enemy",
          defender: "player",
        }
      );
      steps.push(...enemyTurn.steps);

      if (enemyTurn.attackerDefeated) {
        const expGained = enemyMonster.level * 15;
        state.battle.pendingExpGain = expGained;
        steps.push(
          createStep(
            `やせいの ${enemySpecies.name} は たおれた！`,
            {
              kind: "faint",
              target: "enemy",
            },
            "faint"
          )
        );
        steps.push(
          createStep(
            `${playerSpecies.name} は\n${expGained} の 経験値を 獲得した！`,
            createExpGainEffect(playerMonster, expGained),
            "exp"
          )
        );
        startSequence(state, steps, "field_victory");
        return;
      }

      if (enemyTurn.defeated) {
        steps.push(
          createStep(
            `${playerSpecies.name} は たおれた！`,
            {
              kind: "faint",
              target: "player",
            },
            "faint"
          )
        );
        startSequence(state, steps, "field_defeat");
        return;
      }

      appendSwimmingRegenStep(steps, enemyMonster, `やせいの ${enemySpecies.name}`, "enemy");
      startSequence(state, steps, "command");
    }

    function openMoveMenu() {
      store.update((state) => {
        if (!state.battle) {
          return;
        }
        state.battle.phase = "moveSelect";
        state.battle.currentMessage = "";
      });
    }

    function backToCommand() {
      store.update((state) => {
        if (!state.battle) {
          return;
        }
        state.battle.phase = "command";
        state.battle.currentMessage = "";
      });
    }

    function openItemMenu() {
      store.update((state) => {
        if (!state.battle) {
          return;
        }
        state.battle.phase = "itemSelect";
        state.battle.currentMessage = "";
      });
    }

    function hoverMove(moveId) {
      // 技ホバーの説明表示用状態。戦闘ロジックには使わないが、ui.jsの再描画条件と結合している。
      store.update((state) => {
        if (!state.battle) return;
        state.battle.hoveredMoveId = moveId;
      });
    }

    function selectMove(moveId) {
      // プレイヤーの技選択入口。PP、溜め技、敵反撃、勝利遷移をここから一気に組み立てる。
      store.update((state) => {
        if (!state.battle) {
          return;
        }

        const playerMonster = getPlayerMonster(state);
        const enemyMonster = state.battle.enemy;
        const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
        const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);

        // 溜め中の技を継続して放つ場合は、PP消費をスキップする
        const isChagingContinuation = playerMonster.charging === moveId;
        if (!isChagingContinuation && !trySpendPp(playerMonster, moveId)) {
          startSequence(state, [createStep("PPが たりません。", null, "error")], "command");
          return;
        }

        const enemyLabel = state.battle.isTrainerBattle && state.battle.trainerInfo
          ? `${state.battle.trainerInfo.trainerName} の ${enemySpecies.name}`
          : `やせいの ${enemySpecies.name}`;

        const attack = buildAttackSequence(
          playerMonster,
          enemyMonster,
          moveId,
          playerSpecies.name,
          enemyLabel,
          {
            attacker: "player",
            defender: "enemy",
          }
        );
        const steps = attack.steps.slice();

        if (attack.defeated) {
          const expGained = enemyMonster.level * 15;
          state.battle.pendingExpGain = expGained;
          steps.push(
            createStep(
              `${enemyLabel} は たおれた！`,
              {
                kind: "faint",
                target: "enemy",
              },
              "faint"
            )
          );
          steps.push(
            createStep(
              `${playerSpecies.name} は\n${expGained} の 経験値を 獲得した！`,
              createExpGainEffect(playerMonster, expGained),
              "exp"
            )
          );
          startSequence(state, steps, "field_victory");
          return;
        }

        if (attack.attackerDefeated) {
          steps.push(
            createStep(
              `${playerSpecies.name} は たおれた！`,
              {
                kind: "faint",
                target: "player",
              },
              "faint"
            )
          );
          startSequence(state, steps, "field_defeat");
          return;
        }

        queueEnemyTurn(state, steps);
      });
    }

    function throwBall() {
      // 通常ボールは消費数を持たない仕様。捕獲成功時は手持ち1体ルールにより相手と入れ替える。
      store.update((state) => {
        if (!state.battle) {
          return;
        }

        if (state.battle.isTrainerBattle) {
          startSequence(state, [createStep("人のモンスターを とったら どろぼう！", null, "error")], "command");
          return;
        }

        const enemyMonster = state.battle.enemy;
        const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);
        const healthRatio = enemyMonster.currentHp / enemyMonster.maxHp;
        const baseChance = (enemySpecies.catchRate / 255) * (1 - healthRatio * 0.65);
        const success = random.chance(baseChance, "capture_roll");
        const shakes = success ? 3 : Math.max(1, Math.min(2, Math.floor(baseChance * 4)));
        const steps = [
          createStep("キャプチャーボールを なげた！", {
            kind: "ball",
            phase: "throw",
            success,
            ballType: "normal",
          }, "ball"),
        ];

        for (let count = 0; count < shakes; count += 1) {
          steps.push(createStep("カタカタ…", {
            kind: "ball",
            phase: "shake",
            success,
            shakeIndex: count + 1,
            totalShakes: shakes,
            ballType: "normal",
          }, "shake"));
        }

        if (success) {
          steps.push(createStep("カチッ！", {
            kind: "ball",
            phase: "lock",
            success: true,
            ballType: "normal",
          }, "capture_lock"));
          steps.push(createStep(`${enemySpecies.name} を つかまえた！`, {
            kind: "ball",
            phase: "complete",
            success: true,
            ballType: "normal",
          }, "capture"));
          startSequence(state, steps, "field_capture");
          return;
        }

        steps.push(createStep("ざんねん！ つかまらなかった！", {
          kind: "ball",
          phase: "release",
          success: false,
          ballType: "normal",
        }, "capture_fail"));
        queueEnemyTurn(state, steps);
      });
    }

    function throwMasterBall() {
      // パーフェクトボールは所持数を消費し、野生戦のみ確定捕獲。トレーナー戦では通常ボール同様に禁止する。
      store.update((state) => {
        if (!state.battle) {
          return;
        }

        if (state.battle.isTrainerBattle) {
          startSequence(state, [createStep("人のモンスターを とったら どろぼう！", null, "error")], "command");
          return;
        }

        if (!canUseMasterBall(state)) {
          startSequence(state, [createStep("パーフェクトボールが ありません。", null, "error")], "command");
          return;
        }

        state.inventory.masterBallCount -= 1;
        const enemyMonster = state.battle.enemy;
        const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);
        const success = true;
        const shakes = 3;
        const steps = [
          createStep("パーフェクトボールを なげた！", {
            kind: "ball",
            phase: "throw",
            success,
            ballType: "master",
          }, "ball"),
        ];

        for (let count = 0; count < shakes; count += 1) {
          steps.push(createStep("カタカタ…", {
            kind: "ball",
            phase: "shake",
            success,
            shakeIndex: count + 1,
            totalShakes: shakes,
            ballType: "master",
          }, "shake"));
        }

        steps.push(createStep("カチッ！", {
          kind: "ball",
          phase: "lock",
          success: true,
          ballType: "master",
        }, "capture_lock"));
        steps.push(createStep(`${enemySpecies.name} を つかまえた！`, {
          kind: "ball",
          phase: "complete",
          success: true,
          ballType: "master",
        }, "capture"));
        startSequence(state, steps, "field_capture");
      });
    }

    function useFullHeal() {
      store.update((state) => {
        if (!state.battle) {
          return;
        }

        if (!canUseFullHeal(state)) {
          startSequence(state, [createStep("回復薬は つかえない。", null, "error")], "command");
          return;
        }

        const playerMonster = getPlayerMonster(state);
        const fromHp = playerMonster.currentHp;
        state.inventory.fullHealCount -= 1;
        playerMonster.currentHp = playerMonster.maxHp;

        const steps = [
          createStep(
            "回復薬を つかった！",
            {
              kind: "heal",
              target: "player",
              fromHp,
              toHp: playerMonster.maxHp,
            },
            "heal"
          ),
        ];

        queueEnemyTurn(state, steps);
      });
    }

    function autoAdvanceMessage(deltaMs) {
      let shouldAdvance = false;

      store.update((state) => {
        if (!state.battle || state.battle.phase !== "message" || state.battle.animation) {
          return;
        }

        state.battle.messageElapsedMs =
          (state.battle.messageElapsedMs || 0) + deltaMs;

        if (state.battle.messageElapsedMs >= getMessageAutoAdvanceMs(state.battle.currentMessage)) {
          shouldAdvance = true;
        }
      });

      if (shouldAdvance) {
        advanceMessage();
      }
    }

    function attemptRun() {
      store.update((state) => {
        if (!state.battle) {
          return;
        }
        if (state.battle.isTrainerBattle) {
          startSequence(state, [createStep("トレーナーとの 戦いからは にげられない！", null, "error")], "command");
          return;
        }
        startSequence(state, [createStep("うまく にげきれた！", null, "run")], "field_run");
      });
    }

    function getCaptureBallPoint(progress) {
      const clamped = Math.min(1, Math.max(0, progress));
      return {
        x: ballConfig.startX + (ballConfig.endX - ballConfig.startX) * clamped,
        y:
          (1 - clamped) * (1 - clamped) * ballConfig.startY +
          2 * (1 - clamped) * clamped * ballConfig.curveY +
          clamped * clamped * ballConfig.endY,
      };
    }

    function playAnimationTick(animation, progress, soundId, tickCount) {
      const clamped = Math.min(1, Math.max(0, progress));
      const totalTicks = Math.max(1, tickCount || 1);
      const tickIndex = Math.min(totalTicks, Math.floor(clamped * totalTicks) + 1);
      if (tickIndex <= (animation.soundTickIndex || 0)) {
        return;
      }

      animation.soundTickIndex = tickIndex;
      audio.playSe(soundId);
    }

    function updateAnimation(state, deltaMs) {
      // HP表示は実HPではなくbattle.displayを補間して見せる。UIのHPカードはこのdisplay値を読む。
      if (!state.battle || !state.battle.animation) {
        return;
      }

      const animation = state.battle.animation;
      animation.elapsedMs += deltaMs;

      if (animation.kind === "damage" || animation.kind === "heal") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        const eased = 1 - Math.pow(1 - progress, 2);
        const currentHp =
          animation.fromHp + (animation.toHp - animation.fromHp) * eased;
        state.battle.display[`${animation.target}Hp`] = currentHp;
        const hpDelta = Math.abs((animation.fromHp || 0) - (animation.toHp || 0));
        if (
          animation.kind === "damage" &&
          animation.toHp < animation.fromHp &&
          hpDelta > 0 &&
          progress < 1
        ) {
          const tickCount = Math.min(8, Math.max(2, Math.ceil(hpDelta / 5)));
          playAnimationTick(animation, progress, "hp_down", tickCount);
        }
        if (progress >= 1) {
          state.battle.display[`${animation.target}Hp`] = animation.toHp;
          state.battle.animation = null;
        }
      } else if (animation.kind === "attack") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        if (progress >= 1) {
          state.battle.animation = null;
        }
      } else if (animation.kind === "ice_wall") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        if (progress >= 1) {
          state.battle.animation = null;
        }
      } else if (animation.kind === "miss") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        if (progress >= 1) {
          state.battle.animation = null;
        }
      } else if (animation.kind === "faint") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        if (progress >= 1) {
          state.battle.fainted = state.battle.fainted || {};
          state.battle.fainted[animation.target] = true;
          state.battle.animation = null;
        }
      } else if (animation.kind === "exp") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        const eased = 1 - Math.pow(1 - progress, 3);
        state.battle.display.playerExp =
          animation.fromExp + (animation.toExp - animation.fromExp) * eased;
        if (animation.toExp > animation.fromExp && progress < 1) {
          playAnimationTick(animation, progress, "exp_tick", 5);
        }
        if (progress >= 1) {
          state.battle.display.playerExp = animation.toExp;
          state.battle.animation = null;
        }
      } else if (animation.kind === "result") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        if (progress >= 1) {
          state.battle.animation = null;
        }
      } else if (animation.kind === "ball") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);

        if (animation.phase === "throw") {
          const point = getCaptureBallPoint(progress);
          const trailPoint = progress > 0.08 ? getCaptureBallPoint(progress - 0.11) : null;
          state.battle.captureBall = {
            phase: "throw",
            x: point.x,
            y: point.y,
            hideEnemy: progress >= (ballConfig.absorbAt || 0.62),
            open: 0,
            progress,
            success: animation.success,
            trailX: trailPoint ? trailPoint.x : null,
            trailY: trailPoint ? trailPoint.y : null,
            ballType: animation.ballType || "normal",
          };
        } else if (animation.phase === "shake") {
          const shakeOffset =
            Math.sin(progress * Math.PI * (ballConfig.shakeCycles || 4)) *
            (ballConfig.shakePixels || 3);
          state.battle.captureBall = {
            phase: "shake",
            x: ballConfig.endX + shakeOffset,
            y: ballConfig.endY,
            hideEnemy: true,
            open: 0,
            progress,
            success: animation.success,
            shakeIndex: animation.shakeIndex || 0,
            totalShakes: animation.totalShakes || 0,
            ballType: animation.ballType || "normal",
          };
        } else if (animation.phase === "lock") {
          const clickOffset = Math.sin(progress * Math.PI) * 1.5;
          state.battle.captureBall = {
            phase: "lock",
            x: ballConfig.endX + clickOffset,
            y: ballConfig.endY,
            hideEnemy: true,
            open: 0,
            progress,
            flash: Math.max(0, 1 - progress),
            success: true,
            ballType: animation.ballType || "normal",
          };
        } else if (animation.phase === "complete") {
          const pulseOffset = Math.sin(progress * Math.PI) * 1.2;
          state.battle.captureBall = {
            phase: "complete",
            x: ballConfig.endX + pulseOffset,
            y: ballConfig.endY,
            hideEnemy: true,
            open: 0,
            progress,
            flash: Math.max(0, 1 - progress),
            success: true,
            ballType: animation.ballType || "normal",
          };
        } else if (animation.phase === "release") {
          const open = Math.min(1, progress * 1.35);
          state.battle.captureBall =
            progress < (ballConfig.releaseHideAt || 0.55)
              ? {
                  phase: "release",
                  x: ballConfig.endX,
                  y: ballConfig.endY,
                  hideEnemy: true,
                  open,
                  progress,
                  success: false,
                  ballType: animation.ballType || "normal",
                }
              : null;
        }

        if (progress >= 1) {
          if (
            animation.phase === "throw" ||
            animation.phase === "shake" ||
            animation.phase === "lock" ||
            animation.phase === "complete"
          ) {
            state.battle.captureBall = {
              phase: "hold",
              x: ballConfig.endX,
              y: ballConfig.endY,
              hideEnemy: true,
              open: 0,
              ballType: animation.ballType || "normal",
            };
          } else if (animation.phase === "release") {
            state.battle.captureBall = null;
          }
          state.battle.animation = null;
        }
      }
    }

    function update(deltaMs) {
      // 遷移、アニメーション、モーダル、phase入力をこの順で処理する。順序を変えるとロック解除や自動送りが崩れやすい。
      const rootState = store.getState();

      if (rootState.transition.active) {
        if (!modal.isOpen()) {
          finishTransitionIfNeeded(deltaMs);
        }
        return;
      }

      if (rootState.scene !== "battle" || !rootState.battle) {
        return;
      }

      store.update((state) => {
        updateAnimation(state, deltaMs);
      });

      const state = store.getState();
      if (!state.battle.animation && input.isActionLocked()) {
        input.setActionLock(false);
      }
      if (modal.isOpen()) {
        return;
      }

      if (state.battle.phase === "message") {
        if (input.consumeAction("confirm")) {
          audio.playSe("message");
          advanceMessage();
          return;
        }
        input.clearActions([
          "confirm",
          "cancel",
          "menu",
          "battle_open_move_menu",
          "battle_throw_ball",
          "battle_throw_master_ball",
          "battle_attempt_run",
          "battle_use_item",
          "battle_use_full_heal",
          "battle_use_master_ball",
          "battle_select_move",
        ]);
        autoAdvanceMessage(deltaMs);
        return;
      }

      input.clearActions("menu");

      if (state.battle.phase === "command") {
        if (input.consumeAction("battle_open_move_menu")) {
          input.clearActions();
          audio.playSe("confirm");
          openMoveMenu();
          return;
        }

        if (input.consumeAction("battle_throw_ball")) {
          input.clearActions();
          audio.playSe("confirm");
          throwBall();
          return;
        }

        if (input.consumeAction("battle_throw_master_ball")) {
          input.clearActions();
          audio.playSe("confirm");
          throwMasterBall();
          return;
        }

        if (input.consumeAction("battle_attempt_run")) {
          input.clearActions();
          audio.playSe("confirm");
          attemptRun();
          return;
        }

        if (input.consumeAction("battle_use_item")) {
          input.clearActions();
          audio.playSe("confirm");
          openItemMenu();
          return;
        }
      }

      if (state.battle.phase === "itemSelect") {
        if (input.consumeAction("battle_use_full_heal")) {
          input.clearActions();
          audio.playSe("confirm");
          useFullHeal();
          return;
        }

        if (input.consumeAction("battle_use_master_ball")) {
          input.clearActions();
          audio.playSe("confirm");
          throwMasterBall();
          return;
        }
      }

      if (state.battle.phase === "moveSelect") {
        const moveCommand = input.consumeCommand("battle_select_move");
        if (moveCommand && moveCommand.payload) {
          input.clearActions();
          audio.playSe("confirm");
          selectMove(moveCommand.payload.moveId);
          return;
        }
      }

      if (
        input.consumeAction("cancel") &&
        (state.battle.phase === "moveSelect" || state.battle.phase === "itemSelect")
      ) {
        input.clearActions();
        audio.playSe("cancel");
        backToCommand();
      }
    }

    return {
      beginEncounterTransition,
      advanceMessage,
      openMoveMenu,
      backToCommand,
      hoverMove,
      selectMove,
      throwBall,
      throwMasterBall,
      attemptRun,
      update,
    };
  }

  App.scenes.createBattleScene = createBattleScene;
})();

</script>
    <script>
/* --- scripts/scenes/field-scene.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// フィールド移動、会話/拾得/ワープ/遭遇イベントを担当するscene。
// マップ定義、地形通行可否、progress.resolvedEventIds、battleScene起動が強く結合している。
(() => {
  const App = window.MonsterPrototype;

  function createFieldScene({
    store,
    dataRegistry,
    battleScene,
    input,
    modal,
    audio,
    random,
    openMenu,
  }) {
    const directionVectors = {
      up: { x: 0, y: -1 },
      right: { x: 1, y: 0 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
    };

    const tileConfig = App.config.game.fieldTiles;
    const moveDuration = App.config.game.timing.moveDurationMs;
    const runMoveDuration = App.config.game.timing.runMoveDurationMs || moveDuration * 0.62;
    const fieldAnimation = App.config.game.animation.field || {};
    const blockedFeedbackCooldownMs =
      App.config.game.timing.blockedFeedbackCooldownMs || 420;

    function currentMap(state) {
      return dataRegistry.getMap(state.field.mapId);
    }

    function getTileCode(mapDef, x, y) {
      if (y < 0 || y >= mapDef.rows.length || x < 0 || x >= mapDef.rows[0].length) {
        return "#";
      }
      return mapDef.rows[y][x];
    }

    function isEventResolved(state, eventId) {
      return (state.progress.resolvedEventIds || []).includes(eventId);
    }

    function getActiveEvents(state, mapDef) {
      return (mapDef.events || []).filter((event) => !isEventResolved(state, event.id));
    }

    function findEvent(state, mapDef, x, y, predicate) {
      return getActiveEvents(state, mapDef).find((event) => {
        return event.x === x && event.y === y && (!predicate || predicate(event));
      });
    }

    function isEventLocked(state, event) {
      // unlockConditionはprep_completeだけ特別扱いし、それ以外はprogress上の真偽値を見る。
      // maps.jsで条件を増やす場合はここを拡張する。
      if (!event || !event.unlockCondition) {
        return false;
      }

      if (event.unlockCondition === "prep_complete") {
        return !(state.progress && state.progress.prepGateUnlocked);
      }

      return !state.progress[event.unlockCondition];
    }

    function isBlockingEvent(event) {
      return event.trigger === "interact";
    }

    function isPassable(state, mapDef, x, y) {
      const tile = tileConfig[getTileCode(mapDef, x, y)];
      if (!tile || !tile.passable) {
        return false;
      }

      return !findEvent(state, mapDef, x, y, isBlockingEvent);
    }

    function rememberResolvedEvent(state, eventId) {
      if (!state.progress.resolvedEventIds.includes(eventId)) {
        state.progress.resolvedEventIds.push(eventId);
      }
    }

    function setFieldMessage(state, message, kind = "talk") {
      state.field.message = message || "";
      state.field.messageKind = message ? kind : "";
    }

    function applyWarp(state, event) {
      // ワープ時は移動補間情報も移動先へ揃える。x/yだけ変えると次フレームで旧座標から補間される。
      state.field.mapId = event.targetMapId;
      state.field.player.x = event.target.x;
      state.field.player.y = event.target.y;
      state.field.player.fromX = event.target.x;
      state.field.player.fromY = event.target.y;
      state.field.player.toX = event.target.x;
      state.field.player.toY = event.target.y;
      state.field.player.direction = event.target.direction || state.field.player.direction;
      state.field.player.moving = false;
      state.field.player.progress = 0;
      setFieldMessage(state, "", "");
      state.field.lastEncounterStep = state.field.steps;
      setFieldEventEffect(state, {
        kind: "warp_arrive",
        x: event.target.x,
        y: event.target.y,
        durationMs: fieldAnimation.warpEffectDurationMs || 360,
      });
    }

    function applyPickup(state, event) {
      // 拾得済みはprogress.resolvedEventIdsで管理する。保存復元・再取得防止・描画非表示がこのidに依存する。
      if (event.itemType === "full_heal") {
        state.inventory.fullHealCount += event.amount;
      } else if (event.itemType === "master_ball") {
        state.inventory.masterBallCount += event.amount;
      }
      rememberResolvedEvent(state, event.id);
      setFieldMessage(state, event.message || "アイテムを みつけた！", "item");
      setFieldEventEffect(state, {
        kind: "pickup",
        x: event.x,
        y: event.y,
        itemType: event.itemType,
        durationMs: fieldAnimation.pickupEffectDurationMs || 420,
      });
    }

    function applyQuestEvent(state, event) {
      const quest = dataRegistry.getQuest(event.questId);
      if (!quest) {
        setFieldMessage(state, event.message, "talk");
        return {
          soundId: "talk",
        };
      }

      const questState = dataRegistry.getQuestState(state, event.questId);
      const requirementMet = dataRegistry.isQuestRequirementMet(state, event.questId);
      const nextQuestState = requirementMet ? "reported" : "active";
      const message = dataRegistry.getQuestInteractionMessage(
        state,
        event.questId,
        event.message
      );

      if (questState !== "reported") {
        state.progress[quest.progressKey] = nextQuestState;
      }

      setFieldMessage(state, message, nextQuestState === "reported" ? "success" : "talk");
      return {
        soundId: questState !== "reported" && nextQuestState === "reported" ? "quest" : "talk",
      };
    }

    function updateEffect(effect, deltaMs) {
      if (!effect) {
        return null;
      }

      effect.elapsedMs += deltaMs;
      return effect.elapsedMs >= effect.durationMs ? null : effect;
    }

    function updateFieldFeedback(state, deltaMs) {
      state.field.stepEffect = updateEffect(state.field.stepEffect, deltaMs);
      state.field.eventEffect = updateEffect(state.field.eventEffect, deltaMs);
      state.field.bumpEffect = updateEffect(state.field.bumpEffect, deltaMs);
      state.field.blockedFeedbackCooldownMs = Math.max(
        0,
        (state.field.blockedFeedbackCooldownMs || 0) - deltaMs
      );
    }

    function setGrassStepEffect(state) {
      state.field.stepEffect = {
        kind: "grass",
        x: state.field.player.x,
        y: state.field.player.y,
        elapsedMs: 0,
        durationMs: fieldAnimation.grassStepDurationMs || 220,
      };
    }

    function setBumpEffect(state, direction) {
      state.field.bumpEffect = {
        kind: "bump",
        direction,
        elapsedMs: 0,
        durationMs: fieldAnimation.bumpDurationMs || 160,
      };
      state.field.blockedFeedbackCooldownMs = blockedFeedbackCooldownMs;
    }

    function setFieldEventEffect(state, effect) {
      state.field.eventEffect = {
        ...effect,
        elapsedMs: 0,
      };
    }

    function getTalkSoundId(event) {
      return event.sprite === "sign" ? "sign" : "talk";
    }

    function handleInteractEvent(event) {
      // 正面にイベントがない場合は無音・無メッセージで戻る現在仕様。操作説明的な文言を出すと既存テストが変わる。
      if (!event) {
        return;
      }

      if (event.kind === "battle") {
        battleScene.beginTrainerBattle(event);
        return;
      }

      let soundId = "confirm";
      store.update((state) => {
        if (event.kind === "talk") {
          if (event.questId) {
            const feedback = applyQuestEvent(state, event);
            soundId = feedback.soundId;
            return;
          }

          setFieldMessage(state, event.message, event.sprite === "sign" ? "info" : "talk");
          soundId = getTalkSoundId(event);
          return;
        }

        if (event.kind === "pickup") {
          applyPickup(state, event);
          soundId = "item";
        }
      });
      audio.playSe(soundId);
    }

    function closeMessage() {
      store.update((state) => {
        setFieldMessage(state, "", "");
      });
      audio.playSe("message");
    }

    function startMove(direction) {
      // 移動開始では向きだけ先に更新する。通行不可でも向きが変わるので、会話対象の向き合わせに影響する。
      let soundId = "";
      store.update((state) => {
        const mapDef = currentMap(state);
        const vector = directionVectors[direction];
        const targetX = state.field.player.x + vector.x;
        const targetY = state.field.player.y + vector.y;
        state.field.player.direction = direction;

        const lockedGate = findEvent(state, mapDef, targetX, targetY, (event) => {
          return event.trigger === "step" && isEventLocked(state, event);
        });
        if (lockedGate) {
          setFieldMessage(
            state,
            lockedGate.lockedMessage ||
              (App.config.game.story && App.config.game.story.lockedGateMessage) ||
              "道が 閉ざされている。",
            "alert"
          );
          if (!state.field.blockedFeedbackCooldownMs) {
            setBumpEffect(state, direction);
            setFieldEventEffect(state, {
              kind: "locked_gate",
              x: targetX,
              y: targetY,
              durationMs: fieldAnimation.gateHintDurationMs || 760,
            });
            soundId = "error";
          }
          return;
        }

        if (!isPassable(state, mapDef, targetX, targetY)) {
          if (!state.field.blockedFeedbackCooldownMs) {
            setBumpEffect(state, direction);
            soundId = "bump";
          }
          return;
        }

        state.field.player.moving = true;
        state.field.player.progress = 0;
        state.field.player.fromX = state.field.player.x;
        state.field.player.fromY = state.field.player.y;
        state.field.player.toX = targetX;
        state.field.player.toY = targetY;
      });
      if (soundId) {
        audio.playSe(soundId);
      }
    }

    function completeMove(state) {
      // 1歩完了後にstepイベント、草むら効果、ランダム遭遇の順で判定する。順序変更はワープと遭遇の競合を生む。
      state.field.player.x = state.field.player.toX;
      state.field.player.y = state.field.player.toY;
      state.field.player.moving = false;
      state.field.player.progress = 0;
      state.field.steps += 1;

      const mapDef = currentMap(state);
      const stepEvent = findEvent(state, mapDef, state.field.player.x, state.field.player.y, (event) => {
        return event.trigger === "step";
      });
      if (stepEvent) {
        if (stepEvent.kind === "warp") {
          applyWarp(state, stepEvent);
          return {
            kind: "warp",
          };
        }
        if (stepEvent.kind === "champion_intro") {
          return {
            kind: "champion_intro",
            event: stepEvent,
          };
        }
      }

      const tileCode = getTileCode(mapDef, state.field.player.x, state.field.player.y);
      if (tileCode === "g") {
        setGrassStepEffect(state);
      }

      const encountersLockedByProgress =
        mapDef.id === "camera_route" &&
        state.progress &&
        state.progress.prepGateUnlocked;
      // 準備ゲート解放後の初期ルートでは遭遇を止める仕様。次ステージへの移動時にランダム戦で足止めしないため。

      if (
        tileCode === "g" &&
        !encountersLockedByProgress &&
        state.field.steps - state.field.lastEncounterStep >
          App.config.game.timing.encounterCooldownSteps
      ) {
        const tableId = mapDef.encounterTableId;
        const encounterTable = dataRegistry.getEncounterTable(tableId);
        if (random.chance(encounterTable.rate, "field_encounter_check")) {
          return {
            kind: "encounter",
            enemy: dataRegistry.chooseEncounter(tableId),
          };
        }
      }

      return {
        kind: "step",
        soundId: tileCode === "g" ? "grass_step" : "step",
      };
    }

    function interact() {
      const state = store.getState();
      if (state.scene !== "field") {
        return;
      }

      if (state.field.message) {
        closeMessage();
        return;
      }

      const mapDef = currentMap(state);
      const vector = directionVectors[state.field.player.direction];
      const targetX = state.field.player.x + vector.x;
      const targetY = state.field.player.y + vector.y;
      const event = findEvent(state, mapDef, targetX, targetY, (entry) => {
        return entry.trigger === "interact";
      });
      handleInteractEvent(event);
    }

    function update(deltaMs) {
      // モーダルや遷移中は方向入力を捨てる。閉じた直後に押しっぱなし移動が漏れないようにするため。
      let state = store.getState();
      if (state.scene !== "field") {
        return;
      }

      store.update((nextState) => {
        updateFieldFeedback(nextState, deltaMs);
      });

      state = store.getState();
      if (modal.isOpen() || state.transition.active) {
        input.clearDirections();
        return;
      }

      if (state.progress && state.progress.championCutsceneActive) {
        if (state.field.player.moving) {
          let pendingResult = null;
          const currentMoveDuration = moveDuration * 1.5; // walk slowly
          store.update((nextState) => {
            nextState.field.player.progress = Math.min(
              1,
              nextState.field.player.progress + deltaMs / currentMoveDuration
            );
            if (nextState.field.player.progress >= 1) {
              pendingResult = completeMove(nextState);
            }
          });
          if (pendingResult && pendingResult.kind === "step" && pendingResult.soundId) {
            audio.playSe(pendingResult.soundId);
          }
          return;
        } else {
          // not moving, start moving left if x > 6
          if (state.field.player.x > 6) {
            startMove("left");
          } else {
            // Reached champion
            store.update(nextState => {
              nextState.progress.championCutsceneActive = false;
            });
            const event = findEvent(state, currentMap(state), 5, 9, (e) => e.trigger === "interact");
            if (event) {
              handleInteractEvent(event);
            }
          }
          return;
        }
      }

      if (input.consumeAction("menu")) {
        openMenu();
        return;
      }

      if (state.field.message) {
        input.clearDirections();
        if (input.consumeAction("confirm") || input.consumeAction("cancel")) {
          closeMessage();
        }
        return;
      }

      if (input.consumeAction("confirm")) {
        interact();
        return;
      }

      if (state.field.player.moving) {
        let pendingResult = null;
        const currentMoveDuration = input.isHoldActive("run") ? runMoveDuration : moveDuration;
        store.update((nextState) => {
          nextState.field.player.progress = Math.min(
            1,
            nextState.field.player.progress + deltaMs / currentMoveDuration
          );
          if (nextState.field.player.progress >= 1) {
            pendingResult = completeMove(nextState);
          }
        });
        if (pendingResult && pendingResult.kind === "warp") {
          audio.playSe("warp");
        }
        if (pendingResult && pendingResult.kind === "step" && pendingResult.soundId) {
          audio.playSe(pendingResult.soundId);
        }
        if (pendingResult && pendingResult.kind === "encounter") {
          battleScene.beginEncounterTransition(pendingResult.enemy);
        }
        if (pendingResult && pendingResult.kind === "champion_intro") {
          store.update((state) => {
            state.transition = {
              active: true,
              kind: "champion-intro",
              elapsedMs: 0,
              durationMs: 4000,
              event: pendingResult.event,
            };
            audio.playSe("encounter");
          });
        }
        return;
      }

      const direction = input.getDirection();
      if (direction) {
        startMove(direction);
      }
    }

    return {
      update,
      interact,
      closeMessage,
    };
  }

  App.scenes.createFieldScene = createFieldScene;
})();

        ctx.globalAlpha = 0.42;
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1;
        ctx.strokeRect(Math.round(x + 1), Math.round(y + 1), size.width - 2, size.height - 2);
        ctx.globalAlpha = 0.78;
        drawPixelSparkle(centerX + 4, centerY - 5, 1, isHeal ? palette.white : palette.captureYellow || "#d8b546");
        if (isHeal) {
          ctx.fillStyle = "#f8f4d7";
          ctx.fillRect(centerX - 1, centerY - 6, 3, 1);
          ctx.fillRect(centerX, centerY - 7, 1, 3);
        }
      } else if (event.kind === "talk") {
        ctx.globalAlpha = 0.34;
        ctx.fillStyle = event.sprite === "sign" ? "#d6c478" : "#f8f4d7";
        ctx.fillRect(Math.round(centerX - 3), Math.round(y - 1), 6, 1);
        if (event.sprite === "npc") {
          ctx.globalAlpha = 0.28;
          ctx.strokeStyle = "#d6c478";
          ctx.beginPath();
          ctx.ellipse(centerX, y + size.height - 1, 6, 2, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function getBumpOffset(effect) {
      if (!effect || effect.kind !== "bump") {
        return { x: 0, y: 0 };
      }

      const vector = directionVectors[effect.direction] || { x: 0, y: 0 };
      const progress = Math.min(1, effect.elapsedMs / effect.durationMs);
      const amount = Math.sin(progress * Math.PI) * 1.25;
      return {
        x: vector.x * amount,
        y: vector.y * amount,
      };
    }

    function getInterpolatedPosition(player, bumpEffect) {
      const bump = getBumpOffset(bumpEffect);
      if (!player.moving) {
        return {
          x: player.x * screen.tileSize + bump.x,
          y: player.y * screen.tileSize + bump.y,
        };
      }

      const deltaX = player.toX - player.fromX;
      const deltaY = player.toY - player.fromY;
      return {
        x: (player.fromX + deltaX * player.progress) * screen.tileSize + bump.x,
        y: (player.fromY + deltaY * player.progress) * screen.tileSize + bump.y,
      };
    }

    function drawGrassStepEffect(effect, camera) {
      if (!effect || effect.kind !== "grass") {
        return;
      }

      const progress = Math.min(1, effect.elapsedMs / effect.durationMs);
      const left = effect.x * screen.tileSize - camera.offsetX;
      const top = effect.y * screen.tileSize - camera.offsetY;
      const lift = Math.round(progress * 2);

      ctx.save();
      ctx.globalAlpha = 1 - progress * 0.52;
      ctx.fillStyle = "rgba(30, 42, 26, 0.16)";
      ctx.fillRect(left + 1, top + 6, 6, 1);
      ctx.fillStyle = palette.white;
      ctx.fillRect(left + 1, top + 3 - lift, 1, 2);
      ctx.fillRect(left + 6, top + 2 - lift, 1, 2);
      ctx.fillStyle = "#d1ba65";
      ctx.fillRect(left + 3, top + 2 - lift, 1, 1);
      ctx.fillStyle = "#455f31";
      ctx.fillRect(left + 2, top + 5 - lift, 1, 2);
      ctx.fillRect(left + 4, top + 4 - lift, 1, 3);
      ctx.fillRect(left + 6, top + 5 - lift, 1, 2);
      ctx.restore();
    }

    function drawPickupFieldEffect(effect, camera) {
      const progress = clamp(effect.elapsedMs / effect.durationMs, 0, 1);
      const left = effect.x * screen.tileSize - camera.offsetX;
      const top = effect.y * screen.tileSize - camera.offsetY;
      const centerX = left + screen.tileSize / 2;
      const centerY = top + screen.tileSize / 2;
      const lift = Math.round(progress * 6);
      const isHeal = effect.itemType === "full_heal";
      const accent = isHeal ? "#7fbf75" : palette.captureYellow || "#d8b546";
      const secondary = isHeal ? "#f8f4d7" : "#9b6de8";

      ctx.save();
      ctx.globalAlpha = 1 - progress * 0.72;
      ctx.fillStyle = isHeal ? "#f8f4d7" : palette.white;
      ctx.fillRect(Math.round(centerX - 1), Math.round(centerY - 5 - lift), 2, 2);
      drawPixelSparkle(centerX - 5, centerY - 1 - lift * 0.55, 1, accent);
      drawPixelSparkle(centerX + 5, centerY - 2 - lift * 0.45, 1, palette.white);
      drawPixelSparkle(centerX, centerY + 3 - lift * 0.35, 1, secondary);
      ctx.restore();
    }

    function drawGateFieldEffect(effect, camera) {
      const progress = clamp(effect.elapsedMs / effect.durationMs, 0, 1);
      const left = effect.x * screen.tileSize - camera.offsetX;
      const top = effect.y * screen.tileSize - camera.offsetY;
      const lift = Math.round(Math.sin(progress * Math.PI) * 2);
      const isOpen = effect.kind === "gate_open";
      const mainColor = isOpen ? palette.captureYellow || "#d8b546" : palette.warning || "#b14933";
      const accentColor = isOpen ? palette.white : "#f1b58b";

      ctx.save();
      ctx.globalAlpha = isOpen
        ? 0.34 + Math.sin(progress * Math.PI) * 0.42
        : 0.28 + Math.sin(progress * Math.PI) * 0.34;
      ctx.fillStyle = mainColor;
      ctx.fillRect(left + 1, top + 1 - lift, 1, 6);
      ctx.fillRect(left + 6, top + 1 - lift, 1, 6);
      ctx.fillStyle = accentColor;
      ctx.fillRect(left + 2, top + 2 - lift, 4, 1);
      ctx.fillRect(left + 2, top + 5 - lift, 4, 1);
      if (isOpen) {
        drawPixelSparkle(left + 4, top + 1 - lift, 1, accentColor);
      } else {
        ctx.fillRect(left + 3, top + 3 - lift, 2, 2);
      }
      ctx.restore();
    }

    function drawWarpFieldEffect(effect, camera) {
      const progress = clamp(effect.elapsedMs / effect.durationMs, 0, 1);
      const left = effect.x * screen.tileSize - camera.offsetX;
      const top = effect.y * screen.tileSize - camera.offsetY;
      const yOffset = Math.round(Math.sin(progress * Math.PI) * 2);

      ctx.save();
      ctx.globalAlpha = 1 - progress * 0.68;
      ctx.strokeStyle = palette.white;
      ctx.lineWidth = 1;
      ctx.strokeRect(left + 1, top + 2 - yOffset, 6, 4);
      ctx.strokeStyle = palette.captureYellow || "#d8b546";
      ctx.strokeRect(left + 2, top + 3 - yOffset, 4, 2);
      ctx.restore();
    }

    function drawFieldEventEffect(effect, camera) {
      if (!effect) {
        return;
      }

      if (effect.kind === "pickup") {
        drawPickupFieldEffect(effect, camera);
      } else if (effect.kind === "locked_gate" || effect.kind === "gate_open") {
        drawGateFieldEffect(effect, camera);
      } else if (effect.kind === "warp_arrive") {
        drawWarpFieldEffect(effect, camera);
      }
    }

    function getFieldCamera(mapDef, playerPosition) {
      // カメラはマップ外を見せないようclampする。rowsが矩形である前提はdata-registry.jsで検証済み。
      const mapWidth = mapDef.rows[0].length * screen.tileSize;
      const mapHeight = mapDef.rows.length * screen.tileSize;
      const offsetX = clamp(
        playerPosition.x + screen.tileSize / 2 - screen.width / 2,
        0,
        Math.max(0, mapWidth - screen.width)
      );
      const offsetY = clamp(
        playerPosition.y + screen.tileSize / 2 - screen.height / 2,
        0,
        Math.max(0, mapHeight - screen.height)
      );

      return {
        offsetX,
        offsetY,
        startTileX: Math.floor(offsetX / screen.tileSize),
        startTileY: Math.floor(offsetY / screen.tileSize),
        endTileX: Math.min(
          mapDef.rows[0].length,
          Math.ceil((offsetX + screen.width) / screen.tileSize) + 1
        ),
        endTileY: Math.min(
          mapDef.rows.length,
          Math.ceil((offsetY + screen.height) / screen.tileSize) + 1
        ),
      };
    }

    function isVisible(x, y) {
      return (
        x >= -screen.tileSize &&
        y >= -screen.tileSize &&
        x <= screen.width &&
        y <= screen.height
      );
    }

    function getVisibleFieldEvents(state, mapDef) {
      const resolvedIds = new Set((state.progress && state.progress.resolvedEventIds) || []);
      return (mapDef.events || [])
        .filter((event) => event.sprite && !resolvedIds.has(event.id))
        .sort((left, right) => left.y - right.y || left.x - right.x);
    }

    function drawField(state) {
      // 描画順は地形 -> 出口目印 -> イベント -> プレイヤー -> 草むら前景 -> 歩行エフェクト。
      // 草むらの前景を後描きすることで、プレイヤーの足元が隠れる見た目を作っている。
      clear(palette.light);
      const mapDef = dataRegistry.getMap(state.field.mapId);
      const playerPos = getInterpolatedPosition(state.field.player, state.field.bumpEffect);
      const camera = getFieldCamera(mapDef, playerPos);

      for (let rowIndex = camera.startTileY; rowIndex < camera.endTileY; rowIndex += 1) {
        const row = mapDef.rows[rowIndex];
        for (let columnIndex = camera.startTileX; columnIndex < camera.endTileX; columnIndex += 1) {
          drawTileAt(
            columnIndex * screen.tileSize - camera.offsetX,
            rowIndex * screen.tileSize - camera.offsetY,
            row[columnIndex],
            columnIndex,
            rowIndex
          );
        }
      }

      (mapDef.events || []).forEach((event) => {
        drawFieldWarpMarker(state, event, camera);
      });

      getVisibleFieldEvents(state, mapDef).forEach((event) => {
        const x = event.x * screen.tileSize - camera.offsetX;
        const y = event.y * screen.tileSize - camera.offsetY;
        const sprite = fieldPixelArt[event.sprite];
        if (sprite && isVisible(x, y)) {
          drawFieldSpriteShadow(sprite, x, y, event.sprite);
          drawPatternSprite(sprite, x, y);
          drawFieldEventHint(event, x, y, sprite);
        }
      });

      drawFieldSpriteShadow(
        fieldPixelArt.player,
        playerPos.x - camera.offsetX,
        playerPos.y - camera.offsetY,
        "player"
      );
      drawPatternSprite(fieldPixelArt.player, playerPos.x - camera.offsetX, playerPos.y - camera.offsetY);

      for (let rowIndex = camera.startTileY; rowIndex < camera.endTileY; rowIndex += 1) {
        const row = mapDef.rows[rowIndex];
        for (let columnIndex = camera.startTileX; columnIndex < camera.endTileX; columnIndex += 1) {
          if (row[columnIndex] === "g") {
            drawGrassOverlayAt(
              columnIndex * screen.tileSize - camera.offsetX,
              rowIndex * screen.tileSize - camera.offsetY,
              columnIndex,
              rowIndex
            );
          }
        }
      }

      drawGrassStepEffect(state.field.stepEffect, camera);
      drawFieldEventEffect(state.field.eventEffect, camera);
    }

    function getBattleAnimation(state, target) {
      if (
        !state.battle ||
        !state.battle.animation ||
        state.battle.animation.kind !== "damage" ||
        state.battle.animation.target !== target
      ) {
        return null;
      }

      return state.battle.animation;
    }

    function getFaintAnimation(state, target) {
      if (
        !state.battle ||
        !state.battle.animation ||
        state.battle.animation.kind !== "faint" ||
        state.battle.animation.target !== target
      ) {
        return null;
      }

      return state.battle.animation;
    }

    function getAttackAnimation(state, target) {
      if (
        !state.battle ||
        !state.battle.animation ||
        state.battle.animation.kind !== "attack" ||
        state.battle.animation.target !== target
      ) {
        return null;
      }

      return state.battle.animation;
    }

    function getMonsterOffset(state, target) {
      const offset = { x: 0, y: 0 };
      const attack = getAttackAnimation(state, target);
      if (attack) {
        const progress = Math.min(1, attack.elapsedMs / attack.durationMs);
        const pulse = Math.sin(progress * Math.PI);
        const lunge = pulse * (attackAnimation.lungePixels || 5);
        const shake = Math.sin(progress * Math.PI * 5) * (1 - progress) * 1.2;
        const direction = target === "player" ? -1 : 1;
        offset.x += direction * (lunge + shake);
        offset.y -= pulse * (attackAnimation.hopPixels || 2);
      }

      const animation = getBattleAnimation(state, target);
      if (!animation) {
        return offset;
      }

      const progress = Math.min(1, animation.elapsedMs / damageAnimation.wiggleDurationMs);
      const wiggle = Math.sin(progress * Math.PI * 5) * (1 - progress) * 4;
      offset.x += target === "enemy" ? wiggle : -wiggle;
      return offset;
    }

    function shouldHideMonster(state, target) {
      if (
        state.battle &&
        state.battle.fainted &&
        state.battle.fainted[target] &&
        !getFaintAnimation(state, target)
      ) {
        return true;
      }

      if (
        target === "enemy" &&
        state.battle &&
        state.battle.captureBall &&
        state.battle.captureBall.hideEnemy
      ) {
        return true;
      }

      const animation = getBattleAnimation(state, target);
      if (!animation || animation.elapsedMs > damageAnimation.wiggleDurationMs) {
        return false;
      }

      return Math.floor(animation.elapsedMs / damageAnimation.flashIntervalMs) % 2 === 1;
    }

    function getMonsterAlpha(state, target) {
      const faintAnimation = getFaintAnimation(state, target);
      if (!faintAnimation) {
        return 1;
      }

      const progress = Math.min(1, faintAnimation.elapsedMs / faintAnimation.durationMs);
      return Math.max(0, 1 - progress);
    }

    function drawBattleMonster(position, species, view) {
      // 外部PNG画像、pixel-art定義、簡易shapeの順でフォールバックする。種族データ変更時の表示互換性を保つため。
      const spriteKey = view === "back" ? "battleBack" : "battleFront";
      const imageSrc = species.imageSprites && species.imageSprites[spriteKey];
      if (imageSrc) {
        let image = battleImageCache.get(imageSrc);
        if (!image) {
          image = new Image();
          image.decoding = "async";
          image.src = imageSrc;
          battleImageCache.set(imageSrc, image);
        }

        if (image.complete && image.naturalWidth > 0) {
          const size = (species.imageSpriteSize && species.imageSpriteSize[spriteKey]) || {};
          const drawSize = resolveImageDrawSize(size, image);
          const width = drawSize.width;
          const height = drawSize.height;

          // PNGアセットは種族ごとに見た目の中心が違うため、species.battleOffsetで最終調整する。
          const offset = (species.battleOffset && species.battleOffset[view === "back" ? "player" : "enemy"]) || { x: 0, y: 0 };

          // 通常のpixel-art描画はスムージング無効だが、PNGモンスターは原寸縮小時の荒れを避けるため一時的に有効化する。
          const originalSmoothing = ctx.imageSmoothingEnabled;
          const originalSmoothingQuality = ctx.imageSmoothingQuality;
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(
            image,
            Math.round(position.x - width / 2 + (offset.x || 0)),
            Math.round(position.y - height / 2 + (offset.y || 0)),
            width,
            height
          );
          ctx.imageSmoothingEnabled = originalSmoothing;
          ctx.imageSmoothingQuality = originalSmoothingQuality;
          return;
        } else if (!image.complete) {
          return;
        }
      }

      const spriteId = species.spriteIds && species.spriteIds[spriteKey];
      const sprite = spriteId ? battlePixelArt[spriteId] : null;

      if (sprite) {
        drawCenteredPatternSprite(sprite, position.x, position.y);
        return;
      }

      ctx.fillStyle = species.palette.secondary;
      ctx.beginPath();
      ctx.ellipse(position.x, position.y, 18, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = species.palette.primary;
      if (species.shape === "bud") {
        ctx.beginPath();
        ctx.ellipse(position.x, position.y, 14, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(position.x - 2, position.y - 14, 4, 8);
      } else if (species.shape === "flare") {
        ctx.beginPath();
        ctx.moveTo(position.x, position.y - 14);
        ctx.lineTo(position.x + 14, position.y + 10);
        ctx.lineTo(position.x - 14, position.y + 10);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(position.x, position.y - 14);
        ctx.quadraticCurveTo(position.x + 16, position.y - 2, position.x, position.y + 14);
        ctx.quadraticCurveTo(position.x - 16, position.y - 2, position.x, position.y - 14);
        ctx.fill();
      }

      ctx.fillStyle = palette.deepest;
      ctx.fillRect(position.x - 3, position.y - 3, 2, 2);
      ctx.fillRect(position.x + 1, position.y - 3, 2, 2);
    }

    function drawCaptureBallMotion(ballState) {
      const x = Math.round(ballState.x);
      const y = Math.round(ballState.y);
      const progress = clamp(ballState.progress || 0, 0, 1);

      ctx.save();
      if (ballState.phase === "throw" && Number.isFinite(ballState.trailX)) {
        const trailX = Math.round(ballState.trailX);
        const trailY = Math.round(ballState.trailY);
        ctx.globalAlpha = 0.32 + progress * 0.34;
        ctx.strokeStyle = palette.white;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(trailX, trailY);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.globalAlpha = 0.55;
        drawPixelSparkle(trailX - 2, trailY + 1, 1, palette.captureYellow || "#d8b546");
        if (ballState.hideEnemy) {
          ctx.globalAlpha = 0.2 + progress * 0.28;
          ctx.strokeStyle = palette.captureYellow || "#d8b546";
          ctx.lineWidth = 1;
          for (let index = 0; index < 5; index += 1) {
            const angle = -0.9 + index * 0.45;
            ctx.beginPath();
            ctx.moveTo(
              Math.round(x + Math.cos(angle) * 8),
              Math.round(y + Math.sin(angle) * 7)
            );
            ctx.lineTo(
              Math.round(x + Math.cos(angle) * (14 + progress * 5)),
              Math.round(y + Math.sin(angle) * (11 + progress * 3))
            );
            ctx.stroke();
          }
        }
      } else if (ballState.phase === "shake") {
        const cycles = ballAnimation.shakeCycles || 4;
        const tension = Math.abs(Math.sin(progress * Math.PI * cycles));
        ctx.globalAlpha = 0.12 + tension * 0.32;
        ctx.fillStyle = palette.deepest;
        ctx.fillRect(x - 9, y + 8, 5, 1);
        ctx.fillRect(x + 4, y + 8, 6, 1);
        if (tension > 0.55) {
          ctx.globalAlpha = (tension - 0.55) * 1.3;
          ctx.strokeStyle = palette.captureYellow || "#d8b546";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x - 10, y - 6);
          ctx.lineTo(x - 14, y - 9);
          ctx.moveTo(x + 10, y - 5);
          ctx.lineTo(x + 14, y - 8);
          ctx.stroke();
        }
      } else if (ballState.phase === "release") {
        const open = ballState.open || 0;
        ctx.globalAlpha = Math.max(0, 0.42 - progress * 0.22);
        ctx.strokeStyle = palette.white;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(x, y - 2, 12 + open * 8, 8 + open * 5, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = Math.max(0, 0.48 - progress * 0.28);
        drawPixelSparkle(x - 12, y - 8, 1, palette.white);
        drawPixelSparkle(x + 13, y - 4, 1, palette.captureYellow || "#d8b546");
        ctx.globalAlpha = Math.max(0, 0.42 - progress * 0.18);
        ctx.strokeStyle = palette.warning || "#b14933";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(Math.round(x - 15), Math.round(y - 12));
        ctx.lineTo(Math.round(x - 8), Math.round(y - 6));
        ctx.moveTo(Math.round(x + 14), Math.round(y - 10));
        ctx.lineTo(Math.round(x + 7), Math.round(y - 4));
        ctx.stroke();
      } else if (ballState.phase === "lock" || ballState.phase === "complete") {
        const pulse = Math.sin(progress * Math.PI);
        ctx.globalAlpha = 0.18 + pulse * 0.26;
        ctx.strokeStyle = palette.captureYellow || "#d8b546";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(x, y - 1, 11 + pulse * 8, 7 + pulse * 5, 0, 0, Math.PI * 2);
        ctx.stroke();
        if (ballState.phase === "complete") {
          ctx.globalAlpha = 0.85 * (1 - progress);
          drawPixelSparkle(x - 14, y - 9, 2, palette.white);
          drawPixelSparkle(x + 15, y - 7, 1, palette.captureYellow || "#d8b546");
          drawPixelSparkle(x + 2, y - 15, 1, palette.white);

          const sparkleCount = 8;
          const radius = 6 + progress * 24;
          for (let i = 0; i < sparkleCount; i++) {
            const angle = (i * Math.PI * 2) / sparkleCount + (progress * 1.5);
            const sx = x + Math.cos(angle) * radius;
            const sy = y - 1 + Math.sin(angle) * (radius * 0.7);
            const color = i % 2 === 0 ? palette.white : (palette.captureYellow || "#d8b546");
            const size = i % 3 === 0 ? 2 : 1;
            drawPixelSparkle(sx, sy, size, color);
          }
        }
      }
      ctx.restore();
    }

    function drawBallSprite(ballState) {
      const x = Math.round(ballState.x);
      const y = Math.round(ballState.y);
      const open = ballState.open || 0;
      const shellLift = ballState.phase === "release" ? Math.floor(open * 4) : 0;

      drawCaptureBallMotion(ballState);

      ctx.fillStyle = "rgba(31, 35, 24, 0.22)";
      ctx.beginPath();
      ctx.ellipse(x, y + 6, 7, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      if (ballState.phase === "release" && open > 0.2) {
        ctx.fillStyle = `rgba(248, 244, 215, ${Math.max(0, 0.45 - open * 0.3)})`;
        ctx.beginPath();
        ctx.ellipse(x, y - 2, 16 + open * 8, 12 + open * 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      if (ballState.phase === "lock") {
        ctx.fillStyle = `rgba(248, 244, 215, ${0.32 + (ballState.flash || 0) * 0.38})`;
        ctx.beginPath();
        ctx.ellipse(x, y - 1, 11 + (ballState.flash || 0) * 4, 7, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = palette.white;
      ctx.beginPath();
      ctx.arc(x, y + shellLift, 5, 0, Math.PI * 2);
      ctx.fill();

      if (ballState.ballType === "master") {
        ctx.fillStyle = "#7038f8"; // Master Ball Purple
      } else {
        ctx.fillStyle = palette.captureRed || "#b14933";
      }
      ctx.beginPath();
      ctx.arc(x, y - 1 - shellLift, 5, Math.PI, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = palette.deepest;
      ctx.fillRect(x - 5, y - 1, 10, 1);
      ctx.fillRect(x - 1, y - 2, 2, 2);

      ctx.fillStyle = palette.captureYellow || "#d8b546";
      ctx.fillRect(x - 1, y - 1, 2, 2);

      if (ballState.phase === "lock") {
        ctx.fillStyle = palette.white;
        drawPixelSparkle(x + 8, y - 6, 1, palette.white);
        ctx.fillStyle = palette.captureYellow || "#d8b546";
        drawPixelSparkle(x - 9, y + 3, 1, palette.captureYellow || "#d8b546");
      }
    }

    function drawCaptureBall(state) {
      if (!state.battle || !state.battle.captureBall) {
        return;
      }

      drawBallSprite(state.battle.captureBall);
    }

    function getBattleLayout() {
      return App.config.game.battleLayout || {
        groundY: 86,
        groundHeight: 18,
        enemy: {
          monsterX: 40,
          monsterY: 49,
          shadowX: 38,
          shadowY: 62,
          shadowWidth: 28,
          shadowHeight: 8,
        },
        player: {
          monsterX: 118,
          monsterY: 78,
          shadowX: 118,
          shadowY: 92,
          shadowWidth: 34,
          shadowHeight: 10,
        },
      };
    }

    function drawBattleShadow(position) {
      ctx.save();
      ctx.fillStyle = palette.battleShadow || "#7b7f62";
      ctx.globalAlpha = 0.54;
      ctx.beginPath();
      ctx.ellipse(
        position.shadowX,
        position.shadowY,
        position.shadowWidth,
        position.shadowHeight,
        0,
        0,
        Math.PI * 2
      );
      ctx.fill();

      ctx.fillStyle = palette.deepest;
      ctx.globalAlpha = 0.1;
      ctx.beginPath();
      ctx.ellipse(
        position.shadowX,
        position.shadowY + 1,
        position.shadowWidth * 0.68,
        Math.max(1.2, position.shadowHeight * 0.48),
        0,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.restore();
    }

    function drawBattleBackdrop(layout) {
      const lane = layout.enemyLane || {
        y: layout.enemy.shadowY - 2,
        height: 10,
      };
      const laneY = lane.y;
      const laneHeight = lane.height || 8;

      ctx.fillStyle = palette.battleEnemyLane || "#68834d";
      ctx.fillRect(0, laneY, screen.width, laneHeight);
      ctx.fillStyle = palette.battleEnemyLaneHighlight || "#a8c37b";
      ctx.fillRect(0, laneY, screen.width, 1);
      ctx.fillStyle = palette.battleEnemyLaneEdge || "#4d643a";
      ctx.fillRect(0, laneY + laneHeight - 1, screen.width, 1);

      ctx.fillStyle = palette.battleGround || "#c3b27a";
      ctx.fillRect(0, layout.groundY, screen.width, layout.groundHeight);
      ctx.fillStyle = "rgba(248, 244, 215, 0.22)";
      ctx.fillRect(0, layout.groundY, screen.width, 2);
      ctx.fillStyle = "rgba(40, 42, 34, 0.12)";
      ctx.fillRect(0, layout.groundY + layout.groundHeight - 3, screen.width, 2);

      ctx.fillStyle = "rgba(74, 77, 61, 0.12)";
      [
        [18, layout.groundY + 6, 9],
        [49, layout.groundY + 13, 13],
        [88, layout.groundY + 7, 11],
        [127, layout.groundY + 15, 8],
      ].forEach(([x, y, width]) => {
        ctx.fillRect(x, y, width, 1);
      });
    }

    function drawBattleIceWall(state, layout, target) {
      const monster =
        target === "player" ? state.party && state.party[0] : state.battle && state.battle.enemy;
      const wallActive = monster && monster.iceWallTurns > 0;
      const animation =
        state.battle &&
        state.battle.animation &&
        state.battle.animation.kind === "ice_wall" &&
        state.battle.animation.target === target
          ? state.battle.animation
          : null;

      if (!wallActive && !animation) {
        return;
      }

      const position = layout[target];
      const progress = animation ? Math.min(1, animation.elapsedMs / animation.durationMs) : 1;
      const pulse = animation ? Math.sin(progress * Math.PI) : 0.25;
      const alpha = Math.min(0.56, 0.22 + pulse * 0.34);
      const radiusX = target === "player" ? 31 : 25;
      const radiusY = target === "player" ? 29 : 23;
      const centerY = position.monsterY + (target === "player" ? 2 : 4);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = "#bfeeff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(position.monsterX, centerY, radiusX, radiusY, -0.12, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = alpha * 0.8;
      ctx.strokeStyle = "#6fb5dc";
      ctx.lineWidth = 1;
      for (let index = -1; index <= 1; index += 1) {
        const shardX = position.monsterX + index * 9;
        ctx.beginPath();
        ctx.moveTo(shardX, centerY - radiusY + 6);
        ctx.lineTo(shardX + 5, centerY - 3);
        ctx.lineTo(shardX - 3, centerY + radiusY - 8);
        ctx.stroke();
      }
      ctx.restore();
    }

    function getBattleActionAnimation(state, kind, target) {
      const animation = state.battle && state.battle.animation;
      if (!animation || animation.kind !== kind) {
        return null;
      }

      if (target && animation.target !== target) {
        return null;
      }

      return animation;
    }

    function getBattleEffectPosition(layout, target) {
      const slot = layout[target];
      return {
        x: slot.monsterX,
        y: slot.monsterY,
        shadowY: slot.shadowY,
      };
    }

    function drawPixelSparkle(x, y, size, color) {
      const centerX = Math.round(x);
      const centerY = Math.round(y);
      const length = Math.max(1, Math.round(size));
      ctx.fillStyle = color;
      ctx.fillRect(centerX, centerY - length, 1, length * 2 + 1);
      ctx.fillRect(centerX - length, centerY, length * 2 + 1, 1);
    }

    function getMoveEffectPalette(moveType) {
      const palettes = {
        "くさ": {
          main: "#7fbf75",
          accent: "#d6c478",
          dark: "#40572f",
          soft: "rgba(127, 191, 117, 0.18)",
        },
        "みず": {
          main: "#6fb5dc",
          accent: "#d8e7dd",
          dark: "#426f76",
          soft: "rgba(111, 181, 220, 0.18)",
        },
        "こおり": {
          main: "#bfeeff",
          accent: "#f8f4d7",
          dark: "#6fb5dc",
          soft: "rgba(191, 238, 255, 0.2)",
        },
        "はがね": {
          main: "#b8c0b2",
          accent: "#f8f4d7",
          dark: "#59624a",
          soft: "rgba(184, 192, 178, 0.18)",
        },
        "ほのお": {
          main: "#cf7143",
          accent: "#d8b546",
          dark: "#9a3b2c",
          soft: "rgba(207, 113, 67, 0.18)",
        },
      };
      return palettes[moveType] || {
        main: palette.warning || "#b14933",
        accent: palette.white,
        dark: palette.deepest,
        soft: "rgba(248, 244, 215, 0.18)",
      };
    }

    function drawMoveTypeAccents(animation, position, target, centerY, progress, alpha) {
      const colors = getMoveEffectPalette(animation.moveType);
      const direction = target === "enemy" ? 1 : -1;
      const spread = 7 + progress * 8;

      ctx.save();
      ctx.globalAlpha = alpha;

      if (animation.moveType === "くさ") {
        ctx.fillStyle = colors.main;
        [-1, 0, 1].forEach((index) => {
          const x = position.x + index * spread * 0.7;
          const y = centerY - 8 - Math.sin(progress * Math.PI + index) * 3;
          ctx.fillRect(Math.round(x), Math.round(y), 2, 1);
          ctx.fillRect(Math.round(x + direction), Math.round(y + 1), 1, 2);
        });
        ctx.fillStyle = colors.accent;
        ctx.fillRect(Math.round(position.x - 1), Math.round(centerY - 12), 2, 1);
      } else if (animation.moveType === "みず") {
        ctx.strokeStyle = colors.main;
        ctx.lineWidth = 1;
        for (let index = 0; index < 3; index += 1) {
          const radius = 4 + progress * 9 + index * 2;
          ctx.beginPath();
          ctx.ellipse(
            Math.round(position.x - direction * index * 3),
            Math.round(centerY + index - 1),
            radius,
            Math.max(2, radius * 0.35),
            -0.18 * direction,
            Math.PI * 0.08,
            Math.PI * 1.15
          );
          ctx.stroke();
        }
      } else if (animation.moveType === "こおり") {
        ctx.strokeStyle = colors.main;
        ctx.lineWidth = 1;
        [-1, 0, 1].forEach((index) => {
          const x = position.x + index * 6;
          ctx.beginPath();
          ctx.moveTo(Math.round(x), Math.round(centerY - 12));
          ctx.lineTo(Math.round(x + direction * (4 + progress * 3)), Math.round(centerY - 1));
          ctx.lineTo(Math.round(x - direction * 3), Math.round(centerY + 8));
          ctx.stroke();
        });
      } else if (animation.moveType === "はがね") {
        ctx.strokeStyle = colors.accent;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(Math.round(position.x - direction * 12), Math.round(centerY - 8));
        ctx.lineTo(Math.round(position.x + direction * 10), Math.round(centerY + 6));
        ctx.stroke();
        drawPixelSparkle(position.x + direction * 10, centerY + 4, 1, colors.accent);
      } else if (animation.moveType === "ほのお") {
        ctx.fillStyle = colors.main;
        ctx.fillRect(Math.round(position.x - 4), Math.round(centerY - 8), 3, 8);
        ctx.fillStyle = colors.accent;
        ctx.fillRect(Math.round(position.x), Math.round(centerY - 11), 3, 10);
        ctx.fillStyle = colors.dark;
        ctx.fillRect(Math.round(position.x + 4), Math.round(centerY - 6), 2, 6);
      }

      ctx.restore();
    }

    function drawEffectivenessAccent(animation, position, centerY, progress, alpha) {
      if (!animation.typeMultiplier || animation.typeMultiplier === 1) {
        return;
      }

      const strong = animation.typeMultiplier > 1;
      const colors = getMoveEffectPalette(animation.moveType);
      const pulse = Math.sin(progress * Math.PI);

      ctx.save();
      ctx.globalAlpha = alpha * (strong ? 0.88 : 0.48);
      ctx.strokeStyle = strong ? colors.accent : "#6d6f63";
      ctx.lineWidth = strong ? 2 : 1;
      ctx.beginPath();
      ctx.ellipse(
        position.x,
        centerY,
        14 + pulse * (strong ? 8 : 3),
        8 + pulse * (strong ? 5 : 2),
        -0.08,
        0,
        Math.PI * 2
      );
      ctx.stroke();

      if (strong) {
        drawPixelSparkle(position.x - 13, centerY - 8, 1, palette.white);
        drawPixelSparkle(position.x + 14, centerY - 5, 1, colors.accent);
      } else {
        ctx.fillStyle = "rgba(32, 34, 27, 0.22)";
        ctx.fillRect(Math.round(position.x - 8), Math.round(centerY + 7), 16, 2);
      }
      ctx.restore();
    }

    function drawAttackTypeTrail(animation, position, target) {
      const progress = clamp(animation.elapsedMs / animation.durationMs, 0, 1);
      const pulse = Math.sin(progress * Math.PI);
      if (pulse <= 0) {
        return;
      }

      const colors = getMoveEffectPalette(animation.moveType);
      const direction = target === "player" ? -1 : 1;
      const centerY = position.y + (target === "enemy" ? 1 : -2);

      ctx.save();
      ctx.globalAlpha = pulse * 0.82;
      ctx.fillStyle = colors.soft;
      ctx.fillRect(
        Math.round(position.x - 12 + direction * progress * 9),
        Math.round(centerY - 12),
        24,
        19
      );
      ctx.strokeStyle = colors.accent;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(Math.round(position.x - direction * 10), Math.round(centerY + 6));
      ctx.lineTo(Math.round(position.x + direction * 12), Math.round(centerY - 5));
      ctx.stroke();
      ctx.globalAlpha = pulse * 0.64;
      ctx.strokeStyle = colors.main;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.round(position.x - direction * 13), Math.round(centerY + 2));
      ctx.lineTo(Math.round(position.x + direction * 15), Math.round(centerY - 9));
      ctx.stroke();
      drawPixelSparkle(position.x + direction * 14, centerY - 6, 1, colors.accent);
      drawMoveTypeAccents(animation, position, target, centerY, progress, pulse * 0.7);
      ctx.restore();
    }

    function drawImpactBurst(animation, position, target) {
      const progress = clamp(animation.elapsedMs / animation.durationMs, 0, 1);
      const burstProgress = progress / 0.72;
      if (burstProgress >= 1) {
        return;
      }

      const colors = getMoveEffectPalette(animation.moveType);
      const alpha = 1 - burstProgress;
      const radius = 5 + burstProgress * 15;
      const angleOffset = target === "enemy" ? -0.18 : 0.28;
      const centerY = position.y + (target === "enemy" ? 0 : -2);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = colors.accent || palette.white;
      ctx.lineWidth = 2;
      ctx.lineCap = "square";
      for (let index = 0; index < 6; index += 1) {
        const angle = angleOffset + (Math.PI * 2 * index) / 6;
        const inner = radius * 0.42;
        const outer = radius;
        ctx.beginPath();
        ctx.moveTo(
          Math.round(position.x + Math.cos(angle) * inner),
          Math.round(centerY + Math.sin(angle) * inner)
        );
        ctx.lineTo(
          Math.round(position.x + Math.cos(angle) * outer),
          Math.round(centerY + Math.sin(angle) * outer)
        );
        ctx.stroke();
      }

      drawMoveTypeAccents(animation, position, target, centerY, burstProgress, alpha * 0.86);
      drawEffectivenessAccent(animation, position, centerY, burstProgress, alpha);

      ctx.globalAlpha = alpha * 0.78;
      ctx.fillStyle = colors.main || palette.warning;
      ctx.fillRect(Math.round(position.x - 4), Math.round(centerY - 3), 8, 6);
      ctx.restore();
    }

    function drawMissStreaks(animation, position, target) {
      const progress = clamp(animation.elapsedMs / animation.durationMs, 0, 1);
      const alpha = Math.sin(progress * Math.PI);
      if (alpha <= 0) {
        return;
      }

      const direction = target === "enemy" ? 1 : -1;
      const drift = progress * 12 * direction;
      const baseX = position.x + drift;
      const baseY = position.y - 5 - progress * 5;
      const colors = getMoveEffectPalette(animation.moveType);

      ctx.save();
      ctx.globalAlpha = alpha * 0.72;
      ctx.strokeStyle = colors.accent || palette.white;
      ctx.lineWidth = 2;
      ctx.lineCap = "square";
      for (let index = 0; index < 3; index += 1) {
        const y = baseY + index * 5;
        ctx.beginPath();
        ctx.moveTo(Math.round(baseX - 12 * direction), Math.round(y + 4));
        ctx.lineTo(Math.round(baseX + 7 * direction), Math.round(y - 3));
        ctx.stroke();
      }
      ctx.globalAlpha = alpha * 0.32;
      ctx.strokeStyle = colors.dark || palette.deepest;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.round(baseX - 9 * direction), Math.round(baseY + 13));
      ctx.lineTo(Math.round(baseX + 5 * direction), Math.round(baseY + 7));
      ctx.stroke();
      ctx.restore();
    }

    function drawHealPulse(animation, position) {
      const progress = clamp(animation.elapsedMs / animation.durationMs, 0, 1);
      const pulse = Math.sin(progress * Math.PI);
      if (pulse <= 0) {
        return;
      }

      const ringRadius = 12 + progress * 16;
      const sparkles = [
        { x: -14, y: 2, delay: 0 },
        { x: 12, y: -5, delay: 0.12 },
        { x: -4, y: -14, delay: 0.2 },
        { x: 16, y: 8, delay: 0.32 },
      ];

      ctx.save();
      ctx.globalAlpha = 0.32 + pulse * 0.34;
      ctx.strokeStyle = "#7fbf75";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(position.x, position.y + 1, ringRadius, ringRadius * 0.68, 0, 0, Math.PI * 2);
      ctx.stroke();

      sparkles.forEach((sparkle) => {
        const localProgress = clamp((progress - sparkle.delay) / 0.68, 0, 1);
        if (localProgress <= 0 || localProgress >= 1) {
          return;
        }
        ctx.globalAlpha = (1 - localProgress) * 0.85;
        drawPixelSparkle(
          position.x + sparkle.x,
          position.y + sparkle.y - localProgress * 13,
          localProgress < 0.55 ? 2 : 1,
          localProgress < 0.45 ? palette.white : "#7fbf75"
        );
      });
      ctx.restore();
    }

    function drawExpSparkles(animation, position) {
      const progress = clamp(animation.elapsedMs / animation.durationMs, 0, 1);
      const pulse = Math.sin(progress * Math.PI);
      const sparkles = [
        { x: -24, y: 18, phase: 0, sway: 3 },
        { x: -12, y: 13, phase: 0.14, sway: -3 },
        { x: 2, y: 16, phase: 0.28, sway: 2 },
        { x: 15, y: 12, phase: 0.42, sway: -3 },
        { x: 25, y: 18, phase: 0.56, sway: 3 },
      ];

      ctx.save();
      ctx.globalAlpha = 0.14 + pulse * 0.24;
      ctx.strokeStyle = palette.captureYellow || "#d8b546";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(position.x, position.y + 7, 31, 21, -0.12, Math.PI * 0.08, Math.PI * 1.28);
      ctx.stroke();

      sparkles.forEach((sparkle) => {
        const localProgress = clamp((progress - sparkle.phase * 0.36) / 0.72, 0, 1);
        if (localProgress <= 0 || localProgress >= 1) {
          return;
        }
        const alpha = Math.sin(localProgress * Math.PI) * 0.96;
        const x = position.x + sparkle.x + Math.sin(localProgress * Math.PI * 2) * sparkle.sway;
        const y = position.y + sparkle.y - localProgress * 29;
        ctx.globalAlpha = alpha;
        drawPixelSparkle(
          x,
          y,
          localProgress < 0.62 ? 2 : 1,
          localProgress < 0.36 ? palette.white : palette.captureYellow || "#d8b546"
        );
      });
      ctx.restore();
    }

    function getResultEffectColors(variant) {
      if (variant === "level") {
        return {
          main: "#f8f4d7",
          accent: palette.captureYellow || "#d8b546",
          shadow: "#7fbf75",
        };
      }

      if (variant === "reward") {
        return {
          main: palette.white,
          accent: "#9b6de8",
          shadow: palette.captureYellow || "#d8b546",
        };
      }

      if (variant === "capture") {
        return {
          main: palette.white,
          accent: palette.captureYellow || "#d8b546",
          shadow: "#7fbf75",
        };
      }

      return {
        main: palette.white,
        accent: palette.captureYellow || "#d8b546",
        shadow: "#6fb5dc",
      };
    }

    function drawResultBurst(animation, layout) {
      const progress = clamp(animation.elapsedMs / animation.durationMs, 0, 1);
      const pulse = Math.sin(progress * Math.PI);
      if (pulse <= 0) {
        return;
      }

      const colors = getResultEffectColors(animation.variant);
      const target = animation.target || "player";
      const slot = target === "center"
        ? { monsterX: screen.width / 2, monsterY: 58, shadowY: 91 }
        : layout[target] || layout.player;
      const centerX = slot.monsterX;
      const centerY = slot.monsterY + (target === "enemy" ? 4 : -2);
      const radius = 8 + progress * 25;
      const sparkleCount = animation.variant === "reward" ? 7 : 9;

      ctx.save();
      ctx.globalAlpha = 0.16 + pulse * 0.24;
      ctx.fillStyle = colors.shadow;
      ctx.beginPath();
      ctx.ellipse(centerX, slot.shadowY || centerY + 22, 26 + pulse * 7, 7 + pulse * 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = pulse * 0.72;
      ctx.strokeStyle = colors.accent;
      ctx.lineWidth = animation.variant === "reward" ? 2 : 1;
      ctx.beginPath();
      ctx.ellipse(centerX, centerY, radius, radius * 0.62, -0.1, 0, Math.PI * 2);
      ctx.stroke();

      for (let index = 0; index < sparkleCount; index += 1) {
        const angle = (Math.PI * 2 * index) / sparkleCount + progress * 1.4;
        const localRadius = radius + (index % 2) * 5;
        const x = centerX + Math.cos(angle) * localRadius;
        const y = centerY + Math.sin(angle) * localRadius * 0.72;
        const size = index % 3 === 0 ? 2 : 1;
        ctx.globalAlpha = pulse * (index % 2 === 0 ? 0.94 : 0.7);
        drawPixelSparkle(x, y, size, index % 2 === 0 ? colors.main : colors.accent);
      }

      if (animation.variant === "reward") {
        ctx.globalAlpha = pulse * 0.9;
        ctx.fillStyle = colors.accent;
        ctx.fillRect(Math.round(centerX - 4), Math.round(centerY - 13), 8, 7);
        ctx.fillStyle = colors.main;
        ctx.fillRect(Math.round(centerX - 2), Math.round(centerY - 15), 4, 11);
        ctx.fillRect(Math.round(centerX - 6), Math.round(centerY - 11), 12, 2);
      } else if (animation.variant === "level") {
        ctx.globalAlpha = pulse * 0.86;
        ctx.fillStyle = colors.accent;
        ctx.fillRect(Math.round(centerX - 1), Math.round(centerY - 19 - progress * 4), 2, 14);
        ctx.fillRect(Math.round(centerX - 6), Math.round(centerY - 14 - progress * 4), 12, 2);
      }

      ctx.restore();
    }

    function drawBattleActionEffects(state, layout) {
      ["enemy", "player"].forEach((target) => {
        const position = getBattleEffectPosition(layout, target);
        const attack = getBattleActionAnimation(state, "attack", target);
        if (attack) {
          drawAttackTypeTrail(attack, position, target);
        }

        const damage = getBattleActionAnimation(state, "damage", target);
        if (damage) {
          drawImpactBurst(damage, position, target);
        }

        const miss = getBattleActionAnimation(state, "miss", target);
        if (miss) {
          drawMissStreaks(miss, position, target);
        }

        const heal = getBattleActionAnimation(state, "heal", target);
        if (heal) {
          drawHealPulse(heal, position);
        }
      });

      const exp = getBattleActionAnimation(state, "exp");
      if (exp) {
        drawExpSparkles(exp, getBattleEffectPosition(layout, "player"));
      }

      const result = getBattleActionAnimation(state, "result");
      if (result) {
        drawResultBurst(result, layout);
      }
    }

    function drawBattle(state) {
      // 戦闘画面はcanvasに背景とモンスターだけを描き、HP表示はDOMのbattle-overlayへ任せる。
      const layout = getBattleLayout();
      
      let shakeX = 0;
      let shakeY = 0;
      const animation = state.battle && state.battle.animation;
      if (animation && animation.kind === "damage") {
        const progress = Math.min(1, animation.elapsedMs / animation.durationMs);
        if (progress < 0.6) {
          const dmg = Math.max(1, animation.fromHp - animation.toHp);
          const intensity = Math.min(6, 1.5 + (dmg * 0.15)) * (1 - progress);
          shakeX = Math.sin(animation.elapsedMs * 0.05) * intensity;
          shakeY = Math.cos(animation.elapsedMs * 0.06) * intensity;
        }
      }

      clear(palette.battleBg || "#ded7bf");

      ctx.save();
      if (shakeX !== 0 || shakeY !== 0) {
        ctx.translate(shakeX, shakeY);
      }

      drawBattleBackdrop(layout);
      drawBattleShadow(layout.enemy);
      drawBattleShadow(layout.player);

      const playerMonster = state.party[0];
      const enemyMonster = state.battle.enemy;
      const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
      const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);
      const enemyOffset = getMonsterOffset(state, "enemy");
      const playerOffset = getMonsterOffset(state, "player");

      if (!shouldHideMonster(state, "enemy")) {
        ctx.save();
        ctx.globalAlpha = getMonsterAlpha(state, "enemy");
        drawBattleMonster(
          {
            x: layout.enemy.monsterX + enemyOffset.x,
            y: layout.enemy.monsterY + enemyOffset.y,
          },
          enemySpecies,
          "front"
        );
        ctx.restore();
      }

      if (!shouldHideMonster(state, "player")) {
        ctx.save();
        ctx.globalAlpha = getMonsterAlpha(state, "player");
        drawBattleMonster(
          {
            x: layout.player.monsterX + playerOffset.x,
            y: layout.player.monsterY + playerOffset.y,
          },
          playerSpecies,
          "back"
        );
        ctx.restore();
      }

      drawBattleIceWall(state, layout, "enemy");
      drawBattleIceWall(state, layout, "player");
      drawBattleActionEffects(state, layout);

      drawCaptureBall(state);

      ctx.restore();
    }

    function drawTransitionOverlay(state) {
      // transition.kindはfield-scene/battle-sceneが設定する。演出追加時は遷移完了処理finishTransitionIfNeededも見る。
      if (!state.transition.active) {
        return;
      }

      if (state.transition.kind === "wild-encounter") {
        const progress = Math.min(1, state.transition.elapsedMs / state.transition.durationMs);
        const barWidth = Math.ceil(screen.width * progress);

        for (let index = 0; index < 12; index += 1) {
          const top = index * 12;
          const fromLeft = index % 2 === 0;
          ctx.fillStyle = index % 3 === 0 ? palette.white : palette.deepest;
          if (fromLeft) {
            ctx.fillRect(0, top, barWidth, 8);
          } else {
            ctx.fillRect(screen.width - barWidth, top, barWidth, 8);
          }
        }

        ctx.fillStyle = `rgba(248, 249, 238, ${progress * 0.35})`;
        ctx.fillRect(0, 0, screen.width, screen.height);
      } else if (state.transition.kind === "trainer-encounter") {
        const progress = Math.min(1, state.transition.elapsedMs / state.transition.durationMs);
        
        ctx.fillStyle = palette.deepest;
        
        // Circular mask closing in
        ctx.beginPath();
        ctx.rect(0, 0, screen.width, screen.height);
        
        const radius = Math.max(0, screen.width - (progress * screen.width * 1.5));
        ctx.arc(screen.width / 2, screen.height / 2, radius, 0, Math.PI * 2, true);
        ctx.fill();

        // Flash screen white briefly at the start
        if (progress < 0.1) {
           ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
           ctx.fillRect(0, 0, screen.width, screen.height);
        }

      } else if (state.transition.kind === "champion-intro") {
        const progress = state.transition.elapsedMs / state.transition.durationMs;
        
        ctx.fillStyle = `rgba(0, 0, 0, 1)`;
        ctx.fillRect(0, 0, screen.width, screen.height);

        // 4 lights appearing over time
        // 0-0.1: light 1, 0.1-0.2: light 2, etc.
        const numLights = 4;
        for (let i = 0; i < numLights; i++) {
          if (progress > i * 0.1) {
            ctx.fillStyle = "rgba(255, 255, 200, 0.3)";
            const lx = screen.width / 2 + (i % 2 === 0 ? -30 : 30);
            const ly = screen.height / 2 + (i < 2 ? -30 : 30) - 20;
            ctx.beginPath();
            ctx.arc(lx, ly, 20, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        
        if (progress > 0.4) {
           // Reveal map and champion
           ctx.globalCompositeOperation = "destination-out";
           const radius = Math.min(screen.width, (progress - 0.4) * 2 * screen.width);
           ctx.beginPath();
           ctx.arc(screen.width / 2, screen.height / 2 - 30, radius, 0, Math.PI * 2);
           ctx.fill();
           ctx.globalCompositeOperation = "source-over";
        }
      } else if (state.transition.kind === "battle-end") {
        const progress = Math.min(1, state.transition.elapsedMs / state.transition.durationMs);
        ctx.fillStyle = `rgba(0, 0, 0, ${1 - progress})`;
        ctx.fillRect(0, 0, screen.width, screen.height);
      }
    }

    function renderMessage(state, dataRegistryInstance) {
      // フィールドメッセージのみscreen-messageへ出す。戦闘文言はui.jsのbattle-message-panelへ分離して重なりを防ぐ。
      let message = "";
      let caption = "";

      if (state.scene === "field") {
        message = state.field.message || "";
        caption = dataRegistryInstance.getMap(state.field.mapId).name;
        if (message && state.field.messageKind) {
          messageElement.dataset.kind = state.field.messageKind;
        } else {
          delete messageElement.dataset.kind;
        }
      } else if (state.scene === "battle" && state.battle) {
        message = "";
        caption = "やせいとの戦い";
        delete messageElement.dataset.kind;
      } else if (state.transition.active) {
        caption = dataRegistryInstance.getMap(state.field.mapId).name;
        delete messageElement.dataset.kind;
      }

      messageElement.textContent = message.replace(/\\n/g, "\n");
      messageElement.classList.toggle("is-hidden", message.length === 0);
      captionElement.textContent = caption;
      captionElement.classList.toggle("is-battle", state.scene === "battle");
    }

    function render(state) {
      syncCanvasResolution();
      if (state.scene === "field") {
        drawField(state);
      } else if (state.scene === "battle") {
        drawBattle(state);
      }

      drawTransitionOverlay(state);
      renderMessage(state, dataRegistry);
    }

    return {
      render,
    };
  }

  App.core.createScreenRenderer = createScreenRenderer;
})();

</script>
    <script>
/* --- scripts/core/ui.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// canvas外のDOM UIを描く層。状態表示、タイマー、フィールド操作、戦闘HPカード、戦闘コマンドを担当する。
// ボタンはrenderごとに作り直してinput.jsへイベント登録するため、DOMを保持する外部コードを追加しないこと。
(() => {
  const App = window.MonsterPrototype;

  function createUiRenderer(options) {
    const {
      statusStrip,
      actionPanel,
      battleOverlay,
      screenTimer,
      store,
      input,
      modal,
      dataRegistry,
      battleScene,
      getObjectiveText,
    } = options;

    let lastStatusKey = "";
    let lastPanelKey = "";
    let lastOverlayKey = "";
    let lastTimerKey = "";
    function createButton(label, className, onClick, disabled) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `control-button ${className || ""}`.trim();
      button.textContent = label;
      button.disabled = Boolean(disabled);
      if (typeof onClick === "function") {
        button.addEventListener("click", onClick);
      }
      return button;
    }

    function getMoveTypeClass(type) {
      switch (type) {
        case "くさ":
          return "is-type-grass";
        case "みず":
          return "is-type-water";
        case "こおり":
          return "is-type-ice";
        case "はがね":
          return "is-type-steel";
        default:
          return "is-type-normal";
      }
    }

    function getMoveEffectText(move) {
      // 技選択中の補足表示用。moves.jsへ新しいeffectを追加したら、ここにもユーザー向け短文を追加する。
      if (!move) return "";
      switch (move.effect) {
        case "random_heal":
          return "HPを回復する。";
        case "evasion_up":
          return "回避率を上げる。";
        case "charge_attack":
          return "1ターン溜めて攻撃する。";
        case "damage_boost":
          return "次の攻撃の威力を上げる。";
        case "chance_big_damage":
          return "まれに大きなダメージを与える。";
        case "ice_wall":
          return "攻撃を軽減し、少しはね返す。";
        case "water_forms":
          return "型が変わる水の連続技。";
        case "swimming_regen":
          return "数ターン少しずつ回復する。";
        default:
          return "";
      }
    }

    function createMoveButton(move, currentPp, onHover, options) {
      const settings = options || {};
      const ppRatio = currentPp / Math.max(1, move.pp);
      const classNames = [
        "move-button",
        getMoveTypeClass(move.type),
        settings.previewed ? "is-previewed" : "",
        currentPp <= 0 ? "is-empty" : "",
        currentPp > 0 && ppRatio <= 0.25 ? "is-low-pp" : "",
      ].filter(Boolean).join(" ");
      const button = createButton("", classNames, null, currentPp <= 0);
      const powerText = move.power > 0 ? `威力 ${move.power}` : "補助";
      button.setAttribute(
        "aria-label",
        `${move.name} ${move.type} PP ${currentPp}/${move.pp} ${powerText} 命中 ${move.accuracy}`
      );

      if (onHover) {
        button.addEventListener("mouseenter", () => onHover(move.id));
        button.addEventListener("mouseleave", () => onHover(null));
        button.addEventListener("focus", () => onHover(move.id));
        button.addEventListener("blur", () => onHover(null));
      }

      const name = document.createElement("span");
      name.className = "move-name";
      name.textContent = move.name;

      const main = document.createElement("span");
      main.className = "move-main";

      const meta = document.createElement("span");
      meta.className = "move-meta";

      const type = document.createElement("span");
      type.className = "move-type";
      type.textContent = move.type;

      const pp = document.createElement("span");
      pp.className = "move-pp";
      pp.textContent = `PP ${currentPp}/${move.pp}`;

      const ppRow = document.createElement("span");
      ppRow.className = "move-pp-row";
      const ppLabel = document.createElement("span");
      ppLabel.className = "move-pp-label";
      ppLabel.textContent = "PP";
      const ppTrack = document.createElement("span");
      ppTrack.className = "move-pp-track";
      const ppFill = document.createElement("span");
      ppFill.className = "move-pp-fill";
      ppFill.style.width = `${Math.max(0, Math.min(100, ppRatio * 100))}%`;
      const ppValue = document.createElement("span");
      ppValue.className = "move-pp-value";
      ppValue.textContent = `${currentPp}/${move.pp}`;

      const detail = document.createElement("span");
      detail.className = "move-detail";
      const power = document.createElement("span");
      power.className = "move-power";
      power.textContent = powerText;
      const accuracy = document.createElement("span");
      accuracy.className = "move-accuracy";
      accuracy.textContent = `命中 ${move.accuracy}`;

      meta.appendChild(type);
      meta.appendChild(pp);
      main.appendChild(name);
      main.appendChild(meta);
      ppTrack.appendChild(ppFill);
      ppRow.appendChild(ppLabel);
      ppRow.appendChild(ppTrack);
      ppRow.appendChild(ppValue);
      detail.appendChild(power);
      detail.appendChild(accuracy);
      button.appendChild(main);
      button.appendChild(ppRow);
      button.appendChild(detail);
      return button;
    }

    function formatShownHp(value) {
      return Math.max(0, Math.ceil(value));
    }

    function formatTimer(ms) {
      const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function getPreparationTimerText(state) {
      if (!state.progress || state.progress.storyStage !== "preparation") {
        return "";
      }

      const durationMs =
        (App.config.game.story && App.config.game.story.preparationDurationMs) || 300000;
      return formatTimer(durationMs - (state.progress.prepElapsedMs || 0));
    }

    function renderScreenTimer(state) {
      // 同じDOMで準備タイマーとタイムアタックを切り替える。表示条件はapp.jsのタイマー更新条件と合わせる。
      if (!screenTimer) {
        return;
      }

      let timerText = "";
      
      if (state.timeAttack.active || state.progress.storyStage !== "preparation") {
        timerText = formatTimer(state.timeAttack.elapsedMs);
      } else {
        timerText = getPreparationTimerText(state);
      }

      const timerKey = JSON.stringify({
        text: timerText,
        visible: Boolean(timerText),
      });
      if (timerKey === lastTimerKey) {
        return;
      }
      lastTimerKey = timerKey;

      screenTimer.textContent = timerText;
      screenTimer.classList.toggle("is-hidden", !timerText);
      screenTimer.setAttribute("aria-hidden", String(!timerText));
    }

    function renderStatus(state) {
      // 戦闘中はstatus-cardを隠す。戦闘HPはbattle-overlayへ出し、画面内メッセージとの重なりを避ける。
      const playerMonster = state.party[0];
      const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
      const statusCard = statusStrip.parentElement;
      const hideStatus = state.scene === "battle";
      const shownHp =
        state.scene === "battle" && state.battle
          ? formatShownHp(state.battle.display.playerHp)
          : playerMonster.currentHp;
      const objectiveText = getStatusObjectiveText(state);
      if (statusCard) {
        statusCard.classList.toggle("is-hidden", hideStatus);
      }
      const statusKey = JSON.stringify({
        scene: state.scene,
        hidden: hideStatus,
        level: playerMonster.level,
        hp: shownHp,
        objectiveText,
      });

      if (statusKey === lastStatusKey) {
        return;
      }
      lastStatusKey = statusKey;

      statusStrip.classList.toggle("is-compact", state.scene === "battle");
      statusStrip.innerHTML = "";
      if (hideStatus) {
        return;
      }

      const items = [
        { text: `${playerSpecies.name} Lv${playerMonster.level}`, className: "is-monster" },
        { text: `HP ${shownHp}/${playerMonster.maxHp}`, className: "is-hp" },
        { text: objectiveText, className: "is-objective" },
      ];

      items.forEach((item) => {
        const pill = document.createElement("div");
        pill.className = `status-pill ${item.className}`;
        pill.textContent = item.text;
        statusStrip.appendChild(pill);
      });
    }

    function getStatusObjectiveText(state) {
      // 常時表示は短く保ち、詳細はメニューの「目的」に残す。
      if (state.progress && state.progress.storyStage === "preparation") {
        return state.progress.prepGateUnlocked
          ? "目的: 左出口から進む"
          : "目的: 草むらで5分準備";
      }

      const fullText = getObjectiveText(state) || "";
      return fullText
        .replace("左の出口からしずかなひろばへ行き、案内人に話を聞く。", "受付で案内人に話す")
        .replace("ながめのみちの草むらで、野生の相手を1体つかまえる。", "草むらで1体つかまえる")
        .replace("しずかなひろばの案内人へ、捕獲の観察結果を報告する。", "案内人へ報告する");
    }

    function renderFieldControls(state) {
      // フィールド操作は「メッセージ表示中はB=戻る、通常時はB=走る」に切り替わる。
      // input名を変える場合はfield-scene.jsのconsumeAction側も同時に見る。
      const wrapper = document.createElement("div");
      wrapper.className = "field-controls";

      const dPad = document.createElement("div");
      dPad.className = "direction-pad";
      const up = createButton("▲", "dpad-button is-up");
      const left = createButton("◀", "dpad-button is-left");
      const right = createButton("▶", "dpad-button is-right");
      const down = createButton("▼", "dpad-button is-down");
      up.setAttribute("aria-label", "上へ移動");
      left.setAttribute("aria-label", "左へ移動");
      right.setAttribute("aria-label", "右へ移動");
      down.setAttribute("aria-label", "下へ移動");

      input.attachDirectionalPad(dPad, {
        up,
        right,
        down,
        left,
      });

      dPad.appendChild(document.createElement("div")).className = "direction-spacer";
      dPad.appendChild(up);
      dPad.appendChild(document.createElement("div")).className = "direction-spacer";
      dPad.appendChild(left);
      dPad.appendChild(document.createElement("div")).className = "direction-spacer";
      dPad.appendChild(right);
      dPad.appendChild(document.createElement("div")).className = "direction-spacer";
      dPad.appendChild(down);
      dPad.appendChild(document.createElement("div")).className = "direction-spacer";
      wrapper.appendChild(dPad);

      const actionButtons = document.createElement("div");
      actionButtons.className = "action-buttons";
      const confirm = createButton(
        state.field.message ? "A つづける" : "A 決定",
        "face-button is-a"
      );
      const cancel = createButton(state.field.message ? "B 戻る" : "B 走る", "face-button is-b");
      const menu = createButton("メニュー", "system-button is-menu");

      input.attachActionButton(confirm, "confirm");
      if (state.field.message) {
        input.attachActionButton(cancel, "cancel");
      } else {
        input.attachHoldButton(cancel, "run");
      }
      input.attachActionButton(menu, "menu");

      actionButtons.appendChild(confirm);
      actionButtons.appendChild(cancel);
      actionButtons.appendChild(menu);
      wrapper.appendChild(actionButtons);

      return wrapper;
    }

    function createBattleCard(options) {
      const card = document.createElement("div");
      card.className = `battle-card ${options.className}`.trim();

      const top = document.createElement("div");
      top.className = "battle-card-top";
      const name = document.createElement("div");
      name.className = "battle-name";
      name.textContent = options.name;
      
      const typeEl = document.createElement("div");
      typeEl.className = "battle-type";
      typeEl.textContent = options.type ? `[${options.type}]` : "";

      const level = document.createElement("div");
      level.className = "battle-level";
      level.textContent = `Lv${options.level}`;
      
      top.appendChild(name);
      top.appendChild(level);
      card.appendChild(top);

      const typeRow = document.createElement("div");
      typeRow.className = "battle-type-row";
      const typeRowEl = document.createElement("div");
      typeRowEl.className = "battle-type";
      typeRowEl.textContent = options.type ? `タイプ: ${options.type}` : "";
      typeRow.appendChild(typeRowEl);
      card.appendChild(typeRow);

      const hpRow = document.createElement("div");
      hpRow.className = "battle-hp-row";
      const label = document.createElement("div");
      label.className = "battle-hp-label";
      label.textContent = "HP";
      const track = document.createElement("div");
      track.className = "battle-hp-track";
      const fill = document.createElement("div");
      fill.className = "battle-hp-fill";
      if (options.hpRatio <= 0.3) {
        fill.classList.add("is-low");
      }
      fill.style.width = `${Math.max(0, Math.min(100, options.hpRatio * 100))}%`;
      track.appendChild(fill);
      hpRow.appendChild(label);
      hpRow.appendChild(track);

      if (options.hpText) {
        const value = document.createElement("div");
        value.className = "battle-hp-value";
        value.textContent = options.hpText;
        hpRow.appendChild(value);
      }

      card.appendChild(hpRow);

      if (typeof options.expRatio === "number") {
        const expRow = document.createElement("div");
        expRow.className = "battle-exp-row";
        const expTrack = document.createElement("div");
        expTrack.className = "battle-exp-track";
        const expFill = document.createElement("div");
        expFill.className = "battle-exp-fill";
        if (options.expActive) {
          expFill.classList.add("is-gaining");
        }
        expFill.style.width = `${Math.max(0, Math.min(100, options.expRatio * 100))}%`;
        expTrack.appendChild(expFill);
        expRow.appendChild(expTrack);
        card.appendChild(expRow);
      }

      return card;
    }

    function createBattleCommandButtons(options) {
      const settings = options || {};
      const wrapper = document.createElement("div");
      wrapper.className = "battle-buttons";
      const fullHealCount = Number.isInteger(settings.fullHealCount)
        ? settings.fullHealCount
        : 0;
      const masterBallCount = Number.isInteger(settings.masterBallCount)
        ? settings.masterBallCount
        : 0;
      const itemCount = fullHealCount + masterBallCount;

      const fight = createButton("たたかう", "battle-command-button is-fight", null, settings.disabledAll);
      fight.dataset.commandHint = "技";
      fight.setAttribute("aria-label", "たたかう 技を選ぶ");
      const ball = createButton("ボール", "battle-command-button is-ball", null, settings.disabledAll);
      ball.dataset.commandHint = "捕獲";
      ball.setAttribute("aria-label", "ボール 捕獲を試す");
      const run = createButton("にげる", "battle-command-button is-run", null, settings.disabledAll);
      run.dataset.commandHint = "撤退";
      run.setAttribute("aria-label", "にげる 戦闘から離れる");
      const item = createButton(
        "アイテム",
        `battle-command-button is-item ${settings.itemDisabled && !settings.disabledAll ? "is-subtle" : ""}`,
        null,
        settings.disabledAll || settings.itemDisabled
      );
      item.dataset.commandHint = settings.itemDisabled ? "在庫0" : `道具 x${itemCount}`;
      item.setAttribute(
        "aria-label",
        `アイテム 回復薬 ${fullHealCount}個 パーフェクトボール ${masterBallCount}個`
      );

      if (!settings.disabledAll) {
        input.attachActionButton(fight, "battle_open_move_menu");
        input.attachActionButton(ball, "battle_throw_ball");
        input.attachActionButton(run, "battle_attempt_run");
        if (!settings.itemDisabled) {
          input.attachActionButton(item, "battle_use_item");
        }
      }

      wrapper.appendChild(fight);
      wrapper.appendChild(ball);
      wrapper.appendChild(run);
      wrapper.appendChild(item);

      return wrapper;
    }

    function createBattleItemButtons(state, disabledAll) {
      const wrapper = document.createElement("div");
      wrapper.className = "battle-buttons is-item-select";
      const fullHealCount = state.inventory.fullHealCount || 0;
      const masterBallCount = state.inventory.masterBallCount || 0;
      const playerMonster = state.party[0];
      const fullHealDisabled =
        disabledAll || fullHealCount <= 0 || playerMonster.currentHp >= playerMonster.maxHp;
      const masterBallDisabled =
        disabledAll || masterBallCount <= 0 || Boolean(state.battle.isTrainerBattle);

      const heal = createButton(
        "回復薬",
        `battle-command-button is-item ${fullHealDisabled && !disabledAll ? "is-subtle" : ""}`,
        null,
        fullHealDisabled
      );
      heal.dataset.commandHint =
        fullHealCount <= 0 ? "在庫0" : playerMonster.currentHp >= playerMonster.maxHp ? "HP満タン" : `x${fullHealCount}`;
      heal.setAttribute("aria-label", `回復薬 ${fullHealCount}個`);

      const masterBall = createButton(
        "Pボール",
        `battle-command-button is-master ${masterBallDisabled && !disabledAll ? "is-subtle" : ""}`,
        null,
        masterBallDisabled
      );
      masterBall.dataset.commandHint =
        masterBallCount <= 0 ? "在庫0" : state.battle.isTrainerBattle ? "使用不可" : `確定 x${masterBallCount}`;
      masterBall.setAttribute("aria-label", `パーフェクトボール ${masterBallCount}個`);

      const back = createButton("もどる", "move-back-button is-subtle", null, disabledAll);
      back.setAttribute("aria-label", "もどる コマンドへ戻る");

      if (!disabledAll) {
        if (!fullHealDisabled) {
          input.attachActionButton(heal, "battle_use_full_heal");
        }
        if (!masterBallDisabled) {
          input.attachActionButton(masterBall, "battle_use_master_ball");
        }
        input.attachActionButton(back, "cancel");
      }

      wrapper.appendChild(heal);
      wrapper.appendChild(masterBall);
      wrapper.appendChild(back);
      return wrapper;
    }

    function renderBattleOverlay(state) {
      // HPカードは差分キーで再描画を抑える。カード位置はstyles.css、HP値はbattle-scene.jsのdisplay値に依存する。
      if (state.scene !== "battle" || !state.battle) {
        battleOverlay.classList.add("is-hidden");
        battleOverlay.setAttribute("aria-hidden", "true");
        battleOverlay.innerHTML = "";
        lastOverlayKey = "";
        return;
      }

      const playerMonster = state.party[0];
      const enemyMonster = state.battle.enemy;
      const playerSpecies = dataRegistry.getSpecies(playerMonster.speciesId);
      const enemySpecies = dataRegistry.getSpecies(enemyMonster.speciesId);
      const playerShownHp = formatShownHp(state.battle.display.playerHp);
      const enemyShownHp = formatShownHp(state.battle.display.enemyHp);
      const shownExp =
        typeof state.battle.display.playerExp === "number"
          ? state.battle.display.playerExp
          : playerMonster.exp || 0;
      const expActive = Boolean(state.battle.animation && state.battle.animation.kind === "exp");

      const requiredExp = playerMonster.level * playerMonster.level * 10;
      const expRatio = shownExp / requiredExp;

      const overlayKey = JSON.stringify({
        playerShownHp,
        enemyShownHp,
        playerShownExp: Math.round(shownExp * 10) / 10,
        expActive,
        playerName: playerSpecies.name,
        enemyName: enemySpecies.name,
        playerLevel: playerMonster.level,
        playerExp: playerMonster.exp,
      });

      battleOverlay.classList.remove("is-hidden");
      battleOverlay.setAttribute("aria-hidden", "false");

      if (overlayKey === lastOverlayKey) {
        return;
      }
      lastOverlayKey = overlayKey;

      battleOverlay.innerHTML = "";
      battleOverlay.appendChild(
        createBattleCard({
          className: "is-enemy",
          name: enemySpecies.name,
          type: enemySpecies.types.join(" / "),
          level: enemyMonster.level,
          hpRatio: enemyShownHp / enemyMonster.maxHp,
        })
      );
      battleOverlay.appendChild(
        createBattleCard({
          className: "is-player",
          name: playerSpecies.name,
          type: playerSpecies.types.join(" / "),
          level: playerMonster.level,
          hpRatio: playerShownHp / playerMonster.maxHp,
          hpText: `${playerShownHp}/${playerMonster.maxHp}`,
          expRatio: expRatio,
          expActive,
        })
      );
    }

    function renderBattleControls(state) {
      // battle.phaseごとに同じ操作パネルを差し替える。message中は入力ロックとdisabledボタンで誤操作を避ける。
      const battle = state.battle;
      const animationActive = Boolean(battle.animation) || state.transition.active;
      const playerMonster = state.party[0];
      const itemDisabled =
        state.inventory.fullHealCount <= 0 && state.inventory.masterBallCount <= 0;
      const panel = document.createElement("div");
      panel.className = "battle-panel";

      const message = document.createElement("div");
      message.className = "battle-message-panel";
      message.setAttribute("aria-live", "polite");

      let currentMessage = battle.currentMessage;
      if (!currentMessage && battle.phase === "moveSelect" && battle.hoveredMoveId) {
        const move = dataRegistry.getMove(battle.hoveredMoveId);
        if (move) {
          const powerText = move.power > 0 ? `威力:${move.power}` : "威力:-";
          const accuracyText = move.accuracy > 0 ? `命中:${move.accuracy}` : "";
          const effectText = getMoveEffectText(move);
          currentMessage = `${powerText} ${accuracyText} ${effectText}`.trim();
        }
      }

      message.textContent =
        currentMessage ||
        (battle.phase === "moveSelect"
          ? "技を選んでください。"
          : battle.phase === "itemSelect"
            ? "アイテムを選んでください。"
            : "コマンドを選んでください。");
      panel.appendChild(message);

      if (battle.phase === "message") {
        panel.appendChild(createBattleCommandButtons({ 
          disabledAll: true, 
          itemDisabled: true,
          fullHealCount: state.inventory.fullHealCount,
          masterBallCount: state.inventory.masterBallCount,
        }));
        return panel;
      }

      if (battle.phase === "command") {
        panel.appendChild(
          createBattleCommandButtons({
            disabledAll: animationActive,
            itemDisabled,
            fullHealCount: state.inventory.fullHealCount,
            masterBallCount: state.inventory.masterBallCount,
          })
        );
        return panel;
      }

      if (battle.phase === "moveSelect") {
        // hoverMoveは説明文表示だけでなく状態を更新するため、panelKeyへhoveredMoveIdを足す必要がある場合がある。
        const wrapper = document.createElement("div");
        wrapper.className = "battle-buttons is-move-select";
        const playerMonster = state.party[0];
        playerMonster.moveIds.forEach((moveId, index) => {
          const move = dataRegistry.getMove(moveId);
          const currentPp = playerMonster.currentPp[index];
          const button = createMoveButton(move, currentPp, battleScene.hoverMove, {
            previewed: battle.hoveredMoveId === moveId,
          });
          input.attachActionButton(button, "battle_select_move", { moveId });
          wrapper.appendChild(button);
        });
        const back = createButton("もどる", "move-back-button is-subtle");
        back.setAttribute("aria-label", "もどる コマンドへ戻る");
        input.attachActionButton(back, "cancel");
        wrapper.appendChild(back);
        panel.appendChild(wrapper);
        return panel;
      }

      if (battle.phase === "itemSelect") {
        panel.appendChild(createBattleItemButtons(state, animationActive));
        return panel;
      }

      panel.appendChild(createBattleCommandButtons({ disabledAll: true, itemDisabled: true }));
      return panel;
    }

    function renderActionPanel(state) {
      // panelKeyに入れた値だけで再描画判断する。UIが更新されない時は、まずこのキーへ状態が含まれているか確認する。
      const panelKey = JSON.stringify({
        scene: state.scene,
        transition: state.transition.active ? state.transition.kind : "",
        fieldMessage: state.field.message,
        battlePhase: state.battle ? state.battle.phase : null,
        battleMessage: state.battle ? state.battle.currentMessage : null,
        battleAnimation: state.battle ? state.battle.animation && state.battle.animation.kind : null,
        battleHoveredMove: state.battle ? state.battle.hoveredMoveId : null,
        fullHealCount: state.inventory.fullHealCount,
        masterBallCount: state.inventory.masterBallCount,
        playerHp: state.party[0] ? state.party[0].currentHp : 0,
        playerPp: state.party[0] ? state.party[0].currentPp : [],
      });

      if (panelKey === lastPanelKey) {
        return;
      }
      lastPanelKey = panelKey;
      actionPanel.innerHTML = "";

      if (state.transition.active) {
        actionPanel.appendChild(
          createButton("野生の気配…", "is-subtle", () => {}, true)
        );
      } else if (state.scene === "field") {
        actionPanel.appendChild(renderFieldControls(state));
      } else if (state.scene === "battle") {
        actionPanel.appendChild(renderBattleControls(state));
      }
    }

    function render() {
      // body.is-battle-sceneはCSSの画面比率切替スイッチ。scene変更と同じフレームで更新する。
      const state = store.getState();
      document.body.classList.toggle("is-battle-scene", state.scene === "battle");
      renderScreenTimer(state);
      renderStatus(state);
      renderBattleOverlay(state);
      renderActionPanel(state);
      modal.render();
    }

    return {
      render,
    };
  }

  App.core.createUiRenderer = createUiRenderer;
})();

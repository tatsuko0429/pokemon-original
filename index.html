    <script>
/* --- scripts/core/audio.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// Web Audioの生成音とHTMLAudioElementのBGMを扱う。ブラウザ制約により初回ユーザー操作まで音は鳴らせない。
// 音が鳴らない不具合を追う時は、playBgmより先にbindUserGesture/unlockの状態を確認する。
(() => {
  const App = window.MonsterPrototype;

  function createAudioManager(config) {
    const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    const bgmPatterns = (config && config.bgm) || {};
    const sePatterns = (config && config.se) || {};
    const masterVolume = config && config.masterVolume ? config.masterVolume : 0.07;
    const seVolumeMultiplier = Math.max(
      1,
      Math.min(32, (config && config.seVolumeMultiplier) || 1)
    );
    const maxActiveSeTones = Math.max(
      4,
      Math.min(64, Math.floor((config && config.maxActiveSeTones) || 18))
    );
    let context = null;
    let masterGain = null;
    let bgmGain = null;
    let seGain = null;
    let unlocked = false;
    let desiredBgmId = "";
    let currentBgmId = "";
    let bgmLoopToken = 0;
    let bgmTimeoutId = null;
    let activeBgmElement = null;
    let unlockPromise = null;
    let recoverPromise = null;
    let fadeIntervalId = null;
    let bgmRetryBlockedUntil = 0;
    let lifecycleRecoveryBound = false;
    const activeBgmNodes = new Set();
    const activeSeNodes = new Set();
    const bgmAudioElements = new Map();
    const playedSeHistory = [];

    function recordSe(id) {
      if (!id) {
        return;
      }
      playedSeHistory.push({
        id,
        at: Math.round(performance.now()),
      });
      while (playedSeHistory.length > 64) {
        playedSeHistory.shift();
      }
    }

    function getPatternVolume(pattern) {
      return Math.max(
        0,
        Math.min(1, pattern && pattern.volume !== undefined ? pattern.volume : masterVolume)
      );
    }

    function getSynthBgmGain(pattern) {
      if (!masterVolume) {
        return 1;
      }
      return Math.max(0, Math.min(1, getPatternVolume(pattern) / masterVolume));
    }

    function isBgmRetryBlocked() {
      return bgmRetryBlockedUntil > 0 && performance.now() < bgmRetryBlockedUntil;
    }

    function isDesiredBgmInterrupted() {
      if (!desiredBgmId) {
        return false;
      }

      const pattern = bgmPatterns[desiredBgmId];
      if (!pattern) {
        return false;
      }

      if (currentBgmId !== desiredBgmId) {
        return true;
      }

      if (pattern.src) {
        const element = bgmAudioElements.get(desiredBgmId);
        return !element || element.paused || element.ended;
      }

      return Boolean(context && context.state === "running" && activeBgmNodes.size === 0 && !bgmTimeoutId);
    }

    function hasRecoverableAudioIssue() {
      return (
        !unlocked ||
        Boolean(context && context.state !== "running") ||
        isDesiredBgmInterrupted()
      );
    }

    function clearFadeInterval() {
      if (fadeIntervalId) {
        window.clearInterval(fadeIntervalId);
        fadeIntervalId = null;
      }
    }

    function transitionBgm(newId, durationMs) {
      clearFadeInterval();
      const steps = 10;
      const stepMs = durationMs / steps;
      let currentStep = 0;

      const startElementVol = activeBgmElement ? activeBgmElement.volume : 0;
      const startSynthVol = bgmGain ? bgmGain.gain.value : 1.0;

      if (durationMs <= 0) {
        stopBgmPlayback();
        if (newId) {
          startBgmPlayback(newId).then((started) => {
            if (started) {
              const pattern = bgmPatterns[newId];
              if (activeBgmElement) {
                activeBgmElement.volume = getPatternVolume(pattern);
              }
              if (bgmGain) bgmGain.gain.value = getSynthBgmGain(pattern);
            }
          });
        }
        return;
      }

      fadeIntervalId = window.setInterval(() => {
        // フェード開始後にdesiredBgmIdが変わった場合（別のplayBgm呼び出し）は
        // このインターバルを破棄して新しいtransitionBgmに委ねる。
        if (newId && desiredBgmId !== newId) {
          clearFadeInterval();
          return;
        }

        currentStep += 1;
        const ratio = 1 - (currentStep / steps);

        if (activeBgmElement) {
          activeBgmElement.volume = Math.max(0, startElementVol * ratio);
        }
        if (bgmGain) {
          bgmGain.gain.value = Math.max(0, startSynthVol * ratio);
        }

        if (currentStep >= steps) {
          clearFadeInterval();
          stopBgmPlayback();

          if (newId) {
            const pattern = bgmPatterns[newId];
            if (pattern && pattern.src) {
              const el = getBgmAudioElement(newId, pattern);
              el.volume = 0;
            }
            if (bgmGain) bgmGain.gain.value = 0;

            startBgmPlayback(newId).then((started) => {
              if (started) fadeInBgm(newId, durationMs);
            });
          }
        }
      }, stepMs);
    }

    function fadeInBgm(id, durationMs) {
      clearFadeInterval();
      const pattern = bgmPatterns[id];
      const targetVol = getPatternVolume(pattern);
      const targetSynthGain = getSynthBgmGain(pattern);
      const steps = 10;
      const stepMs = durationMs / steps;
      let currentStep = 0;

      if (activeBgmElement) activeBgmElement.volume = 0;
      if (bgmGain) bgmGain.gain.value = 0;

      fadeIntervalId = window.setInterval(() => {
        if (desiredBgmId !== id) {
          clearFadeInterval();
          return;
        }

        currentStep += 1;
        const ratio = currentStep / steps;

        if (activeBgmElement) {
          activeBgmElement.volume = Math.min(targetVol, targetVol * ratio);
        }
        if (bgmGain) {
          bgmGain.gain.value = Math.min(targetSynthGain, targetSynthGain * ratio);
        }

        if (currentStep >= steps) {
          clearFadeInterval();
        }
      }, stepMs);
    }

    function ensureContext() {
      if (!AudioContextCtor) {
        return null;
      }

      if (context && context.state === "closed") {
        activeBgmNodes.clear();
        activeSeNodes.clear();
        context = null;
        masterGain = null;
        bgmGain = null;
        seGain = null;
      }

      if (!context) {
        context = new AudioContextCtor();
        masterGain = context.createGain();
        masterGain.gain.value = masterVolume;
        masterGain.connect(context.destination);

        bgmGain = context.createGain();
        bgmGain.gain.value = 1.0;
        bgmGain.connect(masterGain);

        seGain = context.createGain();
        seGain.gain.value = seVolumeMultiplier;
        seGain.connect(masterGain);
      }

      return context;
    }

    async function resumeContext() {
      const audioContext = ensureContext();
      if (!audioContext) {
        return true;
      }

      if (audioContext.state === "running") {
        return true;
      }

      if (audioContext.state === "closed") {
        return false;
      }

      try {
        await audioContext.resume();
      } catch (error) {
        return false;
      }

      return audioContext.state === "running";
    }

    function forgetNode(collection, oscillator) {
      collection.delete(oscillator);
    }

    function limitCollection(collection, maxCount) {
      while (collection.size >= maxCount) {
        const oldest = collection.values().next().value;
        if (!oldest) {
          return;
        }
        try {
          oldest.stop();
        } catch (error) {
          // stop 済みまたは開始前に停止できないノードは参照だけ外す。
        }
        collection.delete(oldest);
      }
    }

    function stopCollection(collection) {
      collection.forEach((oscillator) => {
        try {
          oscillator.stop();
        } catch (error) {
          // stop 済みのノードはそのまま無視する。
        }
      });
      collection.clear();
    }

    function playTone(note, startTime, durationSeconds, defaultWave, collection) {
      const audioContext = ensureContext();
      if (!audioContext || !masterGain || !note.freq) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const peak = Math.max(0.0001, 0.14 * (note.volume || 1));
      const endTime = startTime + durationSeconds;

      oscillator.type = note.wave || defaultWave || "square";
      oscillator.frequency.setValueAtTime(note.freq, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(peak, startTime + Math.min(0.015, durationSeconds / 4));
      gain.gain.exponentialRampToValueAtTime(0.0001, Math.max(startTime + 0.02, endTime - 0.015));

      const isBgm = collection === activeBgmNodes;
      const targetGain = isBgm ? bgmGain : seGain;

      oscillator.connect(gain);
      gain.connect(targetGain || masterGain);
      oscillator.onended = () => {
        forgetNode(collection, oscillator);
        gain.disconnect();
      };

      if (collection === activeSeNodes) {
        limitCollection(collection, maxActiveSeTones);
      }

      collection.add(oscillator);
      oscillator.start(startTime);
      oscillator.stop(endTime);
    }

    function schedulePattern(pattern, startDelaySeconds, collection) {
      const audioContext = ensureContext();
      if (!audioContext || !pattern) {
        return 0;
      }

      const beatSeconds = (pattern.beatMs || 160) / 1000;
      let cursor = audioContext.currentTime + startDelaySeconds;

      pattern.notes.forEach((note) => {
        const durationSeconds = beatSeconds * (note.beats || 1);
        playTone(note, cursor, durationSeconds, pattern.wave, collection);
        cursor += durationSeconds;
      });

      return cursor - (audioContext.currentTime + startDelaySeconds);
    }

    function stopBgmPlayback() {
      bgmLoopToken += 1;
      currentBgmId = "";
      if (bgmTimeoutId) {
        window.clearTimeout(bgmTimeoutId);
        bgmTimeoutId = null;
      }
      stopCollection(activeBgmNodes);
      
      bgmAudioElements.forEach((el) => {
        try {
          el.pause();
          el.currentTime = 0;
          el.muted = false;
        } catch (error) {}
      });
      activeBgmElement = null;
    }

    function getBgmAudioElement(id, pattern) {
      let element = bgmAudioElements.get(id);
      if (!element) {
        element = new Audio(pattern.src);
        element.preload = "auto";
        element.playsInline = true;
        element.setAttribute("playsinline", "");
        bgmAudioElements.set(id, element);
      }

      element.loop = pattern.loop !== false;
      element.volume = getPatternVolume(pattern);
      return element;
    }

    async function playFileBgm(id, pattern) {
      const element = getBgmAudioElement(id, pattern);
      activeBgmElement = element;
      currentBgmId = id;
      element.muted = false;
      element.volume = getPatternVolume(pattern);

      try {
        await element.play();
        bgmRetryBlockedUntil = 0;
        if (desiredBgmId !== id) {
          element.pause();
          element.currentTime = 0;
          if (activeBgmElement === element) activeBgmElement = null;
          return false;
        }
        return true;
      } catch (error) {
        if (desiredBgmId === id) {
          currentBgmId = "";
          activeBgmElement = null;
          bgmRetryBlockedUntil = performance.now() + 1000;
        }
        return false;
      }
    }

    async function startBgmPlayback(id) {
      const pattern = bgmPatterns[id];
      if (!pattern) {
        currentBgmId = "";
        return false;
      }

      if (pattern.src) {
        return playFileBgm(id, pattern);
      }

      if (!ensureContext()) {
        currentBgmId = "";
        return false;
      }

      currentBgmId = id;
      if (bgmGain) {
        bgmGain.gain.value = getSynthBgmGain(pattern);
      }
      scheduleBgmLoop(id, bgmLoopToken);
      return true;
    }

    function scheduleBgmLoop(id, token) {
      if (!unlocked || token !== bgmLoopToken || desiredBgmId !== id) {
        return;
      }

      const pattern = bgmPatterns[id];
      if (!pattern) {
        currentBgmId = "";
        return;
      }

      currentBgmId = id;
      const durationSeconds = schedulePattern(pattern, 0.03, activeBgmNodes);
      bgmTimeoutId = window.setTimeout(() => {
        scheduleBgmLoop(id, token);
      }, Math.max(120, Math.round(durationSeconds * 1000) - 30));
    }

    async function recoverAudioPlayback() {
      if (!unlocked) {
        return unlock();
      }

      if (recoverPromise) {
        return recoverPromise;
      }

      recoverPromise = (async () => {
        bgmRetryBlockedUntil = 0;
        const contextReady = await resumeContext();
        if (contextReady) {
          unlocked = true;
        }

        if (!contextReady && context) {
          return false;
        }

        if (desiredBgmId && isDesiredBgmInterrupted()) {
          currentBgmId = "";
          transitionBgm(desiredBgmId, 0);
        } else if (desiredBgmId) {
          const pattern = bgmPatterns[desiredBgmId];
          if (pattern) {
            if (activeBgmElement) {
              activeBgmElement.volume = getPatternVolume(pattern);
            }
            if (bgmGain) {
              bgmGain.gain.value = getSynthBgmGain(pattern);
            }
          }
        }

        return true;
      })();

      try {
        return await recoverPromise;
      } finally {
        recoverPromise = null;
      }
    }

    async function unlock() {
      if (unlockPromise) {
        return unlockPromise;
      }

      unlockPromise = (async () => {
        // iOS/Chromeの自動再生制限対策。ユーザー操作中にHTMLAudioElementのplayも開始しておく。
        const resumePromise = resumeContext();
        unlocked = true;
        bgmRetryBlockedUntil = 0;
        if (desiredBgmId && desiredBgmId !== currentBgmId) {
          playBgm(desiredBgmId);
        }

        const contextReady = await resumePromise;
        if (!contextReady) {
          unlocked = false;
          return false;
        }

        if (desiredBgmId && desiredBgmId !== currentBgmId) {
          playBgm(desiredBgmId);
        }
        return true;
      })();

      try {
        return await unlockPromise;
      } finally {
        unlockPromise = null;
      }
    }

    function bindUserGesture(target) {
      const root = target || window;
      const handler = () => {
        if (!unlocked) {
          unlock();
          return;
        }
        if (hasRecoverableAudioIssue()) {
          recoverAudioPlayback();
        }
      };

      root.addEventListener("pointerdown", handler, { passive: true });
      root.addEventListener("pointerup", handler, { passive: true });
      root.addEventListener("click", handler);
      root.addEventListener("keydown", handler);
      root.addEventListener("touchstart", handler, { passive: true });
      root.addEventListener("touchend", handler, { passive: true });

      if (!lifecycleRecoveryBound) {
        lifecycleRecoveryBound = true;
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            stopCollection(activeSeNodes);
            return;
          }
          recoverAudioPlayback();
        });
        window.addEventListener("pageshow", () => {
          recoverAudioPlayback();
        });
        window.addEventListener("focus", () => {
          if (hasRecoverableAudioIssue()) {
            recoverAudioPlayback();
          }
        });
      }
    }

    function playBgm(id) {
      // desiredBgmIdは未unlock時にも記録する。起動直後にplayBgm("field")しても、初回操作後に再開できる。
      const nextBgmId = id || "";
      if (desiredBgmId === nextBgmId && fadeIntervalId) {
        return;
      }
      desiredBgmId = nextBgmId;
      if (!desiredBgmId) {
        transitionBgm("", 200);
        return;
      }

      if (!unlocked) {
        return;
      }

      if (isBgmRetryBlocked() && currentBgmId !== desiredBgmId) {
        return;
      }

      if (currentBgmId === desiredBgmId) {
        if (isDesiredBgmInterrupted()) {
          recoverAudioPlayback();
        }
        return;
      }

      // 現在何も再生されていない場合はフェードアウト処理を挟まず遅延なく再生する
      if (!currentBgmId) {
        transitionBgm(desiredBgmId, 0);
        return;
      }

      transitionBgm(desiredBgmId, 200);
    }

    function playSe(id) {
      const pattern = sePatterns[id];
      const audioContext = ensureContext();
      if (!pattern || !audioContext || !unlocked) {
        return;
      }

      if (audioContext.state !== "running") {
        recoverAudioPlayback().then((success) => {
          if (success) {
            playSe(id);
          }
        });
        return;
      }

      recordSe(id);
      let cursor = audioContext.currentTime + 0.01;
      pattern.forEach((note) => {
        const durationSeconds = (note.ms || 70) / 1000;
        playTone(note, cursor, durationSeconds, note.wave || "square", activeSeNodes);
        cursor += durationSeconds * 0.85;
      });
    }

    function getDebugState() {
      return {
        unlocked,
        contextState: context ? context.state : "",
        desiredBgmId,
        currentBgmId,
        bgmRetryBlocked: isBgmRetryBlocked(),
        activeBgmElementPaused: activeBgmElement ? activeBgmElement.paused : null,
        activeBgmElementVolume: activeBgmElement ? activeBgmElement.volume : null,
        bgmGainValue: bgmGain ? bgmGain.gain.value : null,
        activeSeToneCount: activeSeNodes.size,
        seVolumeMultiplier,
        maxActiveSeTones,
        recentSeIds: playedSeHistory.map((entry) => entry.id),
      };
    }

    function clearDebugHistory() {
      playedSeHistory.length = 0;
    }

    return {
      bindUserGesture,
      unlock,
      playBgm,
      playSe,
      getDebugState,
      clearDebugHistory,
    };
  }

  App.core.createAudioManager = createAudioManager;
})();

/* --- scripts/core/modal.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// 共有モーダルの描画とボタンハンドラを管理する。モーダルの可視状態はstoreへ保存し、onSelect関数はMapで一時保持する。
// 保存復元ではモーダルを持ち越さないため、永続化したい情報はmodalではなくprogress/inventory等へ入れる。
(() => {
  const App = window.MonsterPrototype;

  function buildMonsterPreviewSection(species, caption, options) {
    // メニューと捕獲記録で共通利用するプレビュー定義。画像アセット優先、なければpixel-art canvasへフォールバック。
    if (!species) {
      return [];
    }
    const settings = options || {};
    const spriteKey = settings.view === "back" ? "battleBack" : "battleFront";
    const preview = {
      kind: "monsterPreview",
      caption: caption || "",
      name: settings.name || species.name,
      badges: settings.badges || species.types || [],
      note: settings.note || "",
      variant: settings.variant || "",
      placement: settings.placement || "beforeLines",
      backgroundColor: species.palette && species.palette.secondary,
    };
    if (Number.isFinite(settings.level)) {
      preview.level = settings.level;
    }
    if (Number.isFinite(settings.imageMaxHeight) && settings.imageMaxHeight > 0) {
      preview.imageMaxHeight = settings.imageMaxHeight;
    }

    if (species.imageSprites && species.imageSprites[spriteKey]) {
      preview.imageSrc = species.imageSprites[spriteKey];
      return [preview];
    }

    if (!species.spriteIds || !species.spriteIds[spriteKey]) {
      return [];
    }

    preview.spriteId = species.spriteIds[spriteKey];
    preview.scaleMultiplier = settings.scaleMultiplier;
    return [preview];
  }

  function createModalController(elements, store, audio) {
    const root = elements.root;
    const title = elements.title;
    const body = elements.body;
    const actionsRoot = elements.actionsRoot || elements.confirm.parentElement;
    const actionHandlers = new Map();
    const battlePixelArt = (App.data.pixelArt && App.data.pixelArt.battle) || {};
    let lastRenderKey = "";

    function createSpriteCanvas(spriteId, scaleMultiplier) {
      const sprite = battlePixelArt[spriteId];
      if (!sprite || !sprite.rows || sprite.rows.length === 0) {
        return null;
      }

      const scale = (sprite.scale || 1) * (scaleMultiplier || 3);
      const canvas = document.createElement("canvas");
      canvas.width = sprite.rows[0].length * scale;
      canvas.height = sprite.rows.length * scale;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      sprite.rows.forEach((row, rowIndex) => {
        row.split("").forEach((key, columnIndex) => {
          if (key === ".") {
            return;
          }

          ctx.fillStyle = sprite.palette[key];
          ctx.fillRect(columnIndex * scale, rowIndex * scale, scale, scale);
        });
      });

      return canvas;
    }

    function renderSection(section) {
      if (!section || !section.kind) {
        return null;
      }

      if (section.kind === "saveMeta") {
        const meta = document.createElement("div");
        meta.className = "modal-section modal-save-meta";
        meta.textContent = section.text || "";
        return meta;
      }

      if (section.kind === "ruleBox") {
        const wrapper = document.createElement("div");
        wrapper.className = "modal-section";

        const box = document.createElement("div");
        box.className = "modal-rule-box";
        const list = document.createElement("ul");
        list.className = "modal-rule-list";
        (section.items || []).forEach((item) => {
          const entry = document.createElement("li");
          entry.textContent = item;
          list.appendChild(entry);
        });
        box.appendChild(list);
        wrapper.appendChild(box);

        if (section.footer) {
          const footer = document.createElement("p");
          footer.className = "modal-rule-footer";
          footer.textContent = section.footer;
          wrapper.appendChild(footer);
        }

        return wrapper;
      }

      if (section.kind === "monsterPreview") {
        const wrapper = document.createElement("div");
        wrapper.className = "modal-section modal-monster-preview";

        const frame = document.createElement("div");
        frame.className = [
          "modal-monster-frame",
          section.variant ? `is-${section.variant}` : "",
        ].filter(Boolean).join(" ");
        if (section.backgroundColor) {
          frame.style.setProperty("--monster-accent", section.backgroundColor);
        }
        if (section.imageSrc) {
          const image = document.createElement("img");
          image.src = section.imageSrc;
          image.alt = section.name || section.caption || "モンスター画像";
          if (Number.isFinite(section.imageMaxHeight) && section.imageMaxHeight > 0) {
            image.style.maxHeight = `${section.imageMaxHeight}px`;
          }
          frame.appendChild(image);
        } else {
          const canvas = createSpriteCanvas(section.spriteId, section.scaleMultiplier);
          if (canvas) {
            frame.appendChild(canvas);
          }
        }
        wrapper.appendChild(frame);

        if (section.name) {
          const name = document.createElement("div");
          name.className = "modal-monster-title";
          name.textContent = Number.isFinite(section.level)
            ? `${section.name} Lv${section.level}`
            : section.name;
          wrapper.appendChild(name);
        }

        if (section.badges && section.badges.length > 0) {
          const badges = document.createElement("div");
          badges.className = "modal-monster-badges";
          section.badges.forEach((badgeText) => {
            const badge = document.createElement("span");
            badge.className = "modal-monster-badge";
            badge.textContent = badgeText;
            badges.appendChild(badge);
          });
          wrapper.appendChild(badges);
        }

        if (section.note) {
          const note = document.createElement("div");
          note.className = "modal-monster-note";
          note.textContent = section.note;
          wrapper.appendChild(note);
        }

        if (section.caption) {
          const caption = document.createElement("div");
          caption.className = "modal-monster-caption";
          caption.textContent = section.caption;
          wrapper.appendChild(caption);
        }

        return wrapper;
      }

      return null;
    }

    function getActions(modal) {
      if (modal.actions && modal.actions.length > 0) {
        return modal.actions;
      }

      return [
        {
          id: "close",
          label: modal.buttonLabel || "閉じる",
          variant: "",
        },
      ];
    }

    function render() {
      // renderKeyでDOM再構築を抑制している。actionsの構造を変える時は、キーに必要な情報が入るか確認する。
      const state = store.getState();
      const modal = state.modal;
      const isOpen = Boolean(modal && modal.open);
      const renderKey = JSON.stringify({
        open: isOpen,
        title: isOpen ? modal.title : "",
        lines: isOpen ? modal.lines : [],
        sections: isOpen ? modal.sections : [],
        buttonLabel: isOpen ? modal.buttonLabel : "",
        actions: isOpen ? getActions(modal) : [],
        dismissible: isOpen ? modal.dismissible : true,
      });

      root.classList.toggle("is-hidden", !isOpen);
      root.setAttribute("aria-hidden", String(!isOpen));

      if (renderKey === lastRenderKey) {
        return;
      }
      lastRenderKey = renderKey;

      if (!isOpen) {
        title.textContent = "";
        body.innerHTML = "";
        actionsRoot.innerHTML = "";
        actionsRoot.classList.remove("is-multiple");
        return;
      }

      title.textContent = modal.title;
      title.classList.toggle("is-hidden", !modal.title);
      body.innerHTML = "";
      actionsRoot.innerHTML = "";
      actionsRoot.classList.toggle("is-multiple", getActions(modal).length > 1);

      const sections = modal.sections || [];
      sections.filter((section) => section.placement === "beforeLines").forEach((section) => {
        const element = renderSection(section);
        if (element) {
          body.appendChild(element);
        }
      });

      modal.lines.forEach((line) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = line;
        body.appendChild(paragraph);
      });

      sections.filter((section) => section.placement !== "beforeLines").forEach((section) => {
        const element = renderSection(section);
        if (element) {
          body.appendChild(element);
        }
      });

      getActions(modal).forEach((action) => {
        const button = document.createElement("button");
        let handledByPointer = false;
        button.type = "button";
        button.className = `modal-button ${action.variant || ""}`.trim();
        button.textContent = action.label;
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.classList.add("is-active");
          if (button.setPointerCapture && event.pointerId !== undefined) {
            button.setPointerCapture(event.pointerId);
          }
        });
        button.addEventListener("pointerup", (event) => {
          event.preventDefault();
          button.classList.remove("is-active");
          handledByPointer = true;
          selectAction(action.id);
        });
        button.addEventListener("pointerleave", () => {
          button.classList.remove("is-active");
        });
        button.addEventListener("pointercancel", () => {
          button.classList.remove("is-active");
        });
        button.addEventListener("click", (event) => {
          if (handledByPointer) {
            handledByPointer = false;
            event.preventDefault();
            return;
          }
          selectAction(action.id);
        });
        actionsRoot.appendChild(button);
      });
    }

    function openModal(payload) {
      // state.modalへはシリアライズ可能な表示情報だけを入れる。実処理はactionHandlersへ逃がす設計。
      actionHandlers.clear();
      const actions = (payload.actions || []).map((action, index) => {
        const id = action.id || `action_${index}`;
        if (typeof action.onSelect === "function") {
          actionHandlers.set(id, action.onSelect);
        }
        return {
          id,
          label: action.label,
          variant: action.variant || "",
        };
      });

      store.update((state) => {
        state.modal = {
          open: true,
          title: payload.title,
          lines: (payload.lines || []).slice(),
          sections: (payload.sections || []).map((section) => ({ ...section })),
          buttonLabel: payload.buttonLabel || "閉じる",
          actions,
          dismissible: payload.dismissible !== false,
        };
      });
    }

    function closeModal(options) {
      // dismissible:falseは開始説明や保存選択のように、明示ボタン以外で閉じてはいけない画面に使う。
      if (!store.getState().modal.open) {
        return;
      }

      const shouldForce = options && options.force;
      if (!shouldForce && store.getState().modal.dismissible === false) {
        return;
      }

      actionHandlers.clear();
      store.update((state) => {
        state.modal = {
          open: false,
          title: "",
          lines: [],
          sections: [],
          buttonLabel: "閉じる",
          actions: [],
          dismissible: true,
        };
      });
      if (audio && !(options && options.silent)) {
        audio.playSe("cancel");
      }
    }

    function selectAction(actionId) {
      const modal = store.getState().modal;
      if (!modal.open) {
        return;
      }

      const handler = actionHandlers.get(actionId);
      if (handler) {
        handler();
        return;
      }

      closeModal();
    }

    function confirmPrimary() {
      const modal = store.getState().modal;
      if (!modal.open) {
        return;
      }

      selectAction(getActions(modal)[0].id);
    }

    function cancelModal() {
      closeModal();
    }

    root.addEventListener("click", (event) => {
      if (event.target === root || event.target.classList.contains("modal-backdrop")) {
        closeModal();
      }
    });

    return {
      render,
      openModal,
      closeModal,
      confirmPrimary,
      cancelModal,
      isOpen() {
        return store.getState().modal.open;
      },
    };
  }

  App.core.buildMonsterPreviewSection = buildMonsterPreviewSection;
  App.core.createModalController = createModalController;
})();

</script>

/* --- scripts/core/screen-renderer.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// canvas内のフィールド/戦闘背景/モンスター/遷移だけを描く。HPカードや操作ボタンはui.jsのDOM描画が担当する。
// 内部解像度はconfig.screenの160x144前提で、CSS側の拡大比率と分離している。
(() => {
  const App = window.MonsterPrototype;

  function createScreenRenderer(canvas, messageElement, captionElement, dataRegistry) {
    const ctx = canvas.getContext("2d");
    const { screen, palette, fieldTiles, animation } = App.config.game;
    const renderScale = Math.max(1, Math.floor(screen.renderScale || 1));
    const maxRenderScale = 9;
    const damageAnimation = animation.damage;
    const attackAnimation = animation.attack || {};
    const ballAnimation = animation.ball || {};
    const fieldPixelArt = App.data.pixelArt.field;
    const battlePixelArt = App.data.pixelArt.battle || {};
    const battleImageCache = new Map();
    const directionVectors = {
      up: { x: 0, y: -1 },
      right: { x: 1, y: 0 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
    };
    let backingWidth = 0;
    let backingHeight = 0;

    function syncCanvasResolution() {
      const pixelRatio = Math.max(1, window.devicePixelRatio || 1);
      const cssWidth = canvas.clientWidth || screen.width;
      const cssHeight = canvas.clientHeight || screen.height;
      const targetWidth = Math.ceil(
        Math.min(screen.width * maxRenderScale, Math.max(screen.width * renderScale, cssWidth * pixelRatio))
      );
      const targetHeight = Math.ceil(
        Math.min(screen.height * maxRenderScale, Math.max(screen.height * renderScale, cssHeight * pixelRatio))
      );

      if (targetWidth !== backingWidth || targetHeight !== backingHeight) {
        backingWidth = targetWidth;
        backingHeight = targetHeight;
        canvas.width = backingWidth;
        canvas.height = backingHeight;
      }

      ctx.setTransform(backingWidth / screen.width, 0, 0, backingHeight / screen.height, 0, 0);
      ctx.imageSmoothingEnabled = false;
    }

    function clear(color) {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, screen.width, screen.height);
    }

    function drawPatternSprite(sprite, x, y) {
      const baseX = Math.round(x);
      const baseY = Math.round(y);
      const scale = sprite.scale || 1;

      sprite.rows.forEach((row, rowIndex) => {
        row.split("").forEach((key, columnIndex) => {
          if (key === ".") {
            return;
          }
          ctx.fillStyle = sprite.palette[key];
          ctx.fillRect(baseX + columnIndex * scale, baseY + rowIndex * scale, scale, scale);
        });
      });
    }

    function drawCenteredPatternSprite(sprite, centerX, centerY) {
      const scale = sprite.scale || 1;
      const width = sprite.rows[0].length * scale;
      const height = sprite.rows.length * scale;
      drawPatternSprite(sprite, centerX - width / 2, centerY - height / 2);
    }

    function getPatternSpriteSize(sprite) {
      const scale = sprite.scale || 1;
      return {
        width: sprite.rows[0].length * scale,
        height: sprite.rows.length * scale,
      };
    }

    function drawFieldSpriteShadow(sprite, x, y, kind) {
      const size = getPatternSpriteSize(sprite);
      const centerX = Math.round(x + size.width / 2);
      const baseY = Math.round(y + size.height - 1);
      const shadow = {
        npc: { radiusX: 3.8, radiusY: 1.35, alpha: 0.2 },
        pickup: { radiusX: 3.1, radiusY: 1.05, alpha: 0.17 },
        player: { radiusX: 4.2, radiusY: 1.5, alpha: 0.22 },
        sign: { radiusX: 3.7, radiusY: 1.2, alpha: 0.18 },
      }[kind] || { radiusX: 4.1, radiusY: 1.45, alpha: 0.2 };

      ctx.save();
      ctx.globalAlpha = shadow.alpha;
      ctx.fillStyle = palette.deepest;
      ctx.beginPath();
      ctx.ellipse(centerX, baseY, shadow.radiusX, shadow.radiusY, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resolveImageDrawSize(size, image) {
      const naturalRatio = image.naturalWidth / image.naturalHeight;
      const width = size.width || (size.height ? size.height * naturalRatio : image.naturalWidth);
      const height = size.height || (size.width ? size.width / naturalRatio : image.naturalHeight);
      return { width, height };
    }

    function getTileVariant(tileX, tileY, salt = 0) {
      return Math.abs(((tileX || 0) * 37 + (tileY || 0) * 53 + salt * 19) % 11);
    }

    function isWarpLockedForRender(state, event) {
      if (!event.unlockCondition) {
        return false;
      }

      if (event.unlockCondition === "prep_complete") {
        return !(state.progress && state.progress.prepGateUnlocked);
      }

      return !(state.progress && state.progress[event.unlockCondition]);
    }

    function drawTileAt(left, top, tileCode, tileX, tileY) {
      const tile = fieldTiles[tileCode] || fieldTiles["."];
      const variant = getTileVariant(tileX, tileY);

      ctx.fillStyle = tile.color;
      ctx.fillRect(left, top, screen.tileSize, screen.tileSize);

      if (tileCode === ".") {
        ctx.fillStyle = "#d6cca0";
        ctx.fillRect(left + 1 + (variant % 2), top + 2, 1, 1);
        ctx.fillRect(left + 5, top + 4 + (variant % 3 === 0 ? 1 : 0), 1, 1);
        ctx.fillStyle = "#b8ad7e";
        ctx.fillRect(left + 2 + (variant % 4), top + 7, 2, 1);
        if (variant % 3 === 0) {
          ctx.fillStyle = "#e0d5a4";
          ctx.fillRect(left + 6, top + 1, 1, 1);
        }
      } else if (["1", "2", "3", "4", "c"].includes(tileCode)) {
        ctx.fillStyle = "rgba(248, 244, 215, 0.16)";
        ctx.fillRect(left, top, screen.tileSize, 1);
        ctx.fillRect(left, top, 1, screen.tileSize);
        ctx.fillStyle = "rgba(40, 42, 34, 0.14)";
        ctx.fillRect(left, top + 7, screen.tileSize, 1);
        ctx.fillStyle = "rgba(248, 244, 215, 0.12)";
        if ((tileX + tileY) % 2 === 0) {
          ctx.fillRect(left + 3, top + 3, 2, 1);
        } else {
          ctx.fillRect(left + 5, top + 5, 1, 1);
        }
      } else if (tileCode === "#") {
        ctx.fillStyle = "#617050";
        ctx.fillRect(left + 1, top + 1, 2, 2);
        ctx.fillRect(left + 5, top + 2 + (variant % 2), 2, 2);
        ctx.fillStyle = "#4f6043";
        ctx.fillRect(left, top + 3, screen.tileSize, 2);
        ctx.fillStyle = palette.deepest;
        ctx.fillRect(left, top, screen.tileSize, 1);
        ctx.fillRect(left, top + 6, screen.tileSize, 2);
        ctx.fillStyle = "#2b3429";
        ctx.fillRect(left + 2 + (variant % 3), top + 4, 1, 3);
        ctx.fillRect(left + 6, top + 5, 1, 2);
      } else if (tileCode === "~") {
        const waveShift = variant % 3;
        ctx.fillStyle = "#d8e7dd";
        ctx.fillRect(left + waveShift, top + 1, 4, 1);
        ctx.fillRect(left + 1, top + 4, 3, 1);
        ctx.fillStyle = "#8ab3b8";
        ctx.fillRect(left + 2, top + 2, 4, 1);
        ctx.fillRect(left + (variant % 2), top + 5, 3, 1);
        ctx.fillStyle = "#4d7278";
        ctx.fillRect(left, top + 6, screen.tileSize, 1);
        ctx.fillStyle = "rgba(248, 244, 215, 0.16)";
        ctx.fillRect(left + 6, top + 3, 1, 1);
      } else if (tileCode === "=") {
        ctx.fillStyle = "#dfc273";
        ctx.fillRect(left, top + 1, screen.tileSize, 1);
        ctx.fillRect(left + 1 + (variant % 2), top + 3, 4, 1);
        ctx.fillStyle = "#b8954a";
        ctx.fillRect(left, top + 6, screen.tileSize, 1);
        ctx.fillRect(left + 5, top + 4 + (variant % 2), 1, 1);
        ctx.fillStyle = "rgba(80, 62, 31, 0.14)";
        ctx.fillRect(left, top + 7, screen.tileSize, 1);
      } else if (tileCode === "g") {
        ctx.fillStyle = "#536b3b";
        ctx.fillRect(left, top + 2, screen.tileSize, 5);
        ctx.fillStyle = "#d6c478";
        ctx.fillRect(left + 1, top + 1, 1, 1);
        ctx.fillRect(left + 4 + (variant % 2), top + 1, 1, 1);
        ctx.fillRect(left + 6, top + 3, 1, 1);
        ctx.fillStyle = "#a7aa64";
        ctx.fillRect(left + 2, top + 2, 1, 1);
        ctx.fillRect(left + 6, top + 5, 1, 1);
        ctx.fillStyle = "#788b52";
        ctx.fillRect(left + 1, top + 4, 1, 3);
        ctx.fillRect(left + 3, top + 3, 1, 4);
        ctx.fillRect(left + 5, top + 4, 1, 3);
        ctx.fillStyle = "#3f5430";
        ctx.fillRect(left + (variant % 4), top + 6, 1, 2);
      }
    }

    function drawGrassOverlayAt(left, top, tileX, tileY) {
      const variant = getTileVariant(tileX, tileY, 2);
      ctx.fillStyle = "#40572f";
      ctx.fillRect(left, top + 4, screen.tileSize, 4);
      ctx.fillStyle = "#d1ba65";
      ctx.fillRect(left + 1, top + 4, 1, 1);
      ctx.fillRect(left + 3 + (variant % 2), top + 5, 1, 1);
      ctx.fillRect(left + 5, top + 4, 1, 1);
      ctx.fillRect(left + 6, top + 6, 1, 1);
      ctx.fillStyle = "#2f4529";
      ctx.fillRect(left + 2, top + 6, 1, 2);
      ctx.fillRect(left + 5, top + 5, 1, 3);
    }

    function drawFieldWarpMarker(state, event, camera) {
      if (event.kind !== "warp" || event.trigger !== "step") {
        return;
      }

      const left = event.x * screen.tileSize - camera.offsetX;
      const top = event.y * screen.tileSize - camera.offsetY;
      if (!isVisible(left, top)) {
        return;

      const locked = isWarpLockedForRender(state, event);
      ctx.save();
      ctx.globalAlpha = locked ? 0.82 : 0.58;
      ctx.fillStyle = locked ? "#4a2f2a" : palette.captureYellow || "#d8b546";
      ctx.fillRect(left + 1, top + 6, 6, 1);
      ctx.fillStyle = locked ? palette.warning || "#9a2e24" : palette.white;
      ctx.fillRect(left + 2, top + 5, 4, 1);
      if (locked) {
        ctx.fillRect(left + 3, top + 2, 1, 3);
        ctx.fillRect(left + 5, top + 2, 1, 3);
      } else {
        ctx.fillRect(left + 3, top + 3, 2, 1);
      }
      ctx.restore();
    }

    function drawFieldEventHint(event, x, y, sprite) {
      if (!sprite) {
        return;
      }

      const size = getPatternSpriteSize(sprite);
      const centerX = Math.round(x + size.width / 2);
      const centerY = Math.round(y + size.height / 2);

      ctx.save();
      if (event.kind === "pickup") {
        const isHeal = event.itemType === "full_heal";

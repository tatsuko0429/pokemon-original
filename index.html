<!DOCTYPE html>
<!--
  2026年4月27日時点の開発者向け保守メモ:
  このHTMLはアプリの静的な骨格だけを持ち、画面内容・ボタン・モーダル本文はJavaScriptが差し替える。
  id属性とscriptの読み込み順は実行時の契約なので、DOM名や順番を変える場合は起動、保存再開、フィールド、戦闘、モーダルをまとめて確認する。
-->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>初代風モンスター</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/app-icon-32.png"
    />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/app-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="theme-color" content="#111316" />
    <style>
/*
  2026年4月27日時点の開発者向け保守メモ:
  このCSSはゲーム機風の単一画面UIを、ページスクロールなしでスマホ縦長画面へ収めるためのレイアウト契約を持つ。
  JavaScript側はbodyのis-battle-scene、各id/classの表示切替、モーダルのis-hiddenに依存している。
  印刷用CSSは現時点では存在しない。追加する場合も、canvas比率・固定vh・モーダルz-indexの検証を先に行う。
*/
:root {
  color-scheme: light;
  --bg-top: #d9d9d4;
  --bg-bottom: #7b7f87;
  --shell-top: #f1f2ed;
  --shell-mid: #c7cbc6;
  --shell-bottom: #8e958f;
  --bezel: #070809;
  --bezel-soft: #17191c;
  --screen-glow: #d8e1b9;
  --panel: rgba(239, 241, 229, 0.9);
  --panel-strong: #d7d9c6;
  --line: #1b1d20;
  --text: #17191a;
  --muted: #4e5558;
  --button-dark: #232529;
  --button-dark-edge: #0c0d0f;
  --button-face: #3a3d45;
  --button-face-hi: #5b5e67;
  --button-shadow: rgba(5, 7, 9, 0.4);
  --accent-red: #9b3638;
  --screen-ratio: calc(160 / 166);
  --battle-screen-ratio: calc(160 / 176);
  --safe-padding: max(6px, env(safe-area-inset-left));
  --safe-padding-right: max(6px, env(safe-area-inset-right));
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
  -webkit-touch-callout: none;
  user-select: none;
  background:
    radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.8), transparent 34%),
    radial-gradient(circle at 80% 100%, rgba(24, 29, 40, 0.28), transparent 34%),
    linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
  color: var(--text);
  font-family:
    "BIZ UDPGothic",
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
}

body {
  height: 100svh;
  height: 100dvh;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding:
    max(6px, env(safe-area-inset-top))
    var(--safe-padding-right)
    max(6px, env(safe-area-inset-bottom))
    var(--safe-padding);
  touch-action: manipulation;
}

input,
textarea,
select,
[contenteditable="true"] {
  user-select: text;
  -webkit-user-select: text;
  -webkit-touch-callout: default;
}

button,
input,
textarea,
select {
  font: inherit;
}

.app-shell {
  /*
    本体は常に1画面内へ収める前提。height:100% と max-height の組み合わせは
    tests/smoke_test.py のスマホ表示・縦スクロール禁止チェックと結びついている。
  */
  position: relative;
  width: min(100%, 430px);
  height: 100%;
  max-height: 780px;
  min-height: 0;
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr);
  gap: clamp(5px, 1svh, 8px);
  padding: clamp(9px, 2.2vw, 14px);
  border: 3px solid rgba(22, 24, 25, 0.9);
  border-radius: 34px 34px 46px 46px;
  background:
    linear-gradient(140deg, rgba(255, 255, 255, 0.58), transparent 28%),
    linear-gradient(180deg, var(--shell-top), var(--shell-mid) 46%, var(--shell-bottom));
  box-shadow:
    inset 0 2px 0 rgba(255, 255, 255, 0.68),
    inset 0 -14px 28px rgba(42, 48, 51, 0.28),
    0 24px 54px rgba(12, 15, 18, 0.34);
}

.app-shell::before,
.app-shell::after {
  content: "";
  position: absolute;
  pointer-events: none;
}

.app-shell::before {
  inset: 8px;
  border-radius: 28px 28px 40px 40px;
  border: 1px solid rgba(255, 255, 255, 0.42);
}

.app-shell::after {
  display: none;
}

.screen-card,
.status-card,
.action-card {
  position: relative;
  z-index: 1;
}

.screen-card {
  padding: clamp(6px, 1.7vw, 10px);
  border: 4px solid #070809;
  border-radius: 24px 24px 20px 20px;
  background:
    linear-gradient(140deg, rgba(255, 255, 255, 0.12), transparent 34%),
    linear-gradient(180deg, #16181b, #040506);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.18),
    0 7px 14px rgba(8, 10, 11, 0.24);
}

.screen-card::before {
  content: "POWER";
  position: absolute;
  left: 18px;
  top: 12px;
  color: rgba(235, 240, 231, 0.38);
  font-size: 0.55rem;
  font-weight: 900;
  letter-spacing: 0.15em;
}

.screen-card::after {
  content: "";
  position: absolute;
  left: 15px;
  top: 31px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #8e2025;
  box-shadow: 0 0 10px rgba(220, 53, 65, 0.72);
}

.screen-wrap {
  /*
    通常時は160x166相当、戦闘時は下部操作領域との重なりを避けるため別比率にする。
    #game-screen自体のwidth/height属性は160x144のままなので、ここは見た目だけの拡大枠。
  */
  position: relative;
  width: 100%;
  aspect-ratio: var(--screen-ratio);
  overflow: hidden;
  border: 3px solid #020303;
  border-radius: 10px;
  background: var(--screen-glow);
  box-shadow:
    inset 0 0 0 2px rgba(255, 255, 255, 0.1),
    inset 0 0 24px rgba(38, 45, 29, 0.2);
}

.is-battle-scene .screen-wrap {
  aspect-ratio: var(--battle-screen-ratio);
}

.is-battle-scene .screen-card {
  padding-block: 5px;
}

#game-screen {
  width: 100%;
  height: 100%;
  display: block;
  position: relative;
  z-index: 1;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: #ded7bf;
}

.is-battle-scene #game-screen {
  image-rendering: auto;
}

.battle-overlay {
  /*
    戦闘HPカードはcanvasではなくDOMで重ねる。screen-renderer.jsのモンスター座標と
    ui.jsのカード位置の両方に依存するため、片方だけ動かすとHP表示が相手/味方画像に重なる。
  */
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.battle-overlay.is-hidden {
  display: none;
}

.battle-card {
  position: absolute;
  min-width: 36%;
  padding: 5px 6px 6px;
  border: 3px solid var(--line);
  border-radius: 10px;
  background: rgba(245, 248, 233, 0.94);
  box-shadow: 0 4px 0 rgba(22, 32, 15, 0.14);
}

.battle-card.is-enemy {
  top: 12%;
  right: 6px;
  width: 42%;
}

.battle-card.is-player {
  left: 6px;
  bottom: 10%;
  width: 44%;
}

.battle-card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 4px;
}

.battle-name {
  min-width: 0;
  font-size: clamp(0.7rem, 2.6vw, 0.82rem);
  font-weight: 900;
  line-height: 1.2;
}

.battle-type-row {
  margin-bottom: 4px;
}

.battle-type {
  font-size: clamp(0.5rem, 1.9vw, 0.6rem);
  font-weight: 700;
  color: var(--muted);
}

.battle-level {
  flex-shrink: 0;
  font-size: clamp(0.55rem, 2.1vw, 0.64rem);
  font-weight: 900;
  color: var(--muted);
}

.battle-hp-row {
  display: grid;
  gap: 3px;
}

.battle-hp-label {
  font-size: 0.55rem;
  font-weight: 900;
  color: var(--muted);
  letter-spacing: 0.08em;
}

.battle-hp-track {
  width: 100%;
  height: 7px;
  border-radius: 999px;
  overflow: hidden;
  border: 2px solid var(--line);
  background: #c8bd8b;
}

.battle-hp-fill {
  height: 100%;
  background: linear-gradient(90deg, #16656e, #20a6b3);
}

.battle-hp-fill.is-low {
  background: linear-gradient(90deg, #8b422c, #c77253);
}

.battle-hp-value {
  font-size: clamp(0.54rem, 2.1vw, 0.62rem);
  font-weight: 900;
  color: var(--text);
  text-align: right;
}

.battle-exp-row {
  display: grid;
  gap: 2px;
  margin-top: 4px;
}

.battle-exp-track {
  width: 100%;
  height: 4px;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: #c8bd8b;
}

.battle-exp-fill {
  height: 100%;
  background: linear-gradient(90deg, #1f6f78, #2f9c85);
}

.battle-exp-fill.is-gaining {
  background: linear-gradient(90deg, #1c6f86, #2fae9a);
  box-shadow: 0 0 6px rgba(47, 174, 154, 0.36);
}

.screen-message {
  /*
    フィールドメッセージ専用。戦闘中のメッセージは操作パネル側へ出す設計なので、
    battle時にここへ文言を戻すとHPカード・canvasと衝突しやすい。
  */
  position: absolute;
  left: 6px;
  right: 6px;
  bottom: 6px;
  min-height: 30%;
  padding: 10px 12px;
  border: 3px solid var(--line);
  border-radius: 12px;
  background: rgba(244, 248, 229, 0.97);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: clamp(0.78rem, 2.8vw, 0.94rem);
  font-weight: 800;
  line-height: 1.45;
  white-space: pre-line;
  z-index: 3;
}

.screen-message.is-hidden {
  display: none;
}

.screen-message[data-kind="talk"] {
  border-color: #4f6043;
  background: rgba(242, 248, 224, 0.98);
  box-shadow: inset 0 -4px rgba(79, 96, 67, 0.12);
}

.screen-message[data-kind="info"] {
  border-color: #6d5c35;
  background: rgba(248, 244, 215, 0.98);
  box-shadow: inset 0 -4px rgba(109, 92, 53, 0.12);
}

.screen-message[data-kind="item"] {
  border-color: #8a5a24;
  background: rgba(255, 246, 213, 0.98);
  box-shadow: inset 0 -4px rgba(194, 135, 45, 0.16);
}

.screen-message[data-kind="alert"] {
  border-color: #8f3327;
  background: rgba(250, 232, 214, 0.98);
  box-shadow: inset 0 -4px rgba(154, 46, 36, 0.14);
}

.screen-message[data-kind="success"] {
  border-color: #3f6d4a;
  background: rgba(236, 247, 220, 0.98);
  box-shadow: inset 0 -4px rgba(63, 109, 74, 0.14);
}

.screen-caption {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(248, 244, 215, 0.92);
  border: 2px solid rgba(32, 34, 27, 0.85);
  font-size: 0.72rem;
  font-weight: 900;
  color: var(--muted);
  z-index: 4;
}

.screen-caption.is-battle {
  display: none;
}

.screen-timer {
  /*
    準備5分タイマーと四天王以降のタイムアタック表示を同じ部品で扱う。
    ui.jsのrenderScreenTimerがテキスト有無でis-hiddenを切り替える。
  */
  position: absolute;
  top: 6px;
  right: 6px;
  min-width: 44px;
  padding: 4px 8px;
  border: 2px solid rgba(32, 34, 27, 0.88);
  border-radius: 8px;
  background: rgba(248, 244, 215, 0.94);
  color: #1b1d17;
  font-size: 0.72rem;
  font-weight: 900;
  line-height: 1;
  text-align: center;
  z-index: 4;
  box-shadow: 0 2px 0 rgba(24, 26, 20, 0.18);
}

.screen-timer.is-hidden {
  display: none;
}

.status-card {
  /*
    フィールド専用の状態表示。戦闘中はHPカードをbattle-overlayに出すため、
    ui.jsが親要素へis-hiddenを付けて二重表示を避ける。
  */
  padding: 6px;
  border: 2px solid rgba(12, 14, 16, 0.74);
  border-radius: 16px;
  background:
    linear-gradient(180deg, rgba(30, 34, 38, 0.95), rgba(20, 23, 27, 0.95));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.1),
    inset 0 -1px 0 rgba(0, 0, 0, 0.65);
}

.status-card.is-hidden {
  display: none;
}

.status-strip {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 0.82fr) minmax(112px, 1.45fr);
  gap: 5px;
}

.status-strip.is-compact {
  grid-template-columns: 1fr;
}

.status-pill {
  min-height: 31px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px 8px;
  border: 2px solid #121417;
  border-radius: 12px;
  background:
    linear-gradient(180deg, #eef1dc, #bfc7aa);
  color: #171b18;
  font-size: clamp(0.64rem, 2.5vw, 0.78rem);
  font-weight: 900;
  line-height: 1.15;
  text-align: center;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58);
}

.status-pill.is-monster,
.status-pill.is-hp {
  white-space: nowrap;
}

.status-pill.is-monster {
  font-size: clamp(0.58rem, 2.25vw, 0.7rem);
}

.status-pill.is-objective {
  justify-content: flex-start;
  padding-inline: 8px;
  font-size: clamp(0.58rem, 2.25vw, 0.7rem);
  line-height: 1.18;
  text-align: left;
}

.action-card {
  min-height: 0;
  padding: 0;
  border: 0;
  background: transparent;
}

.action-card::before {
  display: none;
}

.action-panel {
  display: grid;
  height: 100%;
  gap: 6px;
  min-height: 0;
}

.field-controls {
  /*
    十字キーとA/B/Menuの操作面は毎renderで再生成される。
    input.jsがpointerイベントを直接付与するので、ボタン構造変更時はキーボード・タッチ両方を確認する。
  */
  display: grid;
  grid-template-areas: "dpad face";
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr;
  align-items: center;
  gap: clamp(6px, 1.8vw, 10px);
  min-height: 0;
}

.direction-pad {
  grid-area: dpad;
  justify-self: center;
  width: min(43vw, 166px);
  aspect-ratio: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 0;
  filter: drop-shadow(0 8px 8px rgba(7, 9, 11, 0.28));
  touch-action: none;
}

.direction-spacer {
  min-height: 0;
}

.direction-spacer:nth-child(5) {
  position: relative;
  border-radius: 11px;
  background:
    linear-gradient(180deg, #34373d, #101113);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.11),
    inset 0 -3px 0 rgba(0, 0, 0, 0.48);
}

.direction-spacer:nth-child(5)::after {
  content: "";
  position: absolute;
  inset: 32%;
  border-radius: 50%;
  background: rgba(238, 241, 220, 0.12);
  box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.12);
}

.action-buttons {
  grid-area: face;
  justify-self: center;
  width: min(45vw, 180px);
  display: grid;
  grid-template-areas:
    "b a"
    "menu menu";
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px 6px;
  align-items: center;
}

.battle-panel {
  /*
    戦闘メッセージとコマンドをcanvas外へ置くことで、HP表示とモンスター描画の視認性を守っている。
    行数やボタン数を増やす場合はmax-height 760pxのメディアクエリも同時に確認する。
  */
  display: grid;
  grid-template-rows: minmax(54px, 0.9fr) auto;
  gap: 6px;
  height: 100%;
  min-height: 0;
}

.battle-message-panel {
  min-height: 54px;
  padding: 8px 10px;
  border: 3px solid var(--line);
  border-radius: 16px;
  background:
    linear-gradient(180deg, rgba(247, 249, 235, 0.96), rgba(220, 226, 199, 0.96));
  color: #181d18;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: clamp(0.78rem, 3vw, 0.96rem);
  font-weight: 900;
  line-height: 1.45;
  box-shadow:
    0 4px 0 rgba(10, 12, 14, 0.22),
    inset 0 1px 0 rgba(255, 255, 255, 0.66);
}

.battle-buttons {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  align-self: end;
  min-height: 0;
}

.battle-buttons.is-single,
.battle-buttons.is-message {
  grid-template-columns: 1fr;
}

.battle-buttons.is-move-select {
  align-items: stretch;
}

.battle-buttons .control-button {
  min-height: 54px;
  padding: 8px 8px;
  border-radius: 14px;
}

.control-button.battle-command-button {
  --command-hi: #f4f2df;
  --command-lo: #c6cfb5;
  --command-edge: rgba(32, 34, 27, 0.72);
  position: relative;
  isolation: isolate;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 4px;
  overflow: hidden;
  border-color: var(--command-edge);
  background:
    radial-gradient(circle at 24% 16%, rgba(255, 255, 255, 0.36), transparent 28%),
    linear-gradient(180deg, var(--command-hi), var(--command-lo));
  font-size: clamp(0.86rem, 3.2vw, 1rem);
  line-height: 1.05;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.48);
}

.control-button.battle-command-button::before {
  content: "";
  position: absolute;
  z-index: -1;
  inset: 5px 7px auto 7px;
  height: 19px;
  border-radius: 10px;
  background:
    radial-gradient(circle at 18% 36%, rgba(255, 255, 255, 0.68), transparent 18%),
    linear-gradient(90deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.04));
  opacity: 0.82;
}

.control-button.battle-command-button::after {
  content: attr(data-command-hint);
  display: block;
  min-width: 44px;
  padding: 2px 6px;
  border: 2px solid rgba(32, 34, 27, 0.62);
  border-radius: 999px;
  background: rgba(248, 244, 215, 0.68);
  color: rgba(32, 34, 27, 0.72);
  font-size: 0.58rem;
  line-height: 1;
}

.control-button.battle-command-button:not([disabled]):hover:not(:active):not(.is-active),
.control-button.battle-command-button:not([disabled]):focus-visible:not(:active):not(.is-active) {
  transform: translateY(-1px);
  filter: saturate(1.08) brightness(1.03);
}

.control-button.battle-command-button.is-fight {
  --command-hi: #f7f1cf;
  --command-lo: #d8b546;
  --command-edge: #6a5120;
}

.control-button.battle-command-button.is-ball {
  --command-hi: #f4d7c9;
  --command-lo: #c75f45;
  --command-edge: #6f2e22;
}

.control-button.battle-command-button.is-item {
  --command-hi: #dceecb;
  --command-lo: #89b86b;
  --command-edge: #4f733c;
}

.control-button.battle-command-button.is-run {
  --command-hi: #e3e6db;
  --command-lo: #aab3a0;
  --command-edge: #5e675d;
}

.control-button.battle-command-button.is-master {
  --command-hi: #e8c9f2;
  --command-lo: #8d5af2;
  --command-edge: #4a2467;
  grid-column: 1 / -1;
  min-height: 48px;
  color: #ffffff;
  text-shadow: 0 1px 0 rgba(34, 12, 55, 0.6);
}

.control-button.battle-command-button.is-master::after {
  color: #3c174d;
}

.control-button {
  min-height: 68px;
  padding: 12px 10px;
  border: 2px solid #111316;
  border-radius: 16px;
  background:
    linear-gradient(180deg, #eef1dc, #c8d0b5);
  color: var(--text);
  font-weight: 900;
  text-align: center;
  box-shadow:

/* --- scripts/core/store.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// アプリ全体の単一状態コンテナ。各sceneはgetStateで同じオブジェクトを読み、update内で直接ミューテートする前提。
(() => {
  const App = window.MonsterPrototype;

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function createStore(initialState) {
    const state = deepClone(initialState);

    return {
      getState() {
        return state;
      },
      update(mutator) {
        mutator(state);
      },
      snapshot() {
        return deepClone(state);
      },
      replace(nextState) {
        // stateオブジェクトの参照自体は維持する。runtime.store.getState()を握っている処理を壊さないため。
        const clonedState = deepClone(nextState);
        Object.keys(state).forEach((key) => {
          delete state[key];
        });
        Object.assign(state, clonedState);
      },
      reset() {
        // 初期化も参照維持で行う。保存クリアや開始説明の直後にUI/sceneが同じstate参照を見続ける。
        const nextState = deepClone(initialState);
        Object.keys(state).forEach((key) => {
          delete state[key];
        });
        Object.assign(state, nextState);
      },
    };
  }

  App.core.createStore = createStore;
})();

/* --- scripts/core/save.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// localStorage保存の境界を担当する。保存対象は「安定して復元できる進行状態」に限定し、戦闘中や遷移中は保存しない。
// schemaVersion / storageKey / buildStableStateの変更は既存セーブ互換性に直結するため、必ず保存再開テストを行う。
(() => {
  const App = window.MonsterPrototype;
  const DIRECTIONS = new Set(["up", "right", "down", "left"]);

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function isPlainObject(value) {
    return Boolean(value) && typeof value === "object" && !Array.isArray(value);
  }

  function getStorage() {
    try {
      const storage = window.localStorage;
      const probeKey = "__monster_prototype_storage_probe__";
      storage.setItem(probeKey, "1");
      storage.removeItem(probeKey);
      return storage;
    } catch (error) {
      return null;
    }
  }

  function asInteger(value, fallback) {
    return Number.isInteger(value) ? value : fallback;
  }

  function asNonNegativeInteger(value, fallback) {
    return Number.isInteger(value) && value >= 0 ? value : fallback;
  }

  function asPositiveInteger(value, fallback) {
    return Number.isInteger(value) && value > 0 ? value : fallback;
  }

  function asDirection(value, fallback) {
    return DIRECTIONS.has(value) ? value : fallback;
  }

  function isPassableTile(mapDef, x, y) {
    if (
      !mapDef ||
      !Array.isArray(mapDef.rows) ||
      y < 0 ||
      y >= mapDef.rows.length ||
      x < 0 ||
      x >= mapDef.rows[0].length
    ) {
      return false;
    }

    const tileConfig = App.config.game.fieldTiles[mapDef.rows[y][x]];
    return Boolean(tileConfig && tileConfig.passable);
  }

  function buildStableProgress(progress) {
    const stable = {};
    Object.keys(progress || {}).forEach((key) => {
      const value = progress[key];
      if (key === "resolvedEventIds") {
        stable.resolvedEventIds = Array.isArray(value)
          ? Array.from(new Set(value.filter((entry) => typeof entry === "string")))
          : [];
        return;
      }

      if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
        stable[key] = value;
      }
    });

    if (!stable.resolvedEventIds) {
      stable.resolvedEventIds = [];
    }
    return stable;
  }

  function buildStableInventory(inventory) {
    return {
      fullHealCount: asNonNegativeInteger(inventory && inventory.fullHealCount, 0),
      masterBallCount: asNonNegativeInteger(inventory && inventory.masterBallCount, 0),
    };
  }

  function buildStableParty(party) {
    const monster = Array.isArray(party) ? party[0] : null;
    if (!monster || typeof monster.speciesId !== "string") {
      return [];
    }

    return [
      {
        speciesId: monster.speciesId,
        level: asPositiveInteger(monster.level, 1),
        currentHp: asNonNegativeInteger(monster.currentHp, 0),
        moveIds: Array.isArray(monster.moveIds)
          ? monster.moveIds.filter((moveId) => typeof moveId === "string")
          : [],
        currentPp: Array.isArray(monster.currentPp)
          ? monster.currentPp.map((pp) => asNonNegativeInteger(pp, 0))
          : [],
      },
    ];
  }

  function buildStableCollection(collection) {
    const capturedSpeciesIds = Array.isArray(collection && collection.capturedSpeciesIds)
      ? collection.capturedSpeciesIds
      : [];

    return {
      capturedSpeciesIds: Array.from(
        new Set(capturedSpeciesIds.filter((speciesId) => typeof speciesId === "string"))
      ),
    };
  }

  function buildStableState(state) {
    // DOM表示、モーダル、戦闘途中アニメーションは保存しない。復元後は必ずフィールド状態から再開する設計。
    const field = state.field || {};
    const player = field.player || {};

    return {
      field: {
        mapId: field.mapId,
        player: {
          x: player.x,
          y: player.y,
          direction: player.direction,
        },
        steps: field.steps,
        lastEncounterStep: field.lastEncounterStep,
      },
      party: buildStableParty(state.party || []),
      inventory: buildStableInventory(state.inventory || {}),
      collection: buildStableCollection(state.collection || {}),
      timeAttack: {
        active: Boolean(state.timeAttack && state.timeAttack.active),
        elapsedMs: asNonNegativeInteger(state.timeAttack && state.timeAttack.elapsedMs, 0),
        finished: Boolean(state.timeAttack && state.timeAttack.finished),
      },
      progress: buildStableProgress(state.progress || {}),
    };
  }

  function restorePlayer(savedField, nextState, mapDef) {
    // 保存位置が地形変更で通行不可になった場合はspawnへ戻す。マップ編集時の破損セーブ対策。
    const savedPlayer = (savedField && savedField.player) || {};
    const fallbackPlayer = nextState.field.player;
    const spawn = mapDef && mapDef.spawn ? mapDef.spawn : fallbackPlayer;
    let x = asInteger(savedPlayer.x, fallbackPlayer.x);
    let y = asInteger(savedPlayer.y, fallbackPlayer.y);
    let direction = asDirection(savedPlayer.direction, fallbackPlayer.direction);

    if (!isPassableTile(mapDef, x, y)) {
      x = spawn.x;
      y = spawn.y;
      direction = asDirection(spawn.direction, direction);
    }

    nextState.field.player = {
      ...fallbackPlayer,
      x,
      y,
      fromX: x,
      fromY: y,
      toX: x,
      toY: y,
      direction,
      moving: false,
      progress: 0,
    };
  }

  function restoreInventory(savedInventory, nextState) {
    if (!isPlainObject(savedInventory)) {
      return;
    }

    Object.keys(nextState.inventory || {}).forEach((key) => {
      const savedValue = savedInventory[key];
      if (Number.isInteger(savedValue) && savedValue >= 0) {
        nextState.inventory[key] = savedValue;
      }
    });
  }

  function restoreParty(savedParty, nextState, dataRegistry) {
    if (!Array.isArray(savedParty) || savedParty.length === 0 || !dataRegistry) {
      return;
    }

    const savedMonster = savedParty[0];
    if (!isPlainObject(savedMonster) || typeof savedMonster.speciesId !== "string") {
      return;
    }

    if (!dataRegistry.getSpecies(savedMonster.speciesId)) {
      return;
    }

    const moveIds = Array.isArray(savedMonster.moveIds)
      ? savedMonster.moveIds.filter((moveId) => Boolean(dataRegistry.getMove(moveId)))
      : [];
    const level = asPositiveInteger(savedMonster.level, nextState.party[0].level);
    const monster = dataRegistry.createMonsterInstance(
      savedMonster.speciesId,
      level,
      moveIds.length > 0 ? moveIds : undefined
    );

    monster.currentHp = Math.min(
      monster.maxHp,
      asNonNegativeInteger(savedMonster.currentHp, monster.currentHp)
    );

    if (Array.isArray(savedMonster.currentPp) && savedMonster.currentPp.length === monster.moveIds.length) {
      monster.currentPp = savedMonster.currentPp.map((pp, index) => {
        const maxPp = dataRegistry.getMove(monster.moveIds[index]).pp;
        return Math.min(maxPp, asNonNegativeInteger(pp, maxPp));
      });
    }

    nextState.party = [monster];
  }

  function restoreCollection(savedCollection, nextState, dataRegistry) {
    if (!isPlainObject(savedCollection)) {
      return;
    }

    const capturedSpeciesIds = Array.isArray(savedCollection.capturedSpeciesIds)
      ? savedCollection.capturedSpeciesIds
      : [];
    nextState.collection.capturedSpeciesIds = Array.from(
      new Set(
        capturedSpeciesIds.filter((speciesId) => {
          return (
            typeof speciesId === "string" &&
            (!dataRegistry || Boolean(dataRegistry.getSpecies(speciesId)))
          );
        })
      )
    );
  }

  function restoreProgress(savedProgress, nextState) {
    if (!isPlainObject(savedProgress)) {
      return;
    }

    if (Array.isArray(savedProgress.resolvedEventIds)) {
      nextState.progress.resolvedEventIds = Array.from(
        new Set(savedProgress.resolvedEventIds.filter((eventId) => typeof eventId === "string"))
      );
    }

    Object.keys(nextState.progress || {}).forEach((key) => {
      if (key === "resolvedEventIds") {
        return;
      }

      const savedValue = savedProgress[key];
      if (
        typeof savedValue === "string" ||
        typeof savedValue === "number" ||
        typeof savedValue === "boolean"
      ) {
        nextState.progress[key] = savedValue;
      }
    });
  }

  function restoreStableState(initialState, savedState, dataRegistry) {
    // 復元は初期状態へ安全な差分だけを戻す。新しいprogress/inventoryキーは初期値が基準になる。
    const nextState = deepClone(initialState);
    if (!isPlainObject(savedState)) {
      return nextState;
    }

    const savedField = isPlainObject(savedState.field) ? savedState.field : {};
    const savedMapId =
      typeof savedField.mapId === "string" && dataRegistry && dataRegistry.getMap(savedField.mapId)
        ? savedField.mapId
        : nextState.field.mapId;
    const mapDef = dataRegistry ? dataRegistry.getMap(savedMapId) : null;

    nextState.scene = "field";
    nextState.battle = null;
    nextState.field.mapId = savedMapId;
    nextState.field.message = "";
    nextState.field.messageKind = "";
    nextState.field.stepEffect = null;
    nextState.field.eventEffect = null;
    nextState.field.bumpEffect = null;
    nextState.field.blockedFeedbackCooldownMs = 0;
    nextState.field.steps = asNonNegativeInteger(savedField.steps, nextState.field.steps);
    nextState.field.lastEncounterStep = asInteger(
      savedField.lastEncounterStep,
      nextState.field.lastEncounterStep
    );
    restorePlayer(savedField, nextState, mapDef);
    restoreParty(savedState.party, nextState, dataRegistry);
    restoreInventory(savedState.inventory, nextState);
    restoreCollection(savedState.collection, nextState, dataRegistry);
    restoreProgress(savedState.progress, nextState);

    if (isPlainObject(savedState.timeAttack)) {
      nextState.timeAttack.active = Boolean(savedState.timeAttack.active);
      nextState.timeAttack.elapsedMs = asNonNegativeInteger(savedState.timeAttack.elapsedMs, 0);
      nextState.timeAttack.finished = Boolean(savedState.timeAttack.finished);
    }

    return nextState;
  }

  function canPersist(state) {
    // 戦闘・画面遷移中は中間状態が多く、復元不能になりやすいので保存禁止。
    return Boolean(
      state &&
        state.scene === "field" &&
        !state.battle &&
        !(state.transition && state.transition.active)
    );
  }

  function createSaveManager(config = {}, dataRegistry) {
    const storage = getStorage();
    const schemaVersion = config.schemaVersion || 1;
    const storageKey = config.storageKey || "monster_prototype_save_v1";
    let lastStableJson = "";

    function createPayload(state) {
      return {
        schemaVersion,
        savedAt: new Date().toISOString(),
        state: buildStableState(state),
      };
    }

    function persist(state) {
      if (!storage || !canPersist(state)) {
        return false;
      }

      const payload = createPayload(state);
      const stableJson = JSON.stringify(payload.state);
      try {
        storage.setItem(storageKey, JSON.stringify(payload));
        lastStableJson = stableJson;
        return true;
      } catch (error) {
        return false;
      }
    }

    function persistIfChanged(state) {
      if (!storage || !canPersist(state)) {
        return false;
      }

      const stableState = buildStableState(state);
      const stableJson = JSON.stringify(stableState);
      if (stableJson === lastStableJson) {
        return false;
      }

      try {
        storage.setItem(
          storageKey,
          JSON.stringify({
            schemaVersion,
            savedAt: new Date().toISOString(),
            state: stableState,
          })
        );
        lastStableJson = stableJson;
        return true;
      } catch (error) {
        return false;
      }
    }

    function readPayload() {
      if (!storage) {
        return null;
      }

      try {
        const rawPayload = storage.getItem(storageKey);
        if (!rawPayload) {
          return null;
        }

        const payload = JSON.parse(rawPayload);
        if (
          !isPlainObject(payload) ||
          payload.schemaVersion !== schemaVersion ||
          !isPlainObject(payload.state)
        ) {
          return null;
        }

        return payload;
      } catch (error) {
        return null;
      }
    }

    function load(initialState) {
      const payload = readPayload();
      if (!payload) {
        return deepClone(initialState);
      }

      const restoredState = restoreStableState(initialState, payload.state, dataRegistry);
      lastStableJson = JSON.stringify(buildStableState(restoredState));
      return restoredState;
    }

    function hasSavedState() {
      return Boolean(readPayload());
    }

    function getSavedInfo() {
      const payload = readPayload();
      if (!payload) {
        return null;
      }

      return {
        savedAt: typeof payload.savedAt === "string" ? payload.savedAt : "",
      };
    }

    function clear(currentState) {
      if (!storage) {
        return false;
      }

      try {
        storage.removeItem(storageKey);
        lastStableJson = currentState ? JSON.stringify(buildStableState(currentState)) : "";
        return true;
      } catch (error) {
        return false;
      }
    }

    return {
      clear,
      load,
      persist,
      persistIfChanged,
      hasSavedState,
      getSavedInfo,
      canPersist,
      isAvailable: Boolean(storage),
      storageKey,
    };
  }

  App.core.createSaveManager = createSaveManager;
})();

/* --- scripts/core/random.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// 遭遇、捕獲、ダメージ乱数を再現しやすくするための軽量PRNG。Math.randomへ置き換えるとテスト再現性が落ちる。
(() => {
  const App = window.MonsterPrototype;

  function normalizeSeed(seed) {
    if (typeof seed === "number" && Number.isFinite(seed)) {
      return seed >>> 0;
    }

    const text = String(seed || "prototype-seed");
    let value = 2166136261;
    for (let index = 0; index < text.length; index += 1) {
      value ^= text.charCodeAt(index);
      value = Math.imul(value, 16777619);
    }
    return value >>> 0;
  }

  function createRandomController(config) {
    // seedと呼び出し順が結果を決める。新しい乱数呼び出しを挟むと遭遇・捕獲・ダメージの既存期待値がずれる。
    const initialSeed = normalizeSeed(config && config.seed);
    const logLimit = Math.max(8, (config && config.logLimit) || 32);
    let state = initialSeed;
    let calls = 0;
    const log = [];

    function record(label, value) {
      log.push({
        call: calls,
        label: label || "",
        value: Number(value.toFixed(8)),
      });

      if (log.length > logLimit) {
        log.shift();
      }
    }

    function next(label) {
      state = (Math.imul(state, 1664525) + 1013904223) >>> 0;
      calls += 1;
      const value = state / 4294967296;
      record(label, value);
      return value;
    }

    function chance(probability, label) {
      return next(label) < probability;
    }

    function percent(percentValue, label) {
      return next(label) * 100 < percentValue;
    }

    function range(min, max, label) {
      return min + (max - min) * next(label);
    }

    function integer(min, maxInclusive, label) {
      return min + Math.floor(next(label) * (maxInclusive - min + 1));
    }

    function token(length, label) {
      let result = "";
      for (let index = 0; index < length; index += 1) {
        result += integer(0, 35, label).toString(36);
      }
      return result;
    }

    function snapshot() {
      return {
        initialSeed,
        currentSeed: state >>> 0,
        calls,
        log: log.slice(),
      };
    }

    return {
      next,
      chance,
      percent,
      range,
      integer,
      token,
      snapshot,
    };
  }

  App.core.createRandomController = createRandomController;
})();

// 2026年4月27日時点の開発者向け保守メモ:
// data配下の定義をid検索できる形へまとめ、起動時に整合性を検証する中核。

(() => {
  const App = window.MonsterPrototype;

  function createMapById(items, label, errors) {
    const result = new Map();

    (items || []).forEach((item, index) => {
      if (!item || !item.id) {
        errors.push(`${label} の ${index + 1} 件目に id がありません。`);
        return;
      }

      if (result.has(item.id)) {
        errors.push(`${label} ${item.id} が重複しています。`);
        return;

      result.set(item.id, item);

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));

    return typeof value === "number" && Number.isFinite(value);
  }

  function isPositiveNumber(value) {
    return isFiniteNumber(value) && value > 0;

  function isNonEmptyText(value) {
    return typeof value === "string" && value.trim().length > 0;

  function validateStats(stats, speciesId, errors) {

    const movesById = createMapById(App.data.moves, "技", errors);
    const encountersById = createMapById(App.data.encounters, "遭遇テーブル", errors);
    const questsById = createMapById(App.data.quests || [], "依頼", errors);
    const mapsById = createMapById(App.data.maps, "マップ", errors);

    movesById.forEach((move) => {
      if (!move.name) {
        errors.push(`技 ${move.id} に表示名がありません。`);
      }

      if (!validTypes.has(move.type)) {
        errors.push(`技 ${move.id} が未定義のタイプ ${move.type} を参照しています。`);
      }

      if (!isFiniteNumber(move.power) || move.power < 0) {
        errors.push(`技 ${move.id} の威力が不正です。`);
      }

      if (!isFiniteNumber(move.accuracy) || move.accuracy < 1 || move.accuracy > 100) {
        errors.push(`技 ${move.id} の命中率が不正です。`);
      }

      if (!isPositiveNumber(move.pp)) {
        errors.push(`技 ${move.id} の PP が不正です。`);
      }
    });

    speciesById.forEach((species) => {
      if (!species.name) {
        errors.push(`種族 ${species.id} に表示名がありません。`);
      }

      if (!Array.isArray(species.types) || species.types.length === 0) {
        errors.push(`種族 ${species.id} にタイプがありません。`);
      } else {
        species.types.forEach((type) => {
          if (!validTypes.has(type)) {
            errors.push(`種族 ${species.id} が未定義のタイプ ${type} を参照しています。`);
          }
        });
      }

      validateStats(species.stats, species.id, errors);

      if (!isFiniteNumber(species.catchRate) || species.catchRate < 1 || species.catchRate > 255) {
        errors.push(`種族 ${species.id} の捕獲率が不正です。`);
      }

      if (!species.palette || !species.palette.primary || !species.palette.secondary) {
        errors.push(`種族 ${species.id} に戦闘表示用の色設定が不足しています。`);
      }

      const spriteIds = species.spriteIds || {};
      const imageSprites = species.imageSprites || {};
      const hasBattleSprites = Boolean(spriteIds.battleFront && spriteIds.battleBack);
      const hasBattleImages = Boolean(imageSprites.battleFront && imageSprites.battleBack);
      if (!species.shape && !hasBattleSprites && !hasBattleImages) {
        errors.push(`種族 ${species.id} に戦闘表示用の形状またはスプライト指定がありません。`);
      }

      if (species.spriteIds) {
        ["battleFront", "battleBack"].forEach((key) => {
          if (spriteIds[key] && !knownBattleSprites.has(spriteIds[key])) {
            errors.push(`種族 ${species.id} が未知の戦闘表示 ${spriteIds[key]} を参照しています。`);
          }
        });
      }

      if (!species.defaultMoveIds || species.defaultMoveIds.length === 0) {
        errors.push(`種族 ${species.id} に技がありません。`);
      }

      (species.defaultMoveIds || []).forEach((moveId) => {
        if (!movesById.has(moveId)) {
          errors.push(`種族 ${species.id} が未定義の技 ${moveId} を参照しています。`);
        }
      });
    });

    encountersById.forEach((table) => {
      if (!isFiniteNumber(table.rate) || table.rate < 0 || table.rate > 1) {
        errors.push(`遭遇テーブル ${table.id} の出現率が不正です。`);
      }

      if (!Array.isArray(table.slots) || table.slots.length === 0) {
        errors.push(`遭遇テーブル ${table.id} にスロットがありません。`);
        return;
      }

      table.slots.forEach((slot, index) => {
        if (!speciesById.has(slot.speciesId)) {
          errors.push(
            `遭遇テーブル ${table.id} が未定義の種族 ${slot.speciesId} を参照しています。`
          );
        }

        if (!Number.isInteger(slot.level) || slot.level <= 0) {
          errors.push(`遭遇テーブル ${table.id} の ${index + 1} 件目のレベルが不正です。`);
        }

        if (!isPositiveNumber(slot.weight)) {
          errors.push(`遭遇テーブル ${table.id} の ${index + 1} 件目の重みが不正です。`);
        }
      });
    });

    questsById.forEach((quest) => {
      if (!isNonEmptyText(quest.progressKey)) {
        errors.push(`依頼 ${quest.id} に progressKey がありません。`);
      }

      if (!isNonEmptyText(quest.initialState)) {
        errors.push(`依頼 ${quest.id} に initialState がありません。`);
      }

      if (!quest.objectives || !quest.objectives[quest.initialState]) {
        errors.push(`依頼 ${quest.id} に初期状態の目的文がありません。`);
      }

      if (!quest.messages || !isNonEmptyText(quest.messages.start)) {
        errors.push(`依頼 ${quest.id} に開始メッセージがありません。`);
      }

      if (quest.completionRequirement) {
        const requirement = quest.completionRequirement;
        if (requirement.kind !== "captured_count_at_least") {
          errors.push(`依頼 ${quest.id} の達成条件 ${requirement.kind} は未対応です。`);
        }
        if (!Number.isInteger(requirement.count) || requirement.count <= 0) {
          errors.push(`依頼 ${quest.id} の達成数が不正です。`);
        }
      }
    });

    mapsById.forEach((mapDef) => {
      // マップ文字列は矩形であることが前提。カメラ計算、移動判定、保存復元がrows[0].lengthを基準にする。
      if (!Array.isArray(mapDef.rows) || mapDef.rows.length === 0) {
        errors.push(`マップ ${mapDef.id} に地形データがありません。`);
        return;
      }

      const width = mapDef.rows[0].length;
      const occupied = new Set();
      const mapEvents = Array.isArray(mapDef.events) ? mapDef.events : [];

      mapDef.rows.forEach((row, rowIndex) => {
        if (typeof row !== "string" || row.length !== width) {
          errors.push(`マップ ${mapDef.id} の ${rowIndex + 1} 行目の幅が不正です。`);
          return;
        }

        row.split("").forEach((tileCode, columnIndex) => {
          if (!knownTiles.has(tileCode)) {
            errors.push(
              `マップ ${mapDef.id} の (${columnIndex}, ${rowIndex}) に未定義タイル ${tileCode} があります。`
            );
          }
        });
      });

      if (!encountersById.has(mapDef.encounterTableId)) {
        errors.push(
          `マップ ${mapDef.id} が未定義の遭遇テーブル ${mapDef.encounterTableId} を参照しています。`
        );
      }

      if (!mapDef.spawn) {
        errors.push(`マップ ${mapDef.id} に開始位置がありません。`);
      } else if (
        !Number.isInteger(mapDef.spawn.x) ||
        !Number.isInteger(mapDef.spawn.y) ||
        mapDef.spawn.y < 0 ||
        mapDef.spawn.y >= mapDef.rows.length ||
        mapDef.spawn.x < 0 ||
        mapDef.spawn.x >= width
      ) {
        errors.push(`マップ ${mapDef.id} の開始位置がマップ外です。`);
      } else {
        const spawnTile = mapDef.rows[mapDef.spawn.y][mapDef.spawn.x];
        const spawnConfig = App.config.game.fieldTiles[spawnTile];
        if (!spawnConfig || !spawnConfig.passable) {
          errors.push(`マップ ${mapDef.id} の開始位置が通行不可タイルです。`);
        }
      }

      validateCoordinates(mapEvents, "イベント", mapDef, occupied, errors);

      mapEvents.forEach((event) => {
        if (!knownEventKinds.has(event.kind)) {
          errors.push(`マップ ${mapDef.id} のイベント ${event.id} の種類が不正です。`);
        }

        if (!knownEventTriggers.has(event.trigger)) {
          errors.push(`マップ ${mapDef.id} のイベント ${event.id} の発火条件が不正です。`);
        }

        if (event.sprite && !knownSprites.has(event.sprite)) {
          errors.push(`マップ ${mapDef.id} のイベント ${event.id} が未知の表示 ${event.sprite} を参照しています。`);
        }

        if (event.questId && !questsById.has(event.questId)) {
          errors.push(`マップ ${mapDef.id} のイベント ${event.id} が未知の依頼 ${event.questId} を参照しています。`);
        }

        if (event.kind === "talk") {
          if (event.trigger !== "interact") {
            errors.push(`マップ ${mapDef.id} の会話イベント ${event.id} は interact である必要があります。`);
          }
          if (!isNonEmptyText(event.message) && !event.questId) {
            errors.push(`マップ ${mapDef.id} の会話イベント ${event.id} に本文がありません。`);
          }
          if (!event.sprite) {
            errors.push(`マップ ${mapDef.id} の会話イベント ${event.id} に表示指定がありません。`);
          }
        }

        if (event.kind === "pickup") {
          if (event.trigger !== "interact") {
            errors.push(`マップ ${mapDef.id} の取得イベント ${event.id} は interact である必要があります。`);
          }
          if (!isNonEmptyText(event.itemType)) {
            errors.push(`マップ ${mapDef.id} の取得イベント ${event.id} に itemType がありません。`);
          }
          if (!Number.isInteger(event.amount) || event.amount <= 0) {
            errors.push(`マップ ${mapDef.id} の取得イベント ${event.id} の数量が不正です。`);
          }
          if (!event.sprite) {
            errors.push(`マップ ${mapDef.id} の取得イベント ${event.id} に表示指定がありません。`);
          }
        }

        if (event.kind === "battle") {
          const monsterSpecies = event.monsterSpecies || "aribou";
          if (monsterSpecies !== "first_caught" && !speciesById.has(monsterSpecies)) {
            errors.push(`マップ ${mapDef.id} の戦闘イベント ${event.id} が未定義の種族 ${monsterSpecies} を参照しています。`);
          }
        }

        if (event.kind === "warp") {
          if (event.trigger !== "step") {
            errors.push(`マップ ${mapDef.id} のワープイベント ${event.id} は step である必要があります。`);
          }
          if (!mapsById.has(event.targetMapId)) {
            errors.push(`マップ ${mapDef.id} のワープイベント ${event.id} が未定義の移動先 ${event.targetMapId} を参照しています。`);
            return;
          }

          const targetMap = mapsById.get(event.targetMapId);
          if (
            !event.target ||
            !Number.isInteger(event.target.x) ||
            !Number.isInteger(event.target.y)
          ) {
            errors.push(`マップ ${mapDef.id} のワープイベント ${event.id} の移動先座標が不正です。`);
            return;
          }

          if (
            event.target.y < 0 ||
            event.target.y >= targetMap.rows.length ||
            event.target.x < 0 ||
            event.target.x >= targetMap.rows[0].length
          ) {
            errors.push(`マップ ${mapDef.id} のワープイベント ${event.id} の移動先がマップ外です。`);
            return;
          }

          const targetTile = targetMap.rows[event.target.y][event.target.x];
          const targetConfig = App.config.game.fieldTiles[targetTile];
          if (!targetConfig || !targetConfig.passable) {
            errors.push(`マップ ${mapDef.id} のワープイベント ${event.id} の移動先が通行不可です。`);
          }
        }
      });
    });

    function getSpecies(id) {
      return speciesById.get(id);
    }

    function getMove(id) {
      return movesById.get(id);
    }

    function getEncounterTable(id) {
      return encountersById.get(id);
    }

    function getMap(id) {
      return mapsById.get(id);
    }

    function getQuest(id) {
      return questsById.get(id);
    }

    function getQuests() {
      return Array.from(questsById.values());
    }

    function getPrimaryQuest() {
      return getQuests().find((quest) => quest.primary) || getQuests()[0] || null;
    }

    function getQuestState(state, questId) {
      const quest = getQuest(questId);
      if (!quest) {
        return "";
      }
      return (state.progress && state.progress[quest.progressKey]) || quest.initialState;
    }

    function isQuestRequirementMet(state, questId) {
      const quest = getQuest(questId);
      if (!quest || !quest.completionRequirement) {
        return false;
      }

      const requirement = quest.completionRequirement;
      if (requirement.kind === "captured_count_at_least") {
        return (
          ((state.collection && state.collection.capturedSpeciesIds) || []).length >=
          requirement.count
        );
      }

      return false;
    }

    function getQuestObjectiveText(state, questId) {
      const quest = getQuest(questId);
      if (!quest || !quest.objectives) {
        return "";
      }

      const objective = quest.objectives[getQuestState(state, questId)] || quest.objectives.default;
      if (!objective) {
        return "";
      }

      if (typeof objective === "string") {
        return objective;
      }

      return isQuestRequirementMet(state, questId)
        ? objective.ready || objective.default || ""
        : objective.default || "";
    }

    function getQuestInteractionMessage(state, questId, fallbackMessage) {
      // 依頼の表示文は進行状態と達成条件から決まる。field-scene.jsはここで得た文言をそのままfield.messageに出す。
      const quest = getQuest(questId);
      if (!quest || !quest.messages) {
        return fallbackMessage || "";
      }

      const questState = getQuestState(state, questId);
      if (questState === "reported") {
        return quest.messages.complete || fallbackMessage || "";
      }

      if (isQuestRequirementMet(state, questId)) {
        return quest.messages.report || fallbackMessage || "";
      }

      return questState === "active"
        ? quest.messages.active || fallbackMessage || ""
        : quest.messages.start || fallbackMessage || "";
    }

    function calculateMaxHp(stats, level) {
      return Math.floor(((stats.hp * 2) * level) / 100) + level + 10;
    }

    function calculateOtherStat(baseValue, level) {
      return Math.floor(((baseValue * 2) * level) / 100) + 5;
    }

    function createMonsterInstance(speciesId, level, overrideMoveIds) {
      // 戦闘・保存復元・トレーナー生成が同じ生成関数を使う。返却形を変える場合はsave.jsのparty復元も更新する。
      const species = getSpecies(speciesId);
      if (!species) {
        throw new Error(`未定義の種族 ${speciesId} が指定されました。`);
      }

      const moveIds =
        overrideMoveIds && overrideMoveIds.length > 0
          ? overrideMoveIds.slice()
          : species.defaultMoveIds.slice();
      const maxHp = calculateMaxHp(species.stats, level);

      return {
        id: `${speciesId}_${level}_${random.token(6, "monster_id")}`,
        speciesId,
        level,
        exp: 0,
        currentHp: maxHp,
        maxHp,
        attack: calculateOtherStat(species.stats.attack, level),
        defense: calculateOtherStat(species.stats.defense, level),
        speed: calculateOtherStat(species.stats.speed, level),
        special: calculateOtherStat(species.stats.special, level),
        moveIds,
        currentPp: moveIds.map((moveId) => getMove(moveId).pp),
      };
    }

    function chooseEncounter(tableId) {
      const table = getEncounterTable(tableId);
      const total = table.slots.reduce((sum, slot) => sum + slot.weight, 0);
      let cursor = random.range(0, total, "encounter_slot");

      for (const slot of table.slots) {
        cursor -= slot.weight;
        if (cursor <= 0) {
          return createMonsterInstance(slot.speciesId, slot.level);
        }
      }

      const fallback = table.slots[table.slots.length - 1];
      return createMonsterInstance(fallback.speciesId, fallback.level);
    }

    function getTypeMultiplier(attackType, defendTypes) {
      const chart = typeChart[attackType] || {};
      return defendTypes.reduce((product, defendType) => {
        return product * (chart[defendType] || 1);
      }, 1);
    }

    function computeDamage(attacker, defender, moveId, options) {
      // ダメージ式はbattle-scene.jsの技効果から呼ばれる共通計算。乱数消費順も戦闘再現性に影響する。
      const move = getMove(moveId);
      const settings = options || {};
      const attackerSpecies = getSpecies(attacker.speciesId);
      const defenderSpecies = getSpecies(defender.speciesId);
      const attackStat =
        move.type === "ほのお" || move.type === "みず" || move.type === "こおり"
          ? attacker.special
          : attacker.attack;
      const defenseStat =
        move.type === "ほのお" || move.type === "みず" || move.type === "こおり"
          ? defender.special
          : defender.defense;
      const stab = attackerSpecies.types.includes(move.type) ? 1.5 : 1;
      const typeMultiplier = getTypeMultiplier(move.type, defenderSpecies.types);
      const randomFactor = 217 + random.integer(0, 38, "damage_roll");
      const multiplier = settings.damageMultiplier || 1;
      const movePower =
        typeof settings.powerOverride === "number" ? settings.powerOverride : move.power;
      
      const base =
        Math.floor(
          (((2 * attacker.level) / 5 + 2) * movePower * attackStat * multiplier) / Math.max(1, defenseStat)
        ) /
          50 +
        2;
      const damage = clamp(
        Math.floor(base * stab * typeMultiplier * (randomFactor / 255)),
        1,
        999
      );

      return {
        move,
        damage,
        typeMultiplier,
        isCritical: random.chance(0.0625, "critical_roll"),
      };
    }

    return {
      errors,
      getSpecies,
      getMove,
      getMap,
      getEncounterTable,
      getQuest,
      getQuests,
      getPrimaryQuest,
      getQuestState,
      isQuestRequirementMet,
      getQuestObjectiveText,
      getQuestInteractionMessage,
      createMonsterInstance,
      chooseEncounter,
      computeDamage,
    };
  }

  App.core.createDataRegistry = createDataRegistry;
})();

</script>
    <script>
/* --- scripts/core/input.js --- */
// 2026年4月27日時点の開発者向け保守メモ:
// キーボード、タッチ、画面ボタンを共通のaction/directionキューへ正規化する層。
// scene側はDOMイベントを直接見ず、ここからconsumeする前提なので、入力名の変更はui.jsとscene両方へ影響する。
(() => {
  const App = window.MonsterPrototype;

  function createInputController() {
    const keyboardDirections = new Set();
    const deliveredDirections = new Set();
    const directionQueue = [];
    const actionQueue = [];
    const activeHolds = new Set();
    const holdButtonsByName = new Map();
    const directionOrder = ["up", "right", "down", "left"];
    let activePointerDirection = "";
    let lastHapticAt = -Infinity;
    let actionsLocked = false;

    function queueAction(type, payload) {
      if (actionsLocked) {
        return;
      }

      actionQueue.push({
        type,
        payload: payload || null,
      });
    }

    function queueDirection(direction) {
      if (actionsLocked) {
        return;
      }

      directionQueue.push(direction);
    }

    function clearActions(types) {
      if (!types) {
        actionQueue.length = 0;
        return;
      }

      const filters = new Set(Array.isArray(types) ? types : [types]);
      for (let index = actionQueue.length - 1; index >= 0; index -= 1) {
        if (filters.has(actionQueue[index].type)) {
          actionQueue.splice(index, 1);
        }
      }
    }

    function clearDirections() {
      keyboardDirections.clear();
      activePointerDirection = "";
      deliveredDirections.clear();
      directionQueue.length = 0;
    }

    function clearHolds() {
      activeHolds.clear();
      holdButtonsByName.forEach((buttons) => {
        buttons.forEach((button) => {
          button.classList.remove("is-active");
        });
      });
    }

    function setActionLock(locked, options) {
      // アニメーション中の連打を防ぐ安全弁。clearQueue付きで使う箇所は、古い入力が次フェーズへ漏れないようにしている。
      actionsLocked = Boolean(locked);
      if (options && options.clearQueue) {
        clearActions();
        clearDirections();
        clearHolds();
      }
    }

    function handleKeyDown(event) {
      // WASD/矢印/Z/X/Mをゲーム操作に割り当てる。テキスト入力中はブラウザ標準操作を優先する。
      if (isTextEditingTarget(event.target)) {
        return;
      }

      const key = event.key;

      if (["ArrowUp", "w", "W"].includes(key)) {
        keyboardDirections.add("up");
        event.preventDefault();
      } else if (["ArrowRight", "d", "D"].includes(key)) {
        keyboardDirections.add("right");
        event.preventDefault();
      } else if (["ArrowDown", "s", "S"].includes(key)) {
        keyboardDirections.add("down");
        event.preventDefault();
      } else if (["ArrowLeft", "a", "A"].includes(key)) {
        keyboardDirections.add("left");
        event.preventDefault();
      } else if (["z", "Z", " ", "Enter"].includes(key)) {
        if (event.repeat) {
          return;
        }
        queueAction("confirm");
        event.preventDefault();
      } else if (["x", "X"].includes(key)) {
        activeHolds.add("run");
        if (event.repeat) {
          event.preventDefault();
          return;
        }
        queueAction("cancel");
        event.preventDefault();
      } else if (["Backspace", "Escape"].includes(key)) {
        if (event.repeat) {
          event.preventDefault();
          return;
        }
        queueAction("cancel");
        event.preventDefault();
      } else if (["m", "M"].includes(key)) {
        if (event.repeat) {
          return;
        }
        queueAction("menu");
        event.preventDefault();
      }
    }

    function handleKeyUp(event) {
      if (isTextEditingTarget(event.target)) {
        return;
      }

      const key = event.key;
      if (["ArrowUp", "w", "W"].includes(key)) {
        keyboardDirections.delete("up");
        deliveredDirections.delete("up");
      } else if (["ArrowRight", "d", "D"].includes(key)) {
        keyboardDirections.delete("right");
        deliveredDirections.delete("right");
      } else if (["ArrowDown", "s", "S"].includes(key)) {
        keyboardDirections.delete("down");
        deliveredDirections.delete("down");
      } else if (["ArrowLeft", "a", "A"].includes(key)) {
        keyboardDirections.delete("left");
        deliveredDirections.delete("left");
      } else if (["x", "X"].includes(key)) {
        activeHolds.delete("run");
      }
    }

    function triggerHaptic() {
      if (!navigator.vibrate) {
        return;
      }

      const now = performance.now();
      if (now - lastHapticAt < 70) {
        return;
      }

      lastHapticAt = now;
      try {
        navigator.vibrate(8);
      } catch (error) {
        // 端末やブラウザ側で拒否された場合は、入力そのものを止めない。
      }
    }

    function hasActiveDirection(direction) {
      return keyboardDirections.has(direction) || activePointerDirection === direction;
    }

    function setPointerDirection(direction, buttons) {
      if (!direction || actionsLocked) {
        return;
      }

      if (activePointerDirection === direction) {
        return;
      }

      if (activePointerDirection) {
        deliveredDirections.delete(activePointerDirection);
      }
      activePointerDirection = direction;
      deliveredDirections.delete(direction);
      triggerHaptic();

      if (buttons) {
        Object.keys(buttons).forEach((key) => {
          buttons[key].classList.toggle("is-active", key === direction);
        });
      }
    }

    function clearPointerDirection(buttons) {
      if (buttons) {
        Object.keys(buttons).forEach((key) => {
          buttons[key].classList.remove("is-active");
        });
      }
      if (activePointerDirection) {
        deliveredDirections.delete(activePointerDirection);
      }
      activePointerDirection = "";
    }

    function getDirectionFromPadPoint(container, event) {
      const rect = container.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = event.clientX - centerX;
      const dy = event.clientY - centerY;
      const deadZone = Math.min(rect.width, rect.height) * 0.11;

      if (Math.abs(dx) < deadZone && Math.abs(dy) < deadZone) {
        return activePointerDirection || "";
      }

      if (Math.abs(dx) > Math.abs(dy)) {
        return dx > 0 ? "right" : "left";
      }

      return dy > 0 ? "down" : "up";
    }

    function isTextEditingTarget(target) {
      return Boolean(
        target &&
          (target.tagName === "INPUT" ||
            target.tagName === "TEXTAREA" ||
            target.tagName === "SELECT" ||
            target.isContentEditable)
      );
    }

    function isWithinAppShell(target) {
      return Boolean(target && typeof target.closest === "function" && target.closest(".app-shell"));
    }

    function suppressTextGesture(event) {
      if (isWithinAppShell(event.target) && !isTextEditingTarget(event.target)) {
        event.preventDefault();
      }
    }

    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("keyup", handleKeyUp);
    document.addEventListener("selectstart", suppressTextGesture);
    document.addEventListener("dragstart", suppressTextGesture);
    document.addEventListener("contextmenu", suppressTextGesture);

    return {
      consumeAction(expectedAction) {
        return Boolean(this.consumeCommand(expectedAction));
      },
      consumeCommand(expectedAction) {
        const index = actionQueue.findIndex((entry) => entry.type === expectedAction);
        if (index < 0) {
          return null;
        }
        return actionQueue.splice(index, 1)[0];
      },
      getDirection() {
        const queuedDirection = directionQueue.shift();
        if (queuedDirection) {
          return queuedDirection;
        }

        for (const direction of directionOrder) {
          if (hasActiveDirection(direction)) {
            deliveredDirections.add(direction);
            return direction;
          }
        }
        return null;
      },
      attachDirectionButton(button, direction) {
        const activate = (event) => {
          event.preventDefault();
          setPointerDirection(direction, { [direction]: button });
        };
        const deactivate = (event) => {
          const shouldQueueClickMove =
            event && event.type === "pointerup" && !deliveredDirections.has(direction);
          if (shouldQueueClickMove) {
            queueDirection(direction);
          }
          clearPointerDirection({ [direction]: button });
        };

        button.addEventListener("pointerdown", activate);
        button.addEventListener("pointerup", deactivate);
        button.addEventListener("pointerleave", deactivate);
        button.addEventListener("pointercancel", deactivate);
      },
      attachDirectionalPad(container, buttons) {
        // 十字キー内を押したまま滑らせる操作を許可するため、container座標から方向を再計算する。
        const updateDirection = (event) => {
          const direction = getDirectionFromPadPoint(container, event);
          if (direction) {
            setPointerDirection(direction, buttons);
          }
        };
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          const direction = activePointerDirection;
          if (direction && !deliveredDirections.has(direction)) {
            queueDirection(direction);
          }
          clearPointerDirection(buttons);
        };

        container.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (container.setPointerCapture && event.pointerId !== undefined) {
            container.setPointerCapture(event.pointerId);
          }
          updateDirection(event);
        });
        container.addEventListener("pointermove", (event) => {
          event.preventDefault();
          updateDirection(event);
        });
        container.addEventListener("pointerup", release);
        container.addEventListener("pointerleave", release);
        container.addEventListener("pointercancel", release);
      },
      attachActionButton(button, action, payload) {
        // pointerupとclickの二重発火をhandledByPointerで抑える。モバイル操作の重複入力を防ぐ重要箇所。
        let handledByPointer = false;
        const activate = (event) => {
          event.preventDefault();
          button.classList.add("is-active");
          triggerHaptic();
          if (button.setPointerCapture && event.pointerId !== undefined) {
            button.setPointerCapture(event.pointerId);
          }
        };
        const release = (event) => {
          event.preventDefault();
          button.classList.remove("is-active");
          handledByPointer = true;
          queueAction(action, payload);
        };
        const cancel = () => {
          button.classList.remove("is-active");
        };

        button.addEventListener("pointerdown", activate);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointerleave", cancel);
        button.addEventListener("pointercancel", cancel);
        button.addEventListener("click", (event) => {
          if (handledByPointer) {
            handledByPointer = false;
            event.preventDefault();
            return;
          }
          queueAction(action, payload);
        });
      },
      attachHoldButton(button, holdName) {
        if (!holdButtonsByName.has(holdName)) {
          holdButtonsByName.set(holdName, new Set());
        }
        holdButtonsByName.get(holdName).add(button);

        const activate = (event) => {
          event.preventDefault();
          activeHolds.add(holdName);
          button.classList.add("is-active");
          triggerHaptic();
          if (button.setPointerCapture && event.pointerId !== undefined) {
            button.setPointerCapture(event.pointerId);
          }
        };
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          activeHolds.delete(holdName);
          button.classList.remove("is-active");
        };
        const activateMouseFallback = (event) => {
          if (event.button !== undefined && event.button !== 0) {
            return;
          }
          activate(event);
        };

        button.addEventListener("pointerdown", activate);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointerleave", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("mousedown", activateMouseFallback);
        button.addEventListener("mouseup", release);
        button.addEventListener("mouseleave", release);
      },
      clearActions,
      setActionLock,
      isActionLocked() {
        return actionsLocked;
      },
      isHoldActive(holdName) {
        if (activeHolds.has(holdName)) {
          return true;
        }

        const buttons = holdButtonsByName.get(holdName);
        if (!buttons) {
          return false;
        }

        let active = false;
        buttons.forEach((button) => {
          if (!button.isConnected) {
            buttons.delete(button);
            return;
          }
          if (button.classList.contains("is-active")) {
            active = true;
          }
        });
        return active;
      },
      clearDirections,
    };
  }

  App.core.createInputController = createInputController;
})();
